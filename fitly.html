<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Fitly — 筋トレ記録</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest-fitly.json">
  <link rel="icon" type="image/png" href="/favicon.ico">
  <meta name="theme-color" content="#1a1a24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Fitly">
  <link rel="apple-touch-icon" href="/apple-touch-icon-fitly.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a24;
      --surface: #22222e;
      --surface2: #2a2a38;
      --surface3: #323242;
      --border: #35354a;
      --text: #f0eee8;
      --muted: #8888a0;
      --accent: #5ecfa0;
      --accent2: #ff7c6e;
      --blue: #6c8eff;
      --yellow: #f5c842;
      --purple: #b388ff;
      --font: 'Outfit', sans-serif;
    }
    html { font-size: 16px; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-weight: 300; min-height: 100vh; padding-bottom: 130px; }

    /* Header */
    .app-header { padding: 3rem 1.25rem 1.25rem; }
    .back-link { font-size:.75rem; color:var(--muted); text-decoration:none; letter-spacing:.1em; text-transform:uppercase; display:inline-flex; align-items:center; gap:.4rem; margin-bottom:0; }
    .auth-chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:.3rem .85rem; font-size:.72rem; color:var(--muted); cursor:pointer; font-family:var(--font); transition:all .2s; white-space:nowrap; }
    .auth-chip.logged-in { border-color:var(--accent); color:var(--accent); }
    .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; }
    .app-title { font-size:1.6rem; font-weight:500; letter-spacing:-.02em; }
    .app-title span { font-family:'Playfair Display',serif; font-style:italic; color:var(--accent); }

    /* Tabs */
    .tabs { display:flex; gap:0; margin:0 1.25rem 1.25rem; background:var(--surface); border-radius:12px; padding:3px; border:1px solid var(--border); overflow-x:auto; }
    .tab { flex:1; padding:.55rem .2rem; font-size:.72rem; font-weight:400; color:var(--muted); background:none; border:none; border-radius:9px; cursor:pointer; font-family:var(--font); transition:all .2s; white-space:nowrap; min-width:52px; }
    .tab.active { background:var(--surface2); color:var(--text); font-weight:500; }

    /* Views */
    .view { display:none; padding:0 1.25rem; }
    .view.active { display:block; }

    /* Section */
    .section-label { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.75rem; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1rem 1.1rem; margin-bottom:.75rem; }

    /* Workout Header */
    .workout-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
    .workout-timer { font-size:1.4rem; font-weight:600; letter-spacing:-.02em; color:var(--accent); }
    .workout-timer-label { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; }
    .btn-start { background:var(--accent); color:#1a1a24; border:none; border-radius:10px; padding:.6rem 1.2rem; font-size:.85rem; font-weight:600; font-family:var(--font); cursor:pointer; }
    .btn-end { background:var(--accent2); color:#fff; border:none; border-radius:10px; padding:.6rem 1.2rem; font-size:.85rem; font-weight:600; font-family:var(--font); cursor:pointer; }

    /* Exercise Card */
    .exercise-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1rem; margin-bottom:.75rem; animation:slideIn .3s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .exercise-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; }
    .exercise-name { font-size:.95rem; font-weight:500; }
    .exercise-meta { font-size:.72rem; color:var(--muted); margin-top:.1rem; }
    .exercise-actions { display:flex; gap:.4rem; }
    .btn-yt { font-size:.65rem; color:var(--accent2); background:rgba(255,124,110,.12); border:1px solid rgba(255,124,110,.2); border-radius:6px; padding:.25rem .5rem; cursor:pointer; font-family:var(--font); text-decoration:none; display:inline-block; }

    /* Set Row */
    .set-header { display:grid; grid-template-columns:28px 1fr 1fr 1fr 36px; gap:.4rem; margin-bottom:.4rem; }
    .set-header-label { font-size:.62rem; color:var(--muted); text-align:center; text-transform:uppercase; letter-spacing:.05em; }
    .set-row { display:grid; grid-template-columns:28px 1fr 1fr 1fr 36px; gap:.4rem; align-items:center; margin-bottom:.4rem; }
    .set-num { font-size:.78rem; color:var(--muted); text-align:center; }
    .set-input { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.5rem .4rem; font-size:.88rem; color:var(--text); font-family:var(--font); text-align:center; outline:none; width:100%; }
    .set-input:focus { border-color:var(--accent); }
    .set-check { width:32px; height:32px; border-radius:8px; border:2px solid var(--border); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.9rem; transition:all .2s; }
    .set-check.done { background:var(--accent); border-color:var(--accent); }
    .set-row.completed { opacity:.6; }
    .set-row.completed .set-input { background:var(--surface3); }

    .btn-add-set { width:100%; padding:.6rem; background:none; border:1px dashed var(--border); border-radius:10px; color:var(--muted); font-size:.82rem; font-family:var(--font); cursor:pointer; margin-top:.4rem; }
    .btn-add-set:active { border-color:var(--accent); color:var(--accent); }

    .prev-record { font-size:.7rem; color:var(--muted); background:var(--surface2); border-radius:8px; padding:.4rem .7rem; margin-bottom:.6rem; }
    .prev-record span { color:var(--accent); font-weight:500; }

    /* Rest Timer Overlay */
    .rest-overlay { position:fixed; inset:0; background:rgba(15,15,20,.92); backdrop-filter:blur(8px); z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; }
    .rest-overlay.show { display:flex; }
    .rest-label { font-size:.8rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
    .rest-time { font-size:5rem; font-weight:600; letter-spacing:-.04em; color:var(--accent); line-height:1; }
    .rest-exercise { font-size:.9rem; color:var(--muted); margin-top:.75rem; }
    .rest-controls { display:flex; gap:.75rem; margin-top:2rem; }
    .rest-preset { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.6rem .9rem; font-size:.82rem; color:var(--text); cursor:pointer; font-family:var(--font); }
    .rest-preset.active { border-color:var(--accent); color:var(--accent); }
    .rest-adjust { display:flex; align-items:center; gap:1rem; margin-top:1rem; }
    .rest-adj-btn { width:44px; height:44px; border-radius:12px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:var(--font); }
    .rest-adj-label { font-size:.75rem; color:var(--muted); }
    .rest-skip { margin-top:1.5rem; background:none; border:none; color:var(--muted); font-size:.85rem; cursor:pointer; font-family:var(--font); }
    .rest-progress { width:200px; height:4px; background:var(--surface); border-radius:2px; margin-top:1.5rem; overflow:hidden; }
    .rest-progress-bar { height:100%; background:var(--accent); border-radius:2px; transition:width 1s linear; }

    /* Add Exercise Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); z-index:100; display:none; align-items:flex-end; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:24px 24px 0 0; padding:1.5rem 1.25rem 2rem; width:100%; max-height:92vh; overflow-y:auto; animation:slideUp .3s ease; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 1.25rem; }
    .modal-title { font-size:1.1rem; font-weight:500; margin-bottom:1rem; }

    /* Search */
    .search-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:.75rem 1rem; font-size:.95rem; color:var(--text); font-family:var(--font); outline:none; margin-bottom:1rem; }
    .search-input:focus { border-color:var(--accent); }

    /* Category filter */
    .cat-filter { display:flex; gap:.4rem; overflow-x:auto; margin-bottom:1rem; padding-bottom:.25rem; }
    .cat-btn { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:.35rem .75rem; font-size:.72rem; color:var(--muted); cursor:pointer; white-space:nowrap; font-family:var(--font); flex-shrink:0; }
    .cat-btn.active { background:var(--accent); border-color:var(--accent); color:#1a1a24; font-weight:500; }

    /* Exercise list */
    .exercise-list-item { display:flex; align-items:center; justify-content:space-between; padding:.75rem 0; border-bottom:1px solid var(--border); cursor:pointer; }
    .exercise-list-item:last-child { border-bottom:none; }
    .exercise-list-name { font-size:.9rem; font-weight:400; }
    .exercise-list-meta { font-size:.7rem; color:var(--muted); margin-top:.15rem; }
    .exercise-list-badge { font-size:.62rem; padding:.2rem .5rem; border-radius:20px; }
    .badge-strength { background:rgba(108,142,255,.15); color:var(--blue); }
    .badge-cardio { background:rgba(255,124,110,.15); color:var(--accent2); }
    .badge-bodyweight { background:rgba(94,207,160,.15); color:var(--accent); }
    .badge-stretch { background:rgba(179,136,255,.15); color:var(--purple); }
    .badge-mindfulness { background:rgba(245,200,66,.15); color:var(--yellow); }

    /* Menu Tab */
    .menu-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1rem 1.1rem; margin-bottom:.75rem; }
    .menu-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.5rem; }
    .menu-card-name { font-size:.95rem; font-weight:500; }
    .menu-card-meta { font-size:.72rem; color:var(--muted); }
    .menu-exercises { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.6rem; }
    .menu-ex-tag { font-size:.68rem; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.2rem .5rem; color:var(--muted); }
    .btn-use-menu { background:var(--accent); color:#1a1a24; border:none; border-radius:8px; padding:.5rem .9rem; font-size:.78rem; font-weight:600; font-family:var(--font); cursor:pointer; }

    /* Timer Tab */
    .timer-display { text-align:center; padding:2rem 0; }
    .timer-big { font-size:5rem; font-weight:600; letter-spacing:-.04em; color:var(--text); line-height:1; }
    .timer-presets { display:grid; grid-template-columns:repeat(5,1fr); gap:.5rem; margin-bottom:1rem; }
    .timer-preset { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.6rem .3rem; font-size:.78rem; color:var(--text); cursor:pointer; font-family:var(--font); text-align:center; }
    .timer-preset.active { border-color:var(--accent); color:var(--accent); }
    .timer-adjust { display:flex; align-items:center; justify-content:center; gap:1.5rem; margin-bottom:1.5rem; }
    .timer-adj-btn { width:48px; height:48px; border-radius:14px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .timer-adj-label { font-size:.72rem; color:var(--muted); text-align:center; }
    .timer-controls { display:flex; gap:.75rem; justify-content:center; }
    .btn-timer-start { background:var(--accent); color:#1a1a24; border:none; border-radius:14px; padding:.9rem 2rem; font-size:1rem; font-weight:600; font-family:var(--font); cursor:pointer; }
    .btn-timer-stop { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:.9rem 1.5rem; font-size:1rem; color:var(--text); font-family:var(--font); cursor:pointer; }
    .timer-progress { width:100%; height:6px; background:var(--surface); border-radius:3px; margin:1.5rem 0; overflow:hidden; }
    .timer-progress-bar { height:100%; background:var(--accent); border-radius:3px; transition:width 1s linear; width:100%; }

    /* History Tab */
    .history-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1rem 1.1rem; margin-bottom:.75rem; }
    .history-date { font-size:.78rem; color:var(--muted); margin-bottom:.4rem; }
    .history-title { font-size:.95rem; font-weight:500; margin-bottom:.5rem; }
    .history-stats { display:flex; gap:1rem; }
    .history-stat { font-size:.75rem; color:var(--muted); }
    .history-stat span { color:var(--text); font-weight:500; }
    .history-exercises { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.6rem; }
    .history-ex-tag { font-size:.68rem; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:.2rem .5rem; color:var(--muted); }

    /* Analysis Tab */
    .analysis-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1rem 1.1rem; margin-bottom:.75rem; }
    .analysis-title { font-size:.85rem; font-weight:500; margin-bottom:.75rem; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:.75rem; }
    .stat-card { background:var(--surface2); border-radius:12px; padding:.85rem; }
    .stat-label { font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:.3rem; }
    .stat-value { font-size:1.4rem; font-weight:600; letter-spacing:-.02em; }
    .stat-sub { font-size:.68rem; color:var(--muted); margin-top:.2rem; }

    /* Streak */
    .streak-display { text-align:center; padding:1rem 0; }
    .streak-num { font-size:3rem; font-weight:600; color:var(--yellow); }
    .streak-label { font-size:.8rem; color:var(--muted); margin-top:.25rem; }
    .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:.4rem; margin-top:1rem; }
    .week-day { aspect-ratio:1; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.62rem; color:var(--muted); background:var(--surface2); }
    .week-day.done { background:var(--accent); color:#1a1a24; font-weight:500; }
    .week-day.today { border:2px solid var(--accent); }

    /* Bar chart */
    .bar-chart-wrap { display:flex; align-items:flex-end; gap:6px; height:100px; margin:1rem 0 .5rem; }
    .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; height:100%; justify-content:flex-end; }
    .bar-fill { width:100%; border-radius:5px 5px 0 0; background:var(--accent); opacity:.7; min-height:4px; }
    .bar-fill.current { opacity:1; }
    .bar-x { font-size:.58rem; color:var(--muted); }

    /* Pro badge */
    .pro-gate { text-align:center; padding:2rem 1rem; }
    .pro-gate-icon { font-size:2.5rem; margin-bottom:.75rem; }
    .pro-gate-title { font-size:1rem; font-weight:500; margin-bottom:.5rem; }
    .pro-gate-text { font-size:.82rem; color:var(--muted); line-height:1.6; margin-bottom:1.25rem; }
    .btn-upgrade { background:var(--yellow); color:#1a1a24; border:none; border-radius:12px; padding:.85rem 2rem; font-size:.95rem; font-weight:600; font-family:var(--font); cursor:pointer; }

    /* FAB */
    .fab { position:fixed; bottom:calc(72px + env(safe-area-inset-bottom)); right:1.25rem; width:56px; height:56px; border-radius:18px; background:var(--accent); color:#1a1a24; border:none; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 24px rgba(94,207,160,.4); z-index:50; transition:transform .15s; }
    .fab:active { transform:scale(.92); }

    /* Ad */
    .ad-banner { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:.6rem 1rem; display:flex; align-items:center; justify-content:center; gap:.5rem; z-index:40; padding-bottom:calc(.6rem + env(safe-area-inset-bottom)); }
    .ad-label { font-size:.6rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
    .ad-content { font-size:.78rem; color:var(--muted); flex:1; text-align:center; }

    /* Form elements */
    input, select, textarea { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:.75rem 1rem; font-size:.95rem; color:var(--text); font-family:var(--font); outline:none; }
    input:focus, select:focus { border-color:var(--accent); }
    .form-group { margin-bottom:.875rem; }
    .form-label { font-size:.72rem; color:var(--muted); letter-spacing:.05em; text-transform:uppercase; display:block; margin-bottom:.4rem; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
    .btn-primary { width:100%; padding:.9rem; background:var(--accent); color:#1a1a24; border:none; border-radius:12px; font-size:.95rem; font-weight:600; font-family:var(--font); cursor:pointer; margin-top:.5rem; }
    .btn-cancel { width:100%; padding:.75rem; background:none; color:var(--muted); border:none; font-size:.88rem; font-family:var(--font); cursor:pointer; }
    .btn-icon { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); font-size:.75rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    .empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); }
    .empty-icon { font-size:2.5rem; margin-bottom:.75rem; }

    .toast { position:fixed; top:1.5rem; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:.75rem 1.25rem; font-size:.85rem; font-weight:500; z-index:300; animation:toastIn .3s ease; white-space:nowrap; }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .divider { display:flex; align-items:center; gap:.75rem; margin:.875rem 0; color:var(--muted); font-size:.75rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
  </style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <a class="back-link" href="index.html"> Totonoi One</a>
    <button class="auth-chip" id="authBtn" onclick="openAuthModal()">ログイン</button>
  </div>
  <h1 class="app-title">Fit<span>ly</span></h1>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('record',this)">記録</button>
  <button class="tab" onclick="switchTab('menu',this)">メニュー</button>
  <button class="tab" onclick="switchTab('timer',this)">タイマー</button>
  <button class="tab" onclick="switchTab('history',this)">履歴</button>
  <button class="tab" onclick="switchTab('analysis',this)">分析</button>
</div>

<!-- 記録タブ -->
<div class="view active" id="view-record">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
    <div>
      <p class="section-label">今日のワークアウト</p>
      <p class="workout-timer" id="workoutTimer">00:00</p>
    </div>
    <div style="display:flex;gap:.5rem;">
      <button class="btn-start" id="btnStartWorkout" onclick="startWorkout()">開始</button>
      <button class="btn-end" id="btnEndWorkout" onclick="endWorkout()" style="display:none;">完了</button>
    </div>
  </div>

  <div id="exerciseList"></div>

  <button onclick="openAddExercise()" style="width:100%;padding:.8rem;background:none;border:1px dashed var(--border);border-radius:14px;color:var(--muted);font-size:.88rem;font-family:var(--font);cursor:pointer;margin-bottom:.75rem;">
    ＋ 種目を追加
  </button>

  <button onclick="saveWorkout()" id="btnSave" style="display:none;width:100%;padding:.9rem;background:var(--blue);color:#fff;border:none;border-radius:14px;font-size:.95rem;font-weight:600;font-family:var(--font);cursor:pointer;">
    💾 ワークアウトを保存
  </button>
</div>

<!-- メニュータブ -->
<div class="view" id="view-menu">
  <p class="section-label">保存済みメニュー</p>
  <div id="menuList"></div>
  <button onclick="openSaveMenu()" style="width:100%;padding:.8rem;background:none;border:1px dashed var(--border);border-radius:14px;color:var(--muted);font-size:.88rem;font-family:var(--font);cursor:pointer;">
    ＋ 現在の種目をメニューとして保存
  </button>
</div>

<!-- タイマータブ -->
<div class="view" id="view-timer">
  <div class="timer-display">
    <p style="font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;">インターバルタイマー</p>
    <p class="timer-big" id="timerDisplay">01:30</p>
  </div>
  <div class="timer-progress"><div class="timer-progress-bar" id="timerProgressBar"></div></div>
  <div class="timer-presets">
    <button class="timer-preset" onclick="setTimerPreset(30)">30s</button>
    <button class="timer-preset" onclick="setTimerPreset(60)">1m</button>
    <button class="timer-preset active" onclick="setTimerPreset(90)">90s</button>
    <button class="timer-preset" onclick="setTimerPreset(120)">2m</button>
    <button class="timer-preset" onclick="setTimerPreset(180)">3m</button>
  </div>
  <div class="timer-adjust">
    <div>
      <button class="timer-adj-btn" onclick="adjustTimer(-15)">−</button>

// State
var currentWorkout = {exercises:[], startTime:null, running:false};
var workoutTimerInterval = null;
var restTimerInterval = null;
var restTimeLeft = 0;
var restTotalTime = 90;
var timerSeconds = 90;
var timerTotal = 90;
var timerInterval = null;
var timerRunning = false;
var selectedCat = 'all';
var exerciseSettings = JSON.parse(localStorage.getItem('exerciseSettings') || '{}');
var savedMenus = JSON.parse(localStorage.getItem('fitlyMenus') || '[]');
var workoutHistory = JSON.parse(localStorage.getItem('fitlyHistory') || '[]');

// ── Init ──
function init() {
  buildCatFilter();
  renderExerciseModal();
  renderMenuList();
  renderHistory();
  renderAnalysis();
  updateProUI();
}

// ── Tab ──
function switchTab(name, btn) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='history') renderHistory();
  if (name==='analysis') renderAnalysis();
}

// ── Workout Timer ──
function startWorkout() {
  currentWorkout.startTime = Date.now();
  currentWorkout.running = true;
  document.getElementById('btnStartWorkout').style.display = 'none';
  document.getElementById('btnEndWorkout').style.display = 'block';
  document.getElementById('btnSave').style.display = 'block';
  workoutTimerInterval = setInterval(updateWorkoutTimer, 1000);
}

function updateWorkoutTimer() {
  if (!currentWorkout.startTime) return;
  var elapsed = Math.floor((Date.now() - currentWorkout.startTime) / 1000);
  var m = Math.floor(elapsed / 60), s = elapsed % 60;
  document.getElementById('workoutTimer').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function endWorkout() {
  saveWorkout();
}

function saveWorkout() {
  if (!currentWorkout.exercises.length) { showToast('種目を追加してください'); return; }
  var elapsed = currentWorkout.startTime ? Math.floor((Date.now() - currentWorkout.startTime) / 1000) : 0;
  var totalSets = 0, totalVolume = 0;
  currentWorkout.exercises.forEach(function(ex) {
    ex.sets.forEach(function(s) {
      if (s.done) { totalSets++; totalVolume += (Number(s.weight)||0) * (Number(s.reps)||0); }
    });
  });
  var record = {
    id: Date.now().toString(),
    date: new Date().toISOString(),
    duration: elapsed,
    exercises: currentWorkout.exercises,
    totalSets: totalSets,
    totalVolume: totalVolume
  };
  workoutHistory.unshift(record);
  localStorage.setItem('fitlyHistory', JSON.stringify(workoutHistory));
  dbSave('history', workoutHistory);

  // 種目ごとの設定を保存
  currentWorkout.exercises.forEach(function(ex) {
    if (!exerciseSettings[ex.id]) exerciseSettings[ex.id] = {};
    var lastDone = ex.sets.filter(function(s){ return s.done; });
    if (lastDone.length) {
      exerciseSettings[ex.id].lastWeight = lastDone[lastDone.length-1].weight;
      exerciseSettings[ex.id].lastReps = lastDone[lastDone.length-1].reps;
      exerciseSettings[ex.id].lastSets = lastDone.length;
    }
  });
  localStorage.setItem('exerciseSettings', JSON.stringify(exerciseSettings));
  dbSave('exSettings', exerciseSettings);

  clearInterval(workoutTimerInterval);
  currentWorkout = {exercises:[], startTime:null, running:false};
  document.getElementById('workoutTimer').textContent = '00:00';
  document.getElementById('btnStartWorkout').style.display = 'block';
  document.getElementById('btnEndWorkout').style.display = 'none';
  document.getElementById('btnSave').style.display = 'none';
  renderExerciseCards();
  showToast('✅ ワークアウトを保存しました！');
}

// ── Exercise Cards ──
function renderExerciseCards() {
  var el = document.getElementById('exerciseList');
  if (!currentWorkout.exercises.length) { el.innerHTML = ''; return; }
  el.innerHTML = currentWorkout.exercises.map(function(ex, ei) {
    var settings = exerciseSettings[ex.id] || {};
    var prevHTML = settings.lastWeight
      ? '<div class="prev-record">前回: <span>'+settings.lastWeight+'kg × '+settings.lastReps+'回 × '+settings.lastSets+'セット</span></div>'
      : '';
    var ytURL = 'https://www.youtube.com/results?search_query='+encodeURIComponent((ex.keyword||ex.name)+' やり方 フォーム');
    var setsHTML = ex.sets.map(function(s, si) {
      var doneClass = s.done ? ' done' : '';
      var rowClass = s.done ? ' completed' : '';
      return '<div class="set-row'+rowClass+'" id="setrow-'+ei+'-'+si+'">'
        +'<span class="set-num">'+(si+1)+'</span>'
        +'<input type="number" class="set-input" placeholder="kg" value="'+(s.weight||'')+'" onchange="updateSet('+ei+','+si+',\'weight\',this.value)">'
        +'<input type="number" class="set-input" placeholder="回" value="'+(s.reps||'')+'" onchange="updateSet('+ei+','+si+',\'reps\',this.value)">'
        +'<input type="number" class="set-input" placeholder="s" value="'+(s.rir||'')+'" onchange="updateSet('+ei+','+si+',\'rir\',this.value)">'
        +'<button class="set-check'+doneClass+'" onclick="completeSet('+ei+','+si+')">'+(s.done?'✓':'')+'</button>'
        +'</div>';
    }).join('');
    return '<div class="exercise-card">'
      +'<div class="exercise-header">'
      +'<div><p class="exercise-name">'+ex.name+'</p>'
      +'<p class="exercise-meta">'+PART_LABELS[ex.part]+'・'+CAT_LABELS[ex.cat]+'</p></div>'
      +'<div style="display:flex;gap:.4rem;align-items:center;">'
      +'<a href="'+ytURL+'" target="_blank" class="btn-yt">▶ 動画</a>'
      +'<button class="btn-icon" onclick="removeExercise('+ei+')">🗑</button>'
      +'</div></div>'
      +prevHTML
      +'<div class="set-header"><span></span><span class="set-header-label">重量</span><span class="set-header-label">回数</span><span class="set-header-label">RIR</span><span></span></div>'
      +setsHTML
      +'<button class="btn-add-set" onclick="addSet('+ei+')">＋ セットを追加</button>'
      +'</div>';
  }).join('');
}

function addExerciseToWorkout(ex) {
  var settings = exerciseSettings[ex.id] || {};
  var defaultSets = settings.lastSets || 3;
  var sets = [];
  for (var i=0;i<defaultSets;i++) {
    sets.push({weight: settings.lastWeight||'', reps: settings.lastReps||'', rir:'', done:false});
  }
  var restTime = exerciseSettings[ex.id] && exerciseSettings[ex.id].restTime
    ? exerciseSettings[ex.id].restTime
    : DEFAULT_REST[ex.cat] || 90;
  currentWorkout.exercises.push({
    id: ex.id, name: ex.name, cat: ex.cat, part: ex.part,
    keyword: ex.keyword||'', sets: sets, restTime: restTime
  });
  renderExerciseCards();
  closeModal('addExerciseModal');
  if (!currentWorkout.running) startWorkout();
}

function removeExercise(ei) {
  currentWorkout.exercises.splice(ei, 1);
  renderExerciseCards();
}

function addSet(ei) {
  var ex = currentWorkout.exercises[ei];
  var last = ex.sets[ex.sets.length-1] || {};
  ex.sets.push({weight: last.weight||'', reps: last.reps||'', rir:'', done:false});
  renderExerciseCards();
}

function updateSet(ei, si, field, val) {
  currentWorkout.exercises[ei].sets[si][field] = val;
}

function completeSet(ei, si) {
  var set = currentWorkout.exercises[ei].sets[si];
  set.done = !set.done;
  if (set.done) {
    // 種目の休憩設定を保存
    var ex = currentWorkout.exercises[ei];
    var restTime = ex.restTime || 90;
    if (ex.cat !== 'cardio' && ex.cat !== 'stretch' && ex.cat !== 'mindfulness') {
      startRestTimer(restTime, ex.name, ex.id);
    }
  }
  renderExerciseCards();
}

// ── Rest Timer ──
function startRestTimer(seconds, exerciseName, exId) {
  if (restTimerInterval) clearInterval(restTimerInterval);
  restTimeLeft = seconds;
  restTotalTime = seconds;
  document.getElementById('restExerciseName').textContent = exerciseName + ' — 次のセット準備';
  document.getElementById('restOverlay').classList.add('show');
  updateRestDisplay();
  restTimerInterval = setInterval(function() {
    restTimeLeft--;
    updateRestDisplay();
    if (restTimeLeft <= 0) {
      clearInterval(restTimerInterval);
      document.getElementById('restOverlay').classList.remove('show');
      // バイブレーション
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
      showToast('🔔 休憩終了！次のセットへ');
      // 休憩時間を記憶
      if (exId && exerciseSettings[exId]) {
        exerciseSettings[exId].restTime = restTotalTime;
        localStorage.setItem('exerciseSettings', JSON.stringify(exerciseSettings));
      }
    }
  }, 1000);
}

function updateRestDisplay() {
  var m = Math.floor(restTimeLeft/60), s = restTimeLeft%60;
  document.getElementById('restTime').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  var pct = (restTimeLeft/restTotalTime)*100;
  document.getElementById('restProgressBar').style.width = pct+'%';
}

function setRestTime(s) {
  restTimeLeft = s; restTotalTime = s;
  document.querySelectorAll('.rest-preset').forEach(function(b){ b.classList.remove('active'); });
  event.target.classList.add('active');
  updateRestDisplay();
  if (restTimerInterval) { clearInterval(restTimerInterval); }
  startRestTimerFromCurrent();
}

function startRestTimerFromCurrent() {
  if (restTimerInterval) clearInterval(restTimerInterval);
  restTimerInterval = setInterval(function() {
    restTimeLeft--;
    updateRestDisplay();
    if (restTimeLeft <= 0) {
      clearInterval(restTimerInterval);
      document.getElementById('restOverlay').classList.remove('show');
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
      showToast('🔔 休憩終了！次のセットへ');
    }
  }, 1000);
}

function adjustRest(delta) {
  restTimeLeft = Math.max(0, restTimeLeft + delta);
  restTotalTime = Math.max(15, restTotalTime + delta);
  updateRestDisplay();
}

function skipRest() {
  clearInterval(restTimerInterval);
  document.getElementById('restOverlay').classList.remove('show');
}

// ── Independent Timer ──
function setTimerPreset(s) {
  timerSeconds = s; timerTotal = s;
  document.querySelectorAll('.timer-preset').forEach(function(b){ b.classList.remove('active'); });
  event.target.classList.add('active');
  document.getElementById('timerSetLabel').textContent = '設定: '+(s>=60?Math.floor(s/60)+'分'+(s%60?s%60+'秒':''):s+'秒');
  updateTimerDisplay();
  if (timerRunning) { clearInterval(timerInterval); timerRunning=false; document.getElementById('btnTimerMain').textContent='▶ スタート'; }
  document.getElementById('timerProgressBar').style.width='100%';
}

function adjustTimer(delta) {
  timerSeconds = Math.max(15, timerSeconds + delta);
  timerTotal = timerSeconds;
  document.getElementById('timerSetLabel').textContent = '設定: '+timerSeconds+'秒';
  updateTimerDisplay();
}

function updateTimerDisplay() {
  var m=Math.floor(timerSeconds/60), s=timerSeconds%60;
  document.getElementById('timerDisplay').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning=false;
    document.getElementById('btnTimerMain').textContent='▶ スタート';
  } else {
    timerRunning=true;
    document.getElementById('btnTimerMain').textContent='⏸ 一時停止';
    timerInterval = setInterval(function() {
      timerSeconds--;
      updateTimerDisplay();
      document.getElementById('timerProgressBar').style.width=(timerSeconds/timerTotal*100)+'%';
      if (timerSeconds<=0) {
        clearInterval(timerInterval); timerRunning=false;
        document.getElementById('btnTimerMain').textContent='▶ スタート';
        if (navigator.vibrate) navigator.vibrate([300,100,300]);
        showToast('🔔 タイマー終了！');
      }
    },1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval); timerRunning=false;
  timerSeconds=timerTotal;
  updateTimerDisplay();
  document.getElementById('timerProgressBar').style.width='100%';
  document.getElementById('btnTimerMain').textContent='▶ スタート';
}

// ── Add Exercise Modal ──
function buildCatFilter() {
  var cats = [{id:'all',label:'すべて'},{id:'strength',label:'筋トレ'},{id:'bodyweight',label:'自重'},{id:'cardio',label:'有酸素'},{id:'stretch',label:'ストレッチ'},{id:'mindfulness',label:'マインドフル'}];
  document.getElementById('catFilter').innerHTML = cats.map(function(c){
    return '<button class="cat-btn'+(c.id==='all'?' active':'')+'" onclick="selectCat(\''+c.id+'\',this)">'+c.label+'</button>';
  }).join('');
}

function selectCat(cat, btn) {
  selectedCat=cat;
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  filterExercises();
}

function filterExercises() {
  var q = document.getElementById('exerciseSearch').value.toLowerCase();
  var customEx = JSON.parse(localStorage.getItem('customExercises') || '[]');
  var allEx = EXERCISE_DB.concat(customEx);
  var filtered = allEx.filter(function(ex) {
    var matchCat = selectedCat==='all' || ex.cat===selectedCat;
    var matchQ = !q || ex.name.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderExerciseModal(filtered);
}

function renderExerciseModal(list) {
  list = list || EXERCISE_DB;
  var el = document.getElementById('exerciseListModal');
  if (!list.length) { el.innerHTML='<p style="font-size:.82rem;color:var(--muted);padding:1rem 0">見つかりませんでした</p>'; return; }
  el.innerHTML = list.map(function(ex){
    var ytURL='https://www.youtube.com/results?search_query='+encodeURIComponent((ex.keyword||ex.name)+' やり方');
    return '<div class="exercise-list-item" onclick="addExerciseToWorkout('+JSON.stringify(ex).replace(/"/g,'&quot;')+')">'
      +'<div><p class="exercise-list-name">'+ex.name+'</p>'
      +'<p class="exercise-list-meta">'+PART_LABELS[ex.part]+'</p></div>'
      +'<div style="display:flex;align-items:center;gap:.5rem;">'
      +'<span class="exercise-list-badge '+CAT_BADGES[ex.cat]+'">'+CAT_LABELS[ex.cat]+'</span>'
      +'<a href="'+ytURL+'" target="_blank" onclick="event.stopPropagation()" class="btn-yt">▶</a>'
      +'</div></div>';
  }).join('');
}

function renderHistory() {

    }

  }
  el.innerHTML=filtered.map(function(w){
    var d=new Date(w.date);
    var dateStr=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');

// ── Analysis ──
function renderAnalysis() {
  var el=document.getElementById('analysisContent');
  if (!isPro) {
    el.innerHTML='<div class="pro-gate"><div class="pro-gate-icon">📊</div><p class="pro-gate-title">分析機能はProプラン限定</p><p class="pro-gate-text">1RM計算・重量推移グラフ・連続日数・部位別ボリュームなどの詳細分析が使えます。</p><button class="btn-upgrade" onclick="startCheckout()">Proにアップグレード</button></div>';
    return;
  }
  // 連続日数
  var streak=calcStreak();
  // 週間
  var weekDays=calcWeekDays();
  // 部位別ボリューム
  var partVolume=calcPartVolume();

  el.innerHTML='<div class="analysis-card">'
    +'<p class="analysis-title">🔥 連続トレーニング日数</p>'
    +'<div class="streak-display"><p class="streak-num">'+streak+'</p><p class="streak-label">日連続</p></div>'
    +'<div class="week-grid">'+['日','月','火','水','木','金','土'].map(function(d,i){
      var cls='week-day'+(weekDays[i]?' done':'')+(i===new Date().getDay()?' today':'');
      return '<div class="'+cls+'">'+d+'</div>';
    }).join('')+'</div></div>'

    +'<div class="analysis-card"><p class="analysis-title">📈 今週の統計</p>'
    +'<div class="stats-grid">'
    +'<div class="stat-card"><p class="stat-label">ワークアウト数</p><p class="stat-value">'+getWeekWorkouts()+'回</p></div>'
    +'<div class="stat-card"><p class="stat-label">総ボリューム</p><p class="stat-value">'+getWeekVolume()+'kg</p></div>'
    +'</div></div>'

    +'<div class="analysis-card"><p class="analysis-title">💪 部位別ボリューム（今週）</p>'
    +renderPartChart(partVolume)+'</div>';
}

function calcStreak() {
  if (!workoutHistory.length) return 0;
  var days=workoutHistory.map(function(w){ return new Date(w.date).toDateString(); });
  var unique=[...new Set(days)];
  var streak=0, d=new Date();
  d.setHours(0,0,0,0);
  for (var i=0;i<365;i++) {
    if (unique.indexOf(d.toDateString())!==-1) streak++;
    else if (i>0) break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function calcWeekDays() {
  var now=new Date(), week=[];
  for (var i=0;i<7;i++) {
    var d=new Date(now); d.setDate(now.getDate()-now.getDay()+i); d.setHours(0,0,0,0);
    var next=new Date(d); next.setDate(d.getDate()+1);
    week.push(workoutHistory.some(function(w){ var wd=new Date(w.date); return wd>=d&&wd<next; }));
  }
  return week;
}

function getWeekWorkouts() {
  var now=new Date(), weekStart=new Date(now); weekStart.setDate(now.getDate()-now.getDay()); weekStart.setHours(0,0,0,0);
  return workoutHistory.filter(function(w){ return new Date(w.date)>=weekStart; }).length;
}

function getWeekVolume() {
  var now=new Date(), weekStart=new Date(now); weekStart.setDate(now.getDate()-now.getDay()); weekStart.setHours(0,0,0,0);
  var total=workoutHistory.filter(function(w){ return new Date(w.date)>=weekStart; }).reduce(function(sum,w){ return sum+w.totalVolume; },0);
  return total.toLocaleString();
}

function calcPartVolume() {
  var now=new Date(), weekStart=new Date(now); weekStart.setDate(now.getDate()-now.getDay()); weekStart.setHours(0,0,0,0);
  var map={};
  workoutHistory.filter(function(w){ return new Date(w.date)>=weekStart; }).forEach(function(w){
    (w.exercises||[]).forEach(function(ex){
      var part=PART_LABELS[ex.part]||ex.part;
      if (!map[part]) map[part]=0;
      (ex.sets||[]).forEach(function(s){ if(s.done) map[part]+=(Number(s.weight)||0)*(Number(s.reps)||0); });
    });
  });
  return map;
}

function renderPartChart(map) {
  var keys=Object.keys(map); if (!keys.length) return '<p style="font-size:.82rem;color:var(--muted)">今週のデータなし</p>';
  var max=Math.max.apply(null,keys.map(function(k){ return map[k]; }));
  return '<div class="bar-chart-wrap">'+keys.map(function(k){
    var pct=Math.round((map[k]/max)*100);
    return '<div class="bar-col"><div class="bar-fill" style="height:'+Math.max(pct,4)+'%"></div><div class="bar-x">'+k+'</div></div>';
  }).join('')+'</div>';
}
