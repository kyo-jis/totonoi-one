<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kakely — 家計簿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest-kakely.json">
  <link rel="icon" type="image/png" href="/favicon.ico">
  <meta name="theme-color" content="#0c0c18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Kakely">
  <link rel="apple-touch-icon" href="/apple-touch-icon-kakely.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c18; --surface: #14142a; --surface2: #1c1c38; --surface3: #242448;
      --border: #2e2e50; --text: #f2f2fa; --muted: #9494b8;
      --accent: #f5a623; --accent-dark: #d4891a; --accent2: #ff7c6e;
      --green: #5ecfa0; --red: #ff6b6b; --yellow: #f5c842;
      --font: 'Outfit', sans-serif;
      --shadow-sm: 0 2px 10px rgba(0,0,0,.3);
      --spring: cubic-bezier(.34,1.56,.64,1);
    }
    html { font-size: 16px; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-weight: 400; min-height: 100vh; padding-bottom: 120px; }

    .app-header { padding: 3rem 1.25rem 1rem; }
    .back-link { font-size: .75rem; color: var(--muted); text-decoration: none; letter-spacing: .1em; text-transform: uppercase; display: inline-flex; align-items: center; gap: .4rem; margin-bottom: 0; }
    .app-title { font-size: 1.6rem; font-weight: 500; letter-spacing: -.02em; }
    .app-title span { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent); }
    .app-subtitle { font-size:.72rem; color:var(--muted); margin-top:.15rem; letter-spacing:.05em; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .auth-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: .3rem .85rem; font-size: .72rem; color: var(--muted); cursor: pointer; font-family: var(--font); transition: all .2s; white-space: nowrap; }
    .auth-chip.logged-in { border-color: var(--accent); color: var(--accent); }
    /* Login Notice */
    .login-notice { margin: -.25rem 1.25rem .75rem; background: rgba(148,148,184,.07); border: 1px solid rgba(148,148,184,.18); border-radius: 12px; padding: .6rem 1rem; display: flex; align-items: center; gap: .65rem; cursor: pointer; font-size: .78rem; color: var(--muted); transition: opacity .2s; }
    .login-notice:active { opacity: .7; }

    /* Summary Card */
    .summary-card { margin: 0 1.25rem 1rem; background: linear-gradient(145deg, #2a1a00 0%, #1a1000 100%); border: 1px solid rgba(245,166,35,.35); border-radius: 24px; padding: 1.5rem; position: relative; overflow: hidden; box-shadow: 0 0 60px rgba(245,166,35,.08), 0 8px 40px rgba(0,0,0,.5); }
    .summary-card::before { content: ''; position: absolute; top: -80px; right: -80px; width: 280px; height: 280px; background: radial-gradient(circle, rgba(245,166,35,.35) 0%, transparent 60%); border-radius: 50%; }
    .summary-label { font-size: .72rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
    .summary-amount { font-size: 3rem; font-weight: 600; letter-spacing: -.04em; }
    .summary-amount sup { font-size: 1.1rem; font-weight: 400; }
    .summary-sub { font-size: .78rem; color: var(--muted); margin-top: .3rem; }
    .summary-income { font-size: .82rem; color: var(--green); margin-top: .25rem; }
    .wallet-balance { font-size: .78rem; color: rgba(245,166,35,.75); margin-top: .4rem; display: none; }
    .card-deco { position: absolute; right: 1rem; bottom: -.75rem; font-size: 8rem; font-weight: 700; line-height: 1; color: rgba(255,255,255,.04); pointer-events: none; user-select: none; }
    .cat-bar { display: flex; gap: .5rem; margin-top: 1rem; flex-wrap: wrap; }
    .cat-bar-item { display: flex; align-items: center; gap: .4rem; font-size: .72rem; color: var(--muted); }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Month Nav */
    .month-nav { display: flex; align-items: center; justify-content: space-between; margin: 0 1.25rem .75rem; }
    .month-nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); width: 32px; height: 32px; cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; }
    .month-nav-title { font-size: .95rem; font-weight: 500; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin: 0 1.25rem .75rem; background: var(--surface); border-radius: 14px; padding: 4px; border: 1px solid var(--border); }
    .tab { flex: 1; padding: .55rem .2rem; font-size: .72rem; font-weight: 400; color: var(--muted); background: none; border: none; border-radius: 10px; cursor: pointer; font-family: var(--font); transition: all .2s var(--spring); }
    .tab.active { background: var(--surface2); color: var(--text); font-weight: 600; box-shadow: var(--shadow-sm); }
    .tab:active { transform: scale(.93); }
    .view { display: none; }
    .view.active { display: block; }

    /* List */
    .list-wrap { padding: 0 1.25rem; }
    .day-group { margin-bottom: 1rem; }
    .day-header { display: flex; justify-content: space-between; align-items: center; padding: .3rem 0 .5rem; border-bottom: 1px solid var(--border); margin-bottom: .4rem; }
    .day-label { font-size: .72rem; color: var(--muted); }
    .day-total { font-size: .78rem; font-weight: 500; color: var(--text); }
    .txn-row { display: flex; align-items: center; gap: .75rem; padding: .6rem .75rem; background: var(--surface); border-radius: 12px; margin-bottom: .35rem; }
    .txn-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; background: var(--surface2); }
    .txn-info { flex: 1; min-width: 0; }
    .txn-name { font-size: .85rem; font-weight: 400; }
    .txn-memo { font-size: .7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-amount { font-size: .9rem; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
    .txn-amount.income { color: var(--green); }
    .txn-row:active { opacity: .7; }
    .txn-right { display: flex; flex-direction: column; align-items: flex-end; gap: .2rem; flex-shrink: 0; }
    .txn-btns { display: flex; gap: .2rem; }
    .txn-btn, .txn-btn-del { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: .7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; font-family: var(--font); }
    .txn-btn-del:active { color: var(--red); }
    .group-badge { display: inline-block; font-size: .58rem; background: rgba(108,142,255,.18); color: #a0c4ff; border-radius: 4px; padding: 1px 4px; margin-left: .3rem; vertical-align: middle; }
    .fixed-badge { display: inline-block; font-size: .58rem; background: rgba(245,166,35,.15); color: var(--accent); border-radius: 4px; padding: 1px 4px; margin-left: .3rem; vertical-align: middle; }
    .transfer-badge { display: inline-block; font-size: .58rem; background: rgba(108,142,255,.15); color: #6c8eff; border-radius: 4px; padding: 1px 4px; margin-left: .3rem; vertical-align: middle; }
    .preset-chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: 1rem; }
    .preset-chip { padding: .4rem .75rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: .78rem; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: .3rem; white-space: nowrap; font-family: var(--font); }
    .preset-chip:active { opacity: .7; }
    .fixed-day-badge { font-size: .68rem; color: var(--accent); background: rgba(245,166,35,.1); border-radius: 10px; padding: .15rem .5rem; margin-left: .4rem; }
    .balance-badge { display: inline-flex; align-items: center; gap: .2rem; font-size: .62rem; border-radius: 10px; padding: .15rem .5rem; margin-left: .4rem; font-weight: 500; vertical-align: middle; }
    .balance-badge.ok  { background: rgba(94,207,160,.15);  color: var(--green); }
    .balance-badge.low { background: rgba(255,107,107,.15); color: var(--red); }
    .balance-hint { font-size: .75rem; padding: .45rem .8rem; border-radius: 8px; margin-top: .4rem; }
    .balance-hint.ok  { background: rgba(94,207,160,.08);  color: var(--green); border: 1px solid rgba(94,207,160,.2); }
    .balance-hint.low { background: rgba(255,107,107,.08); color: var(--red);   border: 1px solid rgba(255,107,107,.25); }
    .empty-state { text-align: center; padding: 3rem 2rem; color: var(--muted); }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .empty-state p { font-size: .88rem; line-height: 1.6; }

    /* Calendar */
    .cal-wrap { padding: 0 1.25rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { font-size: .62rem; text-align: center; color: var(--muted); padding-bottom: .5rem; text-transform: uppercase; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; font-size: .75rem; cursor: pointer; gap: 1px; padding: 2px; }
    .cal-day.today { background: rgba(245,166,35,.2); color: var(--accent); font-weight: 500; }
    .cal-day.has-txn { background: var(--surface); border: 1px solid var(--border); }
    .cal-day.empty { opacity: 0; pointer-events: none; }
    .cal-day-num { font-size: .72rem; }
    .cal-day-amt { font-size: .52rem; color: var(--accent); font-weight: 500; }
    .cal-popup { margin-top: .75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1rem; display: none; }
    .cal-popup.show { display: block; }
    .cal-popup-title { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .75rem; }

    /* Graph */
    .graph-wrap { padding: 0 1.25rem; }
    .graph-section { margin-bottom: 1.5rem; }
    .graph-title { font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: .75rem; }
    .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; }

    /* Budget vs Actual */
    .budget-row { display: flex; align-items: center; gap: .75rem; padding: .55rem 0; border-bottom: 1px solid var(--border); }
    .budget-row:last-child { border-bottom: none; }
    .budget-label { display: flex; align-items: center; gap: .45rem; flex: 1; min-width: 0; font-size: .82rem; }
    .budget-label span:first-child { font-size: 1rem; flex-shrink: 0; }
    .budget-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .budget-bar-wrap { flex: 1.5; min-width: 80px; max-width: 160px; }
    .budget-track { height: 6px; border-radius: 3px; background: var(--surface3); overflow: hidden; }
    .budget-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }
    .budget-fill.warn { background: #f5a623; }
    .budget-fill.over { background: #ff6b6b; }
    .budget-meta { text-align: right; font-size: .72rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .budget-pct { display: block; font-size: .8rem; font-weight: 500; margin-bottom: .1rem; }
    .budget-empty { text-align: center; color: var(--muted); font-size: .82rem; padding: .75rem 0; }

    /* Settings */
    .settings-wrap { padding: 0 1.25rem; }
    .settings-section { margin-bottom: 1.5rem; }
    .settings-title { font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: .75rem; }
    .settings-row { display: flex; align-items: center; gap: .75rem; padding: .65rem .75rem; background: var(--surface); border-radius: 12px; margin-bottom: .35rem; }
    .settings-icon { font-size: 1.1rem; width: 32px; text-align: center; }
    .settings-name { flex: 1; font-size: .88rem; }
    .settings-sub { font-size: .7rem; color: var(--muted); }
    .btn-sm-icon { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: .72rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-add-row { width: 100%; padding: .65rem; background: none; border: 1px dashed var(--border); border-radius: 12px; color: var(--muted); font-size: .82rem; font-family: var(--font); cursor: pointer; margin-top: .35rem; }
    .btn-add-row:active { opacity: .7; }

    /* FAB */
    .fab { position: fixed; bottom: calc(60px + env(safe-area-inset-bottom)); right: 1.25rem; width: 56px; height: 56px; border-radius: 18px; background: var(--accent); color: #1a1000; border: none; font-size: 1.5rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(245,166,35,.45); z-index: 50; transition: transform .15s; }
    .fab:active { transform: scale(.92); }

    .sync-slot{margin-top:.2rem;text-align:right;min-height:.9rem;}
    .sync-badge{display:inline-flex;align-items:center;gap:.2rem;font-size:.55rem;font-weight:500;padding:.08rem .32rem;border-radius:20px;cursor:default;white-space:nowrap;}
    .sync-local{background:rgba(148,148,184,.15);color:var(--muted);}
    .sync-syncing{background:rgba(108,142,255,.15);color:#6c8eff;}
    .sync-synced{background:rgba(94,207,160,.15);color:#5ecfa0;}
    .sync-failed{background:rgba(255,107,107,.15);color:#ff6b6b;cursor:pointer;}
    /* Ad */
    .ad-banner { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: .6rem 1rem; display: flex; align-items: center; justify-content: center; gap: .5rem; z-index: 40; padding-bottom: calc(.6rem + env(safe-area-inset-bottom)); }
    .ad-label { font-size: .6rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(6px); z-index: 100; display: none; align-items: flex-end; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 1.5rem 1.25rem 2rem; width: 100%; max-height: 92vh; overflow-y: auto; animation: slideUp .3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1.25rem; }
    .modal-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 1.25rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: .75rem; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: .4rem; }
    input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1rem; font-size: .95rem; color: var(--text); font-family: var(--font); outline: none; transition: border-color .15s; }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .btn-primary { width: 100%; padding: .9rem; background: var(--accent); color: #1a1000; border: none; border-radius: 12px; font-size: .95rem; font-weight: 600; font-family: var(--font); cursor: pointer; margin-top: .5rem; }
    .btn-danger { width: 100%; padding: .75rem; background: none; color: var(--red); border: 1px solid rgba(255,107,107,.3); border-radius: 12px; font-size: .88rem; font-family: var(--font); cursor: pointer; margin-top: .5rem; }
    .btn-cancel { width: 100%; padding: .75rem; background: none; color: var(--muted); border: none; font-size: .88rem; font-family: var(--font); cursor: pointer; margin-top: .25rem; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; background: var(--surface2); border-radius: 10px; margin-bottom: 1rem; }
    .toggle-label { font-size: .9rem; }
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 24px; transition: .3s; }
    .toggle-slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
    input:checked + .toggle-slider { background: var(--green); }
    input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* Type selector */
    .type-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .4rem; margin-bottom: 1rem; }
    .type-btn { padding: .65rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; font-family: var(--font); font-size: .82rem; color: var(--muted); cursor: pointer; text-align: center; transition: all .15s; }
    .type-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(245,166,35,.1); }

    /* Category grid in modal */
    .cat-scroll { max-height: 220px; overflow-y: auto; margin-bottom: 1rem; -webkit-overflow-scrolling: touch; }
    .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .4rem; }
    .cat-chip { padding: .6rem .3rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-family: var(--font); text-align: center; transition: all .15s; }
    .cat-chip.selected { border-color: var(--accent); background: rgba(245,166,35,.12); }
    .cat-chip .ci { font-size: 1.3rem; display: block; }
    .cat-chip .cn { font-size: .65rem; color: var(--muted); margin-top: .2rem; line-height: 1.3; }
    .cat-chip.selected .cn { color: var(--accent); }
    .cat-chip:active { transform: scale(.93); }

    /* Group Input */
    .fab-group { position:fixed; bottom:calc(60px + env(safe-area-inset-bottom)); right:calc(1.25rem + 56px + .75rem); width:auto; height:40px; border-radius:20px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); font-size:.75rem; font-family:var(--font); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0 .9rem; gap:.35rem; z-index:50; white-space:nowrap; box-shadow:0 2px 10px rgba(0,0,0,.3); }
    .fab-group:active { transform:scale(.93); }
    .group-row { display:flex; gap:.4rem; align-items:center; margin-bottom:.4rem; }
    .group-row select { flex:1; min-width:0; font-size:.82rem; }
    .group-row .g-amt { width:90px; flex-shrink:0; font-size:.88rem; text-align:right; }
    .group-row-del { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); font-size:.88rem; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .group-row-del:active { opacity:.7; }
    .group-remaining { display:flex; justify-content:space-between; align-items:center; padding:.65rem 1rem; background:var(--surface2); border-radius:12px; margin:.75rem 0 .6rem; }
    .group-remaining-label { font-size:.78rem; color:var(--muted); }
    .group-remaining-amt { font-size:1.1rem; font-weight:600; }
    .group-remaining-amt.ok   { color:var(--green); }
    .group-remaining-amt.over { color:var(--red); }
    .group-remaining-amt.under { color:var(--accent); }
    .group-assign { display:flex; gap:.4rem; margin-bottom:.75rem; }
    .group-assign select { flex:1; font-size:.82rem; }
    .btn-assign { padding:.55rem .75rem; background:var(--surface3); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:.75rem; font-family:var(--font); cursor:pointer; white-space:nowrap; }
    .btn-assign:active { transform:scale(.93); }

    /* Toast */
    .toast { position: fixed; bottom: calc(80px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border); border-radius: 20px; padding: .55rem 1.2rem; font-size: .82rem; color: var(--text); white-space: nowrap; z-index: 200; pointer-events: none; }

    /* PC graph helpers (hidden on mobile) */
    .pie-legend-pc { display: none; }
    .pie-legend-row { display: flex; align-items: center; gap: .5rem; font-size: .78rem; }
    .pie-legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .pie-legend-amt { margin-left: auto; color: var(--muted); font-size: .72rem; white-space: nowrap; }
    .graph-pc-only { display: none; }
    .graph-grid { display: block; }
    .heatmap-cell { width: 13px; height: 13px; border-radius: 2px; flex-shrink: 0; cursor: default; transition: opacity .15s; }
    .heatmap-cell:hover { opacity: .7; }
    .heatmap-dow-label { height: 13px; font-size: .6rem; color: var(--muted); line-height: 13px; text-align: right; padding-right: 3px; }

    /* PC layout ≥768px */
    @media (min-width: 768px) {
      body { padding-bottom: 2rem; }
      .app-header { max-width: 1040px; margin-left: auto; margin-right: auto; padding-left: 2rem; padding-right: 2rem; }
      .login-notice { max-width: 1040px; margin-left: auto; margin-right: auto; }
      .summary-card { max-width: 1040px; margin-left: auto; margin-right: auto; }
      .month-nav { max-width: 1040px; margin-left: auto; margin-right: auto; }

<script>
// ── Date helpers ──
function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseLocalDate(str) {
  if (!str) return null;
  var p = str.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}
function fmtAmt(n) { return '¥' + Math.abs(n).toLocaleString(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(str) {
  var d = parseLocalDate(str);
  return (d.getMonth()+1) + '/' + d.getDate() + '（' + ['日','月','火','水','木','金','土'][d.getDay()] + '）';
}

function loadFromStorage() {

    categories = DEFAULT_CATS.map(function(c, i) {

      return Object.assign({ id: 'defpay_' + i }, p);
    });
    localStorage.setItem('kakely_pays', JSON.stringify(paymentMethods));
  }
}

// ── Summary ──
function updateSummary() {
  var expenses = transactions.filter(function(t){ return !t.is_income && !t.is_transfer; });
  var incomes  = transactions.filter(function(t){ return t.is_income  && !t.is_transfer; });
  var totalExp = expenses.reduce(function(s,t){ return s+t.amount; }, 0);
  var totalInc = incomes.reduce(function(s,t){ return s+t.amount; }, 0);

  document.getElementById('summaryAmount').innerHTML = '<sup>¥</sup>' + totalExp.toLocaleString();
  document.getElementById('summarySub').textContent = expenses.length ? expenses.length + '件の支出' : '記録なし';

  var incEl = document.getElementById('summaryIncome');
  if (totalInc > 0) {
    incEl.style.display = '';
    incEl.textContent = '収入 ¥' + totalInc.toLocaleString() + '　収支 ' + (totalInc - totalExp >= 0 ? '+' : '') + '¥' + (totalInc - totalExp).toLocaleString();
  } else {
    incEl.style.display = 'none';
  }

  // Category bar (top 3)
  var catTotals = {};
  expenses.forEach(function(t) {
    if (!t.category_id) return;
    catTotals[t.category_id] = (catTotals[t.category_id] || 0) + t.amount;
  });
  var sorted = Object.keys(catTotals).sort(function(a,b){ return catTotals[b]-catTotals[a]; }).slice(0,3);
  var bar = document.getElementById('catBar');
  bar.innerHTML = sorted.map(function(cid, i) {
    var cat = categories.find(function(c){ return c.id===cid; });
    if (!cat) return '';
    var pct = totalExp ? Math.round(catTotals[cid]/totalExp*100) : 0;
    return '<span class="cat-bar-item"><span class="cat-dot" style="background:'+CAT_COLORS[i]+'"></span>'
      + cat.icon + ' ' + cat.name + ' ' + pct + '%</span>';
  }).join('');
}

// ── List ──
function renderList() {
  var el = document.getElementById('txnList');
  if (!transactions.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📒</div><p>この月の記録はありません。<br>＋ボタンで追加してください。</p></div>';
    return;
  }
  var grouped = {};
  transactions.forEach(function(t) {
    if (!grouped[t.date]) grouped[t.date] = [];
    grouped[t.date].push(t);
  });
  var dates = Object.keys(grouped).sort(function(a,b){ return b.localeCompare(a); });
  el.innerHTML = dates.map(function(date) {
    var txns = grouped[date];
    var dayTotal = txns.reduce(function(s,t){ return s + (!t.is_income && !t.is_transfer ? t.amount : 0); }, 0);
    var todayStr = localDateStr(new Date());
    var label = date === todayStr ? '今日 ' + fmtDate(date) : fmtDate(date);
    return '<div class="day-group">'
      + '<div class="day-header"><span class="day-label">' + label + '</span>'
      + (dayTotal ? '<span class="day-total">−¥' + dayTotal.toLocaleString() + '</span>' : '') + '</div>'
      + txns.map(function(t) {
          var cat = categories.find(function(c){ return c.id===t.category_id; });
          var pay = paymentMethods.find(function(p){ return p.id===t.payment_method_id; });
          var isGroup    = !!t.group_id && !t.is_transfer;
          var isFixed    = !!(t.memo && t.memo.indexOf('固定費:') === 0);
          var isTransfer = !!t.is_transfer;
          var nameLine;
          if (isTransfer) {
            nameLine = '資金移動' + (pay ? ' · ' + pay.icon + esc(pay.name) : '') + ' <span class="transfer-badge">移動</span>';
          } else {
            nameLine = esc(cat ? cat.name : '未分類') + (pay ? ' · ' + pay.icon + esc(pay.name) : '');
            if (isGroup) nameLine += ' <span class="group-badge">まとめ</span>';
            if (isFixed) nameLine += ' <span class="fixed-badge">固定費</span>';
          }
          var memoTxt = (!isFixed && !isTransfer && t.memo) ? esc(t.memo) : '';
          var delFn = isTransfer
            ? 'openTxnModal(\'' + t.id + '\')'
            : isGroup
              ? 'deleteGroupTxns(\'' + t.group_id + '\',event)'
              : 'quickDeleteTxn(\'' + t.id + '\',event)';
          var amtPrefix = isTransfer ? (t.is_income ? '↙' : '↗') : (t.is_income ? '+' : '−');
          return '<div class="txn-row" style="animation:slideIn .25s ease">'
            + '<div class="txn-icon" onclick="openTxnModal(\'' + t.id + '\')" style="cursor:pointer">' + (isTransfer ? '💸' : (cat ? cat.icon : '❓')) + '</div>'
            + '<div class="txn-info" onclick="openTxnModal(\'' + t.id + '\')" style="cursor:pointer">'
            + '<p class="txn-name">' + nameLine + '</p>'
            + (memoTxt ? '<p class="txn-memo">' + memoTxt + '</p>' : '') + '</div>'
            + '<div class="txn-right">'
            + '<span class="txn-amount' + (t.is_income ? ' income' : '') + '" style="' + (isTransfer ? 'color:#6c8eff' : '') + '">'
            + amtPrefix + '¥' + t.amount.toLocaleString() + '</span>'
            + '<div class="txn-btns">'
            + '<button class="txn-btn" onclick="openTxnModal(\'' + t.id + '\')">✏️</button>'
            + (isTransfer
              ? '<button class="txn-btn-del" onclick="editTxnId=\'' + t.id + '\';deleteTxn()">🗑</button>'
              : '<button class="txn-btn-del" onclick="' + delFn + '">🗑</button>')
            + '</div></div>'
            + '<div class="sync-slot"></div>'
            + '</div>';
        }).join('') + '</div>';
  }).join('');
}

// ── Calendar ──
function renderCalendar() {
  var dows = ['日','月','火','水','木','金','土'];
  var html = dows.map(function(d){ return '<div class="cal-dow">' + d + '</div>'; }).join('');
  var firstDay = new Date(viewYear, viewMonth, 1).getDay();
  var dim = new Date(viewYear, viewMonth+1, 0).getDate();
  var todayStr = localDateStr(new Date());

  // Build date totals
  var dateTotals = {};
  transactions.forEach(function(t) {
    if (!t.is_income && !t.is_transfer) dateTotals[t.date] = (dateTotals[t.date] || 0) + t.amount;
  });

  for (var i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
  for (var d = 1; d <= dim; d++) {
    var ds = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var isToday = ds === todayStr;
    var hasTxn = dateTotals[ds];
    var cls = 'cal-day' + (isToday ? ' today' : '') + (hasTxn ? ' has-txn' : '');
    var amtStr = hasTxn ? '<span class="cal-day-amt">¥' + (hasTxn >= 10000 ? Math.round(hasTxn/1000)+'k' : hasTxn.toLocaleString()) + '</span>' : '';
    html += '<div class="' + cls + '" onclick="showCalPopup(\'' + ds + '\')">'
      + '<span class="cal-day-num">' + d + '</span>' + amtStr + '</div>';
  }
  document.getElementById('calGrid').innerHTML = html;
}

function showCalPopup(dateStr) {
  var dayTxns = transactions.filter(function(t){ return t.date === dateStr; });
  if (!dayTxns.length) { document.getElementById('calPopup').classList.remove('show'); return; }
  var d = parseLocalDate(dateStr);
  document.getElementById('calPopupTitle').textContent = (d.getMonth()+1) + '月' + d.getDate() + '日';
  document.getElementById('calPopupItems').innerHTML = dayTxns.map(function(t) {
    var cat = categories.find(function(c){ return c.id===t.category_id; });
    return '<div class="txn-row" onclick="openTxnModal(\'' + t.id + '\')">'
      + '<div class="txn-icon">' + (cat ? cat.icon : '❓') + '</div>'
      + '<div class="txn-info"><p class="txn-name">' + (cat ? cat.name : '未分類') + '</p>'
      + (t.memo ? '<p class="txn-memo">' + t.memo + '</p>' : '') + '</div>'
      + '<span class="txn-amount' + (t.is_income ? ' income' : '') + '">'
      + (t.is_income ? '+' : '−') + '¥' + t.amount.toLocaleString() + '</span></div>';
  }).join('');
  document.getElementById('calPopup').classList.add('show');
}

function renderBudgetSection() {
  var budgetCats = categories.filter(function(c){ return c.budget && c.budget > 0; });
  var section = document.getElementById('budgetSection');
  var list = document.getElementById('budgetList');
  var badge = document.getElementById('budgetSummaryBadge');
  if (!section || !list) return;

  var catTotals = {};
  transactions.filter(function(t){ return !t.is_income && !t.is_transfer; }).forEach(function(t) {
    catTotals[t.category_id || 'none'] = (catTotals[t.category_id || 'none'] || 0) + t.amount;
  });

  if (!budgetCats.length) {
    list.innerHTML = '<p class="budget-empty">予算を設定したカテゴリが表示されます<br><small>設定 → カテゴリ → ✏️ で月予算を入力</small></p>';
    if (badge) badge.style.display = 'none';
    return;
  }

  var catData = budgetCats.map(function(cat) {
    var actual = catTotals[cat.id] || 0;
    var pct = Math.round(actual / cat.budget * 100);
    return { cat: cat, actual: actual, pct: pct };
  }).sort(function(a, b) { return b.pct - a.pct; });

  var totalBudget = 0, totalActual = 0, overCount = 0;
  list.innerHTML = catData.map(function(d) {
    var cat = d.cat, actual = d.actual, pct = d.pct;
    var fillPct = Math.min(pct, 100);
    var fillClass = pct >= 100 ? ' over' : pct >= 80 ? ' warn' : '';
    var pctColor = pct >= 100 ? '#ff6b6b' : pct >= 80 ? '#f5a623' : 'var(--accent)';
    var diff = cat.budget - actual;
    var diffText = diff >= 0
      ? '<span style="color:var(--muted)">残り¥' + diff.toLocaleString() + '</span>'
      : '<span style="color:#ff6b6b">¥' + Math.abs(diff).toLocaleString() + '超過</span>';
    totalBudget += cat.budget;
    totalActual += actual;
    if (pct >= 100) overCount++;
    return '<div class="budget-row">'
      + '<div class="budget-label"><span>' + cat.icon + '</span><span class="budget-name">' + cat.name + '</span></div>'
      + '<div class="budget-bar-wrap"><div class="budget-track"><div class="budget-fill' + fillClass + '" style="width:' + fillPct + '%"></div></div>'
      + '<div style="font-size:.62rem;margin-top:.2rem;text-align:right">' + diffText + '</div></div>'
      + '<div class="budget-meta"><span class="budget-pct" style="color:' + pctColor + '">' + pct + '%</span>'
      + '¥' + actual.toLocaleString() + ' / ¥' + cat.budget.toLocaleString() + '</div>'
      + '</div>';
  }).join('');

  var totalPct = totalBudget ? Math.round(totalActual / totalBudget * 100) : 0;
  var totalColor = totalPct >= 100 ? '#ff6b6b' : totalPct >= 80 ? '#f5a623' : '#5ecfa0';
  var totalDiff = totalBudget - totalActual;
  var totalDiffText = totalDiff >= 0
    ? '<span style="color:var(--muted)">残り¥' + totalDiff.toLocaleString() + '</span>'
    : '<span style="color:#ff6b6b">¥' + Math.abs(totalDiff).toLocaleString() + '超過</span>';
  list.innerHTML += '<div class="budget-row" style="margin-top:.35rem;padding-top:.7rem;border-top:1px solid var(--border);border-bottom:none">'
    + '<div class="budget-label" style="font-weight:500">合計</div>'
    + '<div class="budget-bar-wrap"><div class="budget-track"><div class="budget-fill" style="width:' + Math.min(totalPct, 100) + '%;background:' + totalColor + '"></div></div>'
    + '<div style="font-size:.62rem;margin-top:.2rem;text-align:right">' + totalDiffText + '</div></div>'
    + '<div class="budget-meta"><span class="budget-pct" style="color:' + totalColor + '">' + totalPct + '%</span>'
    + '¥' + totalActual.toLocaleString() + ' / ¥' + totalBudget.toLocaleString() + '</div>'
    + '</div>';

  if (badge) {
    badge.style.display = '';
    if (overCount > 0) {
      badge.textContent = overCount + 'カテゴリ超過';
      badge.style.background = 'rgba(255,107,107,.18)';
      badge.style.color = '#ff6b6b';
    } else {
      badge.textContent = '全カテゴリ予算内';
      badge.style.background = 'rgba(94,207,160,.15)';
      badge.style.color = '#5ecfa0';
    }
  }
}

function renderPieChart(isPC) {
  var expenses = transactions.filter(function(t){ return !t.is_income && !t.is_transfer; });
  var catTotals = {};
  expenses.forEach(function(t) {
    var key = t.category_id || 'none';
    catTotals[key] = (catTotals[key] || 0) + t.amount;
  });
  var labels = [], data = [], colors = [], totalExp = 0;
  Object.keys(catTotals).sort(function(a,b){ return catTotals[b]-catTotals[a]; }).forEach(function(cid, i) {
    var cat = categories.find(function(c){ return c.id===cid; });
    labels.push(cat ? cat.icon + cat.name : '未分類');
    data.push(catTotals[cid]);
    colors.push(CAT_COLORS[i % CAT_COLORS.length]);
    totalExp += catTotals[cid];
  });
  if (_pieChart) _pieChart.destroy();
  var ctx = document.getElementById('pieChart').getContext('2d');
  var legendEl = document.getElementById('pieLegendPC');
  if (!data.length) { ctx.clearRect(0,0,999,999); if (legendEl) legendEl.innerHTML = ''; return; }
  _pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 0 }] },
    options: {
      plugins: {
        legend: isPC ? { display: false } : { position: 'bottom', labels: { color: '#9494b8', font: { size: 11 } } },
        tooltip: { callbacks: { label: function(c){ return ' ¥' + c.parsed.toLocaleString() + ' (' + Math.round(c.parsed/totalExp*100) + '%)'; } } }
      },
      cutout: '60%'
    }
  });
  if (legendEl) {
    legendEl.innerHTML = isPC ? data.map(function(v, i) {
      var pct = totalExp ? Math.round(v/totalExp*100) : 0;
      return '<div class="pie-legend-row"><span class="pie-legend-dot" style="background:' + colors[i] + '"></span>'
        + '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + labels[i] + '</span>'
        + '<span class="pie-legend-amt">¥' + v.toLocaleString() + '&nbsp;' + pct + '%</span></div>';
    }).join('') : '';
  }
}

function renderBarChart(isPC) {
  var mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var count = isPC ? 12 : 6;
  var months = [];
  for (var i = count - 1; i >= 0; i--) {
    var d = new Date(viewYear, viewMonth - i, 1);
    var y = d.getFullYear(), m = d.getMonth();
    var cached = JSON.parse(localStorage.getItem('kakely_txn_' + y + '_' + (m+1)) || '[]');
    var exp = cached.filter(function(t){ return !t.is_income && !t.is_transfer; }).reduce(function(s,t){ return s+t.amount; }, 0);
    var inc = cached.filter(function(t){ return !!t.is_income && !t.is_transfer; }).reduce(function(s,t){ return s+t.amount; }, 0);
    months.push({ label: mn[m], exp: exp, inc: inc, isCur: (y===viewYear && m===viewMonth) });
  }
  if (_barChart) _barChart.destroy();
  var ctx = document.getElementById('barChart').getContext('2d');
  var yFmt = function(v){ return v >= 10000 ? Math.round(v/1000) + 'k' : '¥' + v; };
  var scalesBase = {
    x: { ticks: { color: '#9494b8', font: { size: 10 } }, grid: { display: false } },
    y: { ticks: { color: '#9494b8', font: { size: 10 }, callback: yFmt }, grid: { color: 'rgba(46,46,80,.5)' } }
  };
  if (isPC) {
    _barChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: months.map(function(m){ return m.label; }),
        datasets: [
          { label: '支出', data: months.map(function(m){ return m.exp; }),
            backgroundColor: months.map(function(m){ return m.isCur ? 'rgba(255,107,107,.85)' : 'rgba(255,107,107,.38)'; }),
            borderRadius: 4, borderSkipped: false },
          { label: '収入', data: months.map(function(m){ return m.inc; }),
            backgroundColor: months.map(function(m){ return m.isCur ? 'rgba(94,207,160,.85)' : 'rgba(94,207,160,.38)'; }),
            borderRadius: 4, borderSkipped: false },
          { label: '収支', type: 'line',
            data: months.map(function(m){ return m.inc - m.exp; }),
            borderColor: 'rgba(245,166,35,.8)', backgroundColor: 'transparent',
            borderWidth: 2, pointRadius: 3, tension: 0.3,
            pointBackgroundColor: months.map(function(m){ return m.inc >= m.exp ? '#5ecfa0' : '#ff6b6b'; }) }
        ]
      },
      options: {
        plugins: {
          legend: { labels: { color: '#9494b8', font: { size: 11 } } },
          tooltip: { callbacks: { label: function(c){ return c.dataset.label + ': ¥' + Math.abs(c.parsed.y).toLocaleString() + (c.dataset.label === '収支' && c.parsed.y < 0 ? '（赤字）' : ''); } } }
        },
        scales: scalesBase
      }
    });
  } else {
    _barChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: months.map(function(m){ return m.label; }),
        datasets: [{ data: months.map(function(m){ return m.exp; }),
          backgroundColor: months.map(function(m){ return m.isCur ? 'rgba(245,166,35,.9)' : 'rgba(245,166,35,.35)'; }),
          borderRadius: 6, borderSkipped: false }]
      },
      options: { plugins: { legend: { display: false } }, scales: scalesBase }
    });
  }
}

function renderTrendChart() {
  var curY = viewYear, curM = viewMonth;
  var prevDate = new Date(curY, curM, 0);
  var prevY = prevDate.getFullYear(), prevM = prevDate.getMonth();
  var curCached  = JSON.parse(localStorage.getItem('kakely_txn_' + curY  + '_' + (curM  + 1)) || '[]');
  var prevCached = JSON.parse(localStorage.getItem('kakely_txn_' + prevY + '_' + (prevM + 1)) || '[]');
  var daysInCur  = new Date(curY,  curM  + 1, 0).getDate();
  var daysInPrev = new Date(prevY, prevM + 1, 0).getDate();
  function buildCumulative(cached, days) {
    var daily = new Array(days).fill(0);
    cached.filter(function(t){ return !t.is_income && !t.is_transfer; }).forEach(function(t) {
      var day = parseInt((t.date || '').split('-')[2] || '0', 10) - 1;
      if (day >= 0 && day < days) daily[day] += t.amount;
    });
    var sum = 0;
    return daily.map(function(v){ sum += v; return sum; });
  }
  var today = new Date();
  var isCurMonth = today.getFullYear() === curY && today.getMonth() === curM;
  var todayDay = today.getDate();
  var maxDays = Math.max(daysInCur, daysInPrev);
  var labels = [];
  for (var i = 1; i <= maxDays; i++) labels.push(i + '日');
  var curData  = buildCumulative(curCached,  daysInCur);
  var prevData = buildCumulative(prevCached, daysInPrev);
  if (_trendChart) _trendChart.destroy();
  var ctx = document.getElementById('trendChart').getContext('2d');
  _trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: '今月', data: curData.map(function(v, i){ return isCurMonth && i >= todayDay ? null : v; }),
          borderColor: 'rgba(245,166,35,.9)', backgroundColor: 'rgba(245,166,35,.1)',
          fill: true, tension: 0.3, pointRadius: 2, borderWidth: 2 },
        { label: '先月', data: prevData,
          borderColor: 'rgba(148,148,184,.45)', backgroundColor: 'transparent',
          fill: false, tension: 0.3, pointRadius: 0, borderWidth: 1.5, borderDash: [4, 4] }
      ]
    },
    options: {
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#9494b8', font: { size: 11 } } },
        tooltip: { callbacks: { label: function(c){ return c.dataset.label + ': ¥' + (c.parsed.y || 0).toLocaleString(); } } }
      },
      scales: {
        x: { ticks: { color: '#9494b8', font: { size: 9 }, maxTicksLimit: 10 }, grid: { display: false } },
        y: { ticks: { color: '#9494b8', font: { size: 10 }, callback: function(v){ return v >= 10000 ? Math.round(v/1000) + 'k' : '¥' + v; } }, grid: { color: 'rgba(46,46,80,.5)' } }
      }
    }
  });
}

function renderHeatmap() {
  var box = document.getElementById('heatmapBox');
  if (!box) return;
  var today = new Date();
  var spendMap = {};
  for (var mi = 0; mi <= 12; mi++) {
    var d = new Date(today.getFullYear(), today.getMonth() - mi, 1);
    var y = d.getFullYear(), mo = d.getMonth();
    var cached = JSON.parse(localStorage.getItem('kakely_txn_' + y + '_' + (mo + 1)) || '[]');
    cached.filter(function(t){ return !t.is_income && !t.is_transfer; }).forEach(function(t) {
      if (t.date) spendMap[t.date] = (spendMap[t.date] || 0) + t.amount;
    });
  }
  var vals = Object.values(spendMap);
  var maxSpend = vals.length ? Math.max.apply(null, vals) : 1;
  var start = new Date(today);
  start.setDate(start.getDate() - 52 * 7);
  start.setDate(start.getDate() - start.getDay());
  var weeks = [], cur = new Date(start);
  var mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var monthMarks = [], prevMo = -1;
  while (cur <= today) {
    var week = [];
    for (var dw = 0; dw < 7; dw++) {
      var ds = localDateStr(cur);
      week.push({ date: ds, amt: spendMap[ds] || 0, future: cur > today });
      cur.setDate(cur.getDate() + 1);
    }
    var wkMo = new Date(week[0].date.replace(/-/g, '/')).getMonth();
    if (wkMo !== prevMo) { monthMarks.push({ wi: weeks.length, label: mn[wkMo] }); prevMo = wkMo; }
    weeks.push(week);
  }
  function cellBg(amt) {
    if (!amt) return 'rgba(46,46,80,.5)';
    var t = Math.min(1, amt / maxSpend);
    return 'rgba(245,166,35,' + (0.18 + t * 0.77).toFixed(2) + ')';
  }
  var dowLabels = ['日','月','火','水','木','金','土'];
  var monthRow = '<div style="display:flex;margin-left:24px;margin-bottom:3px;">';
  for (var i = 0; i < monthMarks.length; i++) {
    var nextWi = i + 1 < monthMarks.length ? monthMarks[i+1].wi : weeks.length;
    var span = nextWi - monthMarks[i].wi;
    monthRow += '<span style="width:' + (span * 15) + 'px;font-size:.65rem;color:var(--muted);overflow:hidden;flex-shrink:0;display:inline-block">' + monthMarks[i].label + '</span>';
  }
  monthRow += '</div>';
  var dowHtml = '<div style="display:flex;flex-direction:column;gap:2px;width:20px;flex-shrink:0;margin-right:4px;">';
  dowLabels.forEach(function(d, i) {
    dowHtml += '<div class="heatmap-dow-label"' + (i % 2 ? ' style="visibility:hidden"' : '') + '>' + d + '</div>';
  });
  dowHtml += '</div>';
  var weeksHtml = '<div style="display:flex;gap:2px;">';
  weeks.forEach(function(week) {
    weeksHtml += '<div style="display:flex;flex-direction:column;gap:2px;">';
    week.forEach(function(cell) {
      var title = cell.amt ? cell.date + ': ¥' + cell.amt.toLocaleString() : cell.date;
      weeksHtml += '<div class="heatmap-cell" style="background:' + (cell.future ? 'transparent' : cellBg(cell.amt)) + '" title="' + esc(title) + '"></div>';
    });
    weeksHtml += '</div>';
  });
  weeksHtml += '</div>';
  box.innerHTML = monthRow + '<div style="display:flex;">' + dowHtml + '<div style="overflow-x:auto;">' + weeksHtml + '</div></div>';
}

// ── Transaction Modal ──
function openTxnModal(id) {
  editTxnId = id || null;
  txnIsIncome = false;
  txnIsTransfer = false;
  selectedCatId = null;
  document.getElementById('txnModalTitle').textContent = id ? '記録を編集' : '支出を記録';
  document.getElementById('deleteTxnBtn').style.display = id ? '' : 'none';

  var payOpts = '<option value="">未設定</option>'
    + paymentMethods.map(function(p){ return '<option value="' + p.id + '">' + p.icon + ' ' + p.name + '</option>'; }).join('');
  document.getElementById('fPayMethod').innerHTML = payOpts;

  var transferOpts = paymentMethods.map(function(p){ return '<option value="' + p.id + '">' + p.icon + ' ' + p.name + '</option>'; }).join('');
  document.getElementById('fTransferFrom').innerHTML = transferOpts;
  document.getElementById('fTransferTo').innerHTML   = transferOpts;

  if (id) {
    var t = transactions.find(function(x){ return x.id === id; });
    if (!t) return;
    if (t.is_transfer) {
      setTxnType('transfer');
      var partner = transactions.find(function(x){ return x.group_id === t.group_id && x.id !== t.id; });
      var fromTxn = t.is_income ? partner : t;
      var toTxn   = t.is_income ? t       : partner;
      document.getElementById('fTransferFrom').value   = fromTxn ? (fromTxn.payment_method_id || '') : '';
      document.getElementById('fTransferTo').value     = toTxn   ? (toTxn.payment_method_id   || '') : '';
      document.getElementById('fTransferAmount').value = t.amount;
      document.getElementById('fTransferDate').value   = t.date;
      document.getElementById('saveTxnBtn').textContent = '移動を更新する';
      document.getElementById('deleteTxnBtn').textContent = '資金移動を削除する';
    } else {
      setTxnType(t.is_income ? 'income' : 'expense');
      document.getElementById('fAmount').value = t.amount;
      document.getElementById('fDate').value = t.date;
      document.getElementById('fMemo').value = t.memo || '';
      document.getElementById('fPayMethod').value = t.payment_method_id || '';
      selectedCatId = t.category_id || null;
      buildCatGrid();
      document.getElementById('deleteTxnBtn').textContent = '削除する';
    }
  } else {
    setTxnType('expense');
    document.getElementById('fAmount').value = '';
    document.getElementById('fDate').value = localDateStr(new Date());
    document.getElementById('fMemo').value = '';
    document.getElementById('fTransferAmount').value = '';
    document.getElementById('fTransferDate').value = localDateStr(new Date());
    document.getElementById('deleteTxnBtn').textContent = '削除する';
    buildCatGrid();

  document.getElementById('txnModal').classList.add('show');
  setTimeout(function(){ document.getElementById('fAmount').focus(); }, 300);
}

async function saveTransfer() {
  var fromId = document.getElementById('fTransferFrom').value;
  var toId   = document.getElementById('fTransferTo').value;
  var amount = parseInt(document.getElementById('fTransferAmount').value);
  var date   = document.getElementById('fTransferDate').value;
  if (!fromId || !toId || !amount || !date) { showToast('すべての項目を入力してください'); return; }
  if (fromId === toId) { showToast('移動元と移動先が同じです'); return; }

  // 編集の場合: 既存ペアを残高ロールバックして削除してから再作成
  if (editTxnId) {
    var existing = transactions.find(function(t){ return t.id === editTxnId; });
    if (existing && existing.group_id) {
      var oldGid = existing.group_id;
      var grp = transactions.filter(function(t){ return t.group_id === oldGid; });
      grp.forEach(function(t){ updateCashBalance(t.payment_method_id, t.is_income ? -t.amount : t.amount); });
      transactions = transactions.filter(function(t){ return t.group_id !== oldGid; });
      if (currentUser) await _sb.from('kakely_transactions').delete().eq('group_id', oldGid);
    }
    editTxnId = null;
  }

  var groupId = 'tf_' + Date.now();
  var fromPay = { id: groupId + '_from', amount: amount, date: date,
    is_income: false, is_transfer: true, group_id: groupId,
    payment_method_id: fromId, category_id: null, memo: null };
  var toPay   = { id: groupId + '_to',   amount: amount, date: date,
    is_income: true,  is_transfer: true, group_id: groupId,
    payment_method_id: toId,   category_id: null, memo: null };

  transactions.unshift(toPay);
  transactions.unshift(fromPay);

  if (currentUser) {
    var fromPayload = { user_id: currentUser.id, amount: amount, date: date,
      is_income: false, is_transfer: true, group_id: groupId,
      payment_method_id: fromId, category_id: null, memo: null };
    var toPayload   = { user_id: currentUser.id, amount: amount, date: date,
      is_income: true,  is_transfer: true, group_id: groupId,
      payment_method_id: toId,   category_id: null, memo: null };
    var r1 = await _sb.from('kakely_transactions').insert(fromPayload).select().single();
    var r2 = await _sb.from('kakely_transactions').insert(toPayload).select().single();
    if (r1.data) fromPay.id = r1.data.id;
    if (r2.data) toPay.id   = r2.data.id;
  }

  updateCashBalance(fromId, -amount);
  updateCashBalance(toId,    amount);
  saveMonthCache();
  closeModal('txnModal');
  renderAll();
  showToast('資金移動を記録しました ✓');
}

async function saveTxn() {
  var amount = parseInt(document.getElementById('fAmount').value);
  var date   = document.getElementById('fDate').value;
  if (!amount || !date) { showToast('金額と日付を入力してください'); return; }

  var payload = {
    amount: amount, date: date, is_income: txnIsIncome,
    category_id: txnIsIncome ? null : (selectedCatId || null),
    payment_method_id: document.getElementById('fPayMethod').value || null,
    memo: document.getElementById('fMemo').value.trim() || null
  };

  if (editTxnId) {
    // 編集前の取引を取得して残高を戻す
    var old = transactions.find(function(t){ return t.id === editTxnId; });
    if (old && old.payment_method_id) {
      var oldDelta = old.is_income ? -old.amount : old.amount;
      updateCashBalance(old.payment_method_id, oldDelta);
    }
    // 新しい値で更新
    var idx = transactions.findIndex(function(t){ return t.id === editTxnId; });
    if (idx !== -1) transactions[idx] = Object.assign(transactions[idx], payload);
    if (currentUser) await _sb.from('kakely_transactions').update(payload).eq('id', editTxnId);
  } else {
    var newTxn = Object.assign({ id: 'temp_' + Date.now() }, payload);
    transactions.unshift(newTxn);
    if (currentUser) {
      var res = await _sb.from('kakely_transactions').insert(Object.assign({ user_id: currentUser.id }, payload)).select().single();
      if (res.data) newTxn.id = res.data.id;
    }
  }

  // 残高更新（支出は減算・収入は加算）
  if (payload.payment_method_id) {
    var delta = payload.is_income ? payload.amount : -payload.amount;
    updateCashBalance(payload.payment_method_id, delta);
  }

  saveMonthCache();
  closeModal('txnModal');
  renderAll();
  showToast(editTxnId ? '更新しました' : '記録しました ✓');
}

async function deleteTxn() {
  if (!editTxnId || !confirm('この記録を削除しますか？')) return;
  var del = transactions.find(function(t){ return t.id === editTxnId; });

  if (del && del.is_transfer && del.group_id) {
    // 資金移動は pair を両方削除
    var grp = transactions.filter(function(t){ return t.group_id === del.group_id; });
    grp.forEach(function(t) {
      updateCashBalance(t.payment_method_id, t.is_income ? -t.amount : t.amount);
    });
    var gid = del.group_id;
    transactions = transactions.filter(function(t){ return t.group_id !== gid; });
    if (currentUser) await _sb.from('kakely_transactions').delete().eq('group_id', gid);
    saveMonthCache(); closeModal('txnModal'); renderAll(); showToast('資金移動を削除しました');
    return;
  }

  if (del && del.payment_method_id) {
    var undoDelta = del.is_income ? -del.amount : del.amount;
    updateCashBalance(del.payment_method_id, undoDelta);
  }
  var delId = editTxnId;
  transactions = transactions.filter(function(t){ return t.id !== delId; });
  saveMonthCache();
  closeModal('txnModal');
  renderAll();
  showToast('削除しました');
  if (currentUser && !String(delId).startsWith('tmp_') && !String(delId).startsWith('temp_')) {
    await _sb.from('kakely_transactions').delete().eq('id', delId);
  }
}

// ── 残高管理 ──
function updateCashBalance(payId, delta) {
  if (!payId) return;
  var p = paymentMethods.find(function(x){ return x.id === payId; });
  if (!p || p.type !== 'cash' || p.balance == null) return;
  p.balance = p.balance + delta;
  localStorage.setItem('kakely_pays', JSON.stringify(paymentMethods));
  if (currentUser) _sb.from('kakely_payment_methods').update({ balance: p.balance }).eq('id', payId);
  updateBalanceDisplay();
  renderSettings();
}

function updateBalanceDisplay() {
  var el = document.getElementById('walletBalance');
  if (!el) return;
  var cashPays = paymentMethods.filter(function(p){ return p.type === 'cash' && p.balance != null; });
  if (cashPays.length === 0) { el.style.display = 'none'; return; }
  var total = cashPays.reduce(function(s,p){ return s + p.balance; }, 0);
  el.textContent = '💴 財布残高 ¥' + total.toLocaleString();
  el.style.display = 'block';
}

function showToast(msg) {

function generateUUID() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random()*16|0;
    return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}

function uniqueCategories() {
  var seen = {};
  return categories
    .slice().sort(function(a,b){ return (a.sort_order||0)-(b.sort_order||0); })
    .filter(function(c) {
      if (seen[c.name]) return false;
      seen[c.name] = true; return true;
    });
}

function buildGroupCatOptions(selectedId) {
  return uniqueCategories().map(function(c) {
    return '<option value="'+c.id+'"'+(c.id===selectedId?' selected':'')+'>'+c.icon+' '+c.name+'</option>';
  }).join('');
}

async function saveGroupTxns() {
  var total = parseInt(document.getElementById('gTotal').value)||0;
  var date  = document.getElementById('gDate').value;
  var payId = document.getElementById('gPayMethod').value||null;
  if (!date || total <= 0) { showToast('合計金額と日付を入力してください'); return; }
  if (calcGroupRemaining() !== 0) { showToast('残りが0円になるよう明細を入力してください'); return; }

  var rows = document.querySelectorAll('#groupRows .group-row');
  var items = [];
  rows.forEach(function(row) {
    var catId = row.querySelector('.g-cat-sel').value;
    var amt   = parseInt(row.querySelector('.g-amt').value)||0;
    if (amt > 0) items.push({ category_id: catId||null, amount: amt });
  });
  if (!items.length) { showToast('明細を入力してください'); return; }

  var groupId = generateUUID();

  // ローカル保存
  items.forEach(function(item) {
    transactions.unshift({
      id: 'tmp_'+Date.now()+'_'+Math.random().toString(36).slice(2),
      amount: item.amount, date: date, is_income: false,
      category_id: item.category_id, payment_method_id: payId,
      memo: null, group_id: groupId
    });
  });
  saveMonthCache();

  // Supabase保存
  if (currentUser) {
    var ins = await _sb.from('kakely_transactions').insert(
      items.map(function(item) {
        return { user_id: currentUser.id, amount: item.amount, date: date, is_income: false,
          category_id: item.category_id, payment_method_id: payId, memo: null, group_id: groupId };
      })
    ).select();
    if (ins.data && ins.data.length) {
      // tempIDをSupabaseの実UUIDに置き換え（fetchMonthTransactionsは呼ばない）
      transactions = transactions.filter(function(t){ return t.group_id !== groupId; });
      ins.data.slice().reverse().forEach(function(t){ transactions.unshift(t); });
      saveMonthCache();
    }
  }

  closeModal('groupModal');
  renderAll();
  showToast('まとめて記録しました ✓');
}

// ── Subly連携 ──
function matchSublyPayment(payCode) {
  if (!payCode) return null;
  var cardCodes = ['visa','master','jcb','amex'];
  var emoneyMap = { 'paypay':'PayPay', 'rakutenpay':'楽天', 'linepay':'LINE' };
  if (cardCodes.indexOf(payCode) !== -1) {
    var m = paymentMethods.find(function(p){ return p.type==='card'; });
    return m ? m.id : null;
  }
  if (emoneyMap[payCode]) {
    var keyword = emoneyMap[payCode];
    var m = paymentMethods.find(function(p){ return p.name.indexOf(keyword) !== -1; });
    if (!m) m = paymentMethods.find(function(p){ return p.type==='emoney'; });
    return m ? m.id : null;
  }
  if (payCode === 'bank') {
    var m = paymentMethods.find(function(p){ return p.type==='bank'; });
    return m ? m.id : null;
  }
  if (['docomo','au','softbank'].indexOf(payCode) !== -1) {
    var m = paymentMethods.find(function(p){ return p.type==='emoney'; });
    return m ? m.id : null;
  }
  return null;
}

async function autoAddSublyTransactions() {
  if (!currentUser) return;

  // Sublyのサブスクデータ取得
  var res = await _sb.from('user_data')
    .select('data')
    .eq('user_id', currentUser.id)
    .eq('app', 'subly')
    .eq('key', 'subs')
    .maybeSingle();
  if (!res.data || !res.data.data) return;

  var subs = res.data.data;
  var today = localDateStr(new Date());

  // 今日が請求日のサブスク（買い切り除く）
  var todaySubs = subs.filter(function(s) {
    return s.nextBillingDate === today && s.cycle !== 'once';
  });
  if (todaySubs.length === 0) return;

  // 「サブスク」カテゴリを確保
  var subCat = categories.find(function(c){ return c.name === 'サブスク'; });
  if (!subCat) {
    var cr = await _sb.from('kakely_categories')
      .insert({ user_id: currentUser.id, icon: '💳', name: 'サブスク', sort_order: 99 })
      .select().single();
    if (cr.data) {
      subCat = cr.data;
      categories.push(subCat);
      localStorage.setItem('kakely_cats', JSON.stringify(categories));
    }
  }

  var addedCount = 0;
  var addedTotal = 0;
  var addedNames = [];

  for (var i = 0; i < todaySubs.length; i++) {
    var sub = todaySubs[i];
    var memoKey = 'サブスク自動追加:' + sub.id;

    // 重複チェック（今月のローカルキャッシュで確認）
    var already = transactions.some(function(t) {
      return t.date === today && t.memo && t.memo.indexOf(memoKey) !== -1;
    });
    if (already) continue;

    var payId = matchSublyPayment(sub.payment);
    var amount = Math.round(Number(sub.amount));

    var txnPayload = {
      user_id: currentUser.id,
      amount: amount,
      date: today,
      is_income: false,
      category_id: subCat ? subCat.id : null,
      payment_method_id: payId,
      memo: memoKey
    };

    var tr = await _sb.from('kakely_transactions').insert(txnPayload).select().single();
    if (tr.data) {
      transactions.unshift(tr.data);
      addedCount++;
      addedTotal += amount;
      addedNames.push(sub.name);
    }
  }

  if (addedCount > 0) {
    saveMonthCache();
    renderAll();
    var msg = addedNames.join('・') + ' ¥' + addedTotal.toLocaleString() + ' を家計簿に追加しました';
    showToast('💳 ' + msg);
  }
}

function applyFixedPreset(idx) {

async function saveFixedCost() {
  var name = document.getElementById('fFixedName').value.trim();
  var amount = parseInt(document.getElementById('fFixedAmount').value);
  var day = parseInt(document.getElementById('fFixedDay').value);
  if (!name || !amount || !day || day < 1 || day > 31) { showToast('名前・金額・日付を正しく入力してください'); return; }
  var catId = document.getElementById('fFixedCat').value || null;
  var catObj = categories.find(function(c){ return c.id===catId; });
  var payload = { name:name, amount:amount, day:day, category_id:catId, payment_method_id:document.getElementById('fFixedPay').value||null, icon:catObj?catObj.icon:'💴' };
  if (editFixedId) {
    var idx = fixedCosts.findIndex(function(fc){ return fc.id===editFixedId; });
    if (idx !== -1) fixedCosts[idx] = Object.assign(fixedCosts[idx], payload);
  } else {
    fixedCosts.push(Object.assign({ id:'fix_'+Date.now() }, payload));
  }
  localStorage.setItem('kakely_fixed', JSON.stringify(fixedCosts));
  if (currentUser) await _sb.from('user_data').upsert({ user_id:currentUser.id, app:'kakely', key:'fixed_costs', data:fixedCosts }, { onConflict:'user_id,app,key' });
  closeModal('fixedModal'); renderSettings(); showToast('固定費を保存しました');
}

async function deleteFixedCost() {
  if (!editFixedId || !confirm('この固定費を削除しますか？')) return;
  fixedCosts = fixedCosts.filter(function(fc){ return fc.id!==editFixedId; });
  localStorage.setItem('kakely_fixed', JSON.stringify(fixedCosts));
  if (currentUser) await _sb.from('user_data').upsert({ user_id:currentUser.id, app:'kakely', key:'fixed_costs', data:fixedCosts }, { onConflict:'user_id,app,key' });
  closeModal('fixedModal'); renderSettings(); showToast('削除しました');
}

async function autoAddFixedCosts() {
  if (!fixedCosts.length) return;
  var today = new Date();
  var todayDay = today.getDate();
  var todayStr = localDateStr(today);
  var todayY = today.getFullYear();
  var todayM = today.getMonth();
  var isCurMonth = (todayY === viewYear && todayM === viewMonth);
  var cacheKey = 'kakely_txn_' + todayY + '_' + (todayM + 1);
  var added = 0;
  for (var i = 0; i < fixedCosts.length; i++) {
    var fc = fixedCosts[i];
    if (fc.day !== todayDay) continue;
    var memoKey = '固定費:' + fc.id;
    // 重複チェック: 表示中の月はtransactions、それ以外はlocalStorageで確認
    var checkArr = isCurMonth ? transactions : JSON.parse(localStorage.getItem(cacheKey) || '[]');
    if (checkArr.some(function(t){ return t.memo && t.memo.indexOf(memoKey) !== -1; })) continue;
    var payload = { amount:fc.amount, date:todayStr, is_income:false, category_id:fc.category_id||null, payment_method_id:fc.payment_method_id||null, memo:memoKey };
    var newTxn = Object.assign({ id:'tmp_fix_'+Date.now()+'_'+i }, payload);
    if (currentUser) {
      var res = await _sb.from('kakely_transactions').insert(Object.assign({ user_id:currentUser.id }, payload)).select().single();
      if (res.data) newTxn = res.data;
    }
    if (isCurMonth) {
      transactions.unshift(newTxn);
    } else {
      var cached = JSON.parse(localStorage.getItem(cacheKey) || '[]');
      cached.unshift(newTxn);
      localStorage.setItem(cacheKey, JSON.stringify(cached));
    }
    added++;
  }
  if (added > 0) {
    if (isCurMonth) saveMonthCache();
    renderAll();
    showToast('🏠 固定費 ' + added + '件を自動追加しました');
  }
}

async function resetCategoriesToDefault() {
  if (!confirm('カテゴリをデフォルト21種類にリセットしますか？\n\n⚠️ 自分で追加したカテゴリはすべて削除されます。\n既存の取引データのカテゴリ紐付けは解除されます。')) return;
  // Supabase: 既存カテゴリを全削除 → デフォルトを挿入
  if (currentUser) {
    await _sb.from('kakely_categories').delete().eq('user_id', currentUser.id);
    var res = await _sb.from('kakely_categories').insert(
      DEFAULT_CATS.map(function(c){ return Object.assign({ user_id: currentUser.id }, c); })
    ).select();
    categories = res.data || DEFAULT_CATS.map(function(c, i){ return Object.assign({ id:'default_'+i }, c); });
  } else {
    categories = DEFAULT_CATS.map(function(c, i){ return Object.assign({ id:'default_'+i }, c); });
  }
  localStorage.setItem('kakely_cats', JSON.stringify(categories));
  renderSettings();
  showToast('カテゴリをデフォルトに戻しました');
}

async function deduplicateCategories() {
  var seen = {}, toDelete = [], deduped = [];
  categories.slice().sort(function(a,b){ return (a.sort_order||999)-(b.sort_order||999); }).forEach(function(c) {
    var key = (c.name||'').trim().toLowerCase();
    if (seen[key]) toDelete.push(c.id);
    else { seen[key] = true; deduped.push(c); }
  });
  if (!toDelete.length) return;
  if (currentUser) {
    for (var i = 0; i < toDelete.length; i++) await _sb.from('kakely_categories').delete().eq('id', toDelete[i]);
  }
  categories = deduped;
  localStorage.setItem('kakely_cats', JSON.stringify(categories));
  showToast('重複カテゴリを ' + toDelete.length + '件整理しました');
}
