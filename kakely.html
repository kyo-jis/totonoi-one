<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kakely — 家計簿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest-kakely.json">
  <link rel="icon" type="image/png" href="/favicon.ico">
  <meta name="theme-color" content="#0c0c18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Kakely">
  <link rel="apple-touch-icon" href="/apple-touch-icon-kakely.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c18; --surface: #14142a; --surface2: #1c1c38; --surface3: #242448;
      --border: #2e2e50; --text: #f2f2fa; --muted: #9494b8;
      --accent: #f5a623; --accent-dark: #d4891a; --accent2: #ff7c6e;
      --green: #5ecfa0; --red: #ff6b6b; --yellow: #f5c842;
      --font: 'Outfit', sans-serif;
      --shadow-sm: 0 2px 10px rgba(0,0,0,.3);
      --spring: cubic-bezier(.34,1.56,.64,1);
    }
    html { font-size: 16px; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-weight: 400; min-height: 100vh; padding-bottom: 120px; }

    .app-header { padding: 3rem 1.25rem 1rem; }
    .back-link { font-size: .75rem; color: var(--muted); text-decoration: none; letter-spacing: .1em; text-transform: uppercase; display: inline-flex; align-items: center; gap: .4rem; margin-bottom: 0; }
    .app-title { font-size: 1.6rem; font-weight: 500; letter-spacing: -.02em; }
    .app-title span { font-family: 'Playfair Display', serif; font-style: italic; color: var(--accent); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .auth-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: .3rem .85rem; font-size: .72rem; color: var(--muted); cursor: pointer; font-family: var(--font); transition: all .2s; white-space: nowrap; }
    .auth-chip.logged-in { border-color: var(--accent); color: var(--accent); }
    /* Login Notice */
    .login-notice { margin: -.25rem 1.25rem .75rem; background: rgba(148,148,184,.07); border: 1px solid rgba(148,148,184,.18); border-radius: 12px; padding: .6rem 1rem; display: flex; align-items: center; gap: .65rem; cursor: pointer; font-size: .78rem; color: var(--muted); transition: opacity .2s; }
    .login-notice:active { opacity: .7; }

    /* Summary Card */
    .summary-card { margin: 0 1.25rem 1rem; background: linear-gradient(145deg, #2a1a00 0%, #1a1000 100%); border: 1px solid rgba(245,166,35,.35); border-radius: 24px; padding: 1.5rem; position: relative; overflow: hidden; box-shadow: 0 0 60px rgba(245,166,35,.08), 0 8px 40px rgba(0,0,0,.5); }
    .summary-card::before { content: ''; position: absolute; top: -80px; right: -80px; width: 280px; height: 280px; background: radial-gradient(circle, rgba(245,166,35,.35) 0%, transparent 60%); border-radius: 50%; }
    .summary-label { font-size: .72rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
    .summary-amount { font-size: 3rem; font-weight: 600; letter-spacing: -.04em; }
    .summary-amount sup { font-size: 1.1rem; font-weight: 400; }
    .summary-sub { font-size: .78rem; color: var(--muted); margin-top: .3rem; }
    .summary-income { font-size: .82rem; color: var(--green); margin-top: .25rem; }
    .card-deco { position: absolute; right: 1rem; bottom: -.75rem; font-size: 8rem; font-weight: 700; line-height: 1; color: rgba(255,255,255,.04); pointer-events: none; user-select: none; }
    .cat-bar { display: flex; gap: .5rem; margin-top: 1rem; flex-wrap: wrap; }
    .cat-bar-item { display: flex; align-items: center; gap: .4rem; font-size: .72rem; color: var(--muted); }
    .cat-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Month Nav */
    .month-nav { display: flex; align-items: center; justify-content: space-between; margin: 0 1.25rem .75rem; }
    .month-nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); width: 32px; height: 32px; cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; }
    .month-nav-title { font-size: .95rem; font-weight: 500; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin: 0 1.25rem .75rem; background: var(--surface); border-radius: 14px; padding: 4px; border: 1px solid var(--border); }
    .tab { flex: 1; padding: .55rem .2rem; font-size: .72rem; font-weight: 400; color: var(--muted); background: none; border: none; border-radius: 10px; cursor: pointer; font-family: var(--font); transition: all .2s var(--spring); }
    .tab.active { background: var(--surface2); color: var(--text); font-weight: 600; box-shadow: var(--shadow-sm); }
    .tab:active { transform: scale(.93); }
    .view { display: none; }
    .view.active { display: block; }

    /* List */
    .list-wrap { padding: 0 1.25rem; }
    .day-group { margin-bottom: 1rem; }
    .day-header { display: flex; justify-content: space-between; align-items: center; padding: .3rem 0 .5rem; border-bottom: 1px solid var(--border); margin-bottom: .4rem; }
    .day-label { font-size: .72rem; color: var(--muted); }
    .day-total { font-size: .78rem; font-weight: 500; color: var(--text); }
    .txn-row { display: flex; align-items: center; gap: .75rem; padding: .6rem .75rem; background: var(--surface); border-radius: 12px; margin-bottom: .35rem; }
    .txn-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; background: var(--surface2); }
    .txn-info { flex: 1; min-width: 0; }
    .txn-name { font-size: .85rem; font-weight: 400; }
    .txn-memo { font-size: .7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .txn-amount { font-size: .9rem; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
    .txn-amount.income { color: var(--green); }
    .txn-row:active { opacity: .7; }
    .empty-state { text-align: center; padding: 3rem 2rem; color: var(--muted); }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .empty-state p { font-size: .88rem; line-height: 1.6; }

    /* Calendar */
    .cal-wrap { padding: 0 1.25rem; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { font-size: .62rem; text-align: center; color: var(--muted); padding-bottom: .5rem; text-transform: uppercase; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; font-size: .75rem; cursor: pointer; gap: 1px; padding: 2px; }
    .cal-day.today { background: rgba(245,166,35,.2); color: var(--accent); font-weight: 500; }
    .cal-day.has-txn { background: var(--surface); border: 1px solid var(--border); }
    .cal-day.empty { opacity: 0; pointer-events: none; }
    .cal-day-num { font-size: .72rem; }
    .cal-day-amt { font-size: .52rem; color: var(--accent); font-weight: 500; }
    .cal-popup { margin-top: .75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1rem; display: none; }
    .cal-popup.show { display: block; }
    .cal-popup-title { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .75rem; }

    /* Graph */
    .graph-wrap { padding: 0 1.25rem; }
    .graph-section { margin-bottom: 1.5rem; }
    .graph-title { font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: .75rem; }
    .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; }

    /* Settings */
    .settings-wrap { padding: 0 1.25rem; }
    .settings-section { margin-bottom: 1.5rem; }
    .settings-title { font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: .75rem; }
    .settings-row { display: flex; align-items: center; gap: .75rem; padding: .65rem .75rem; background: var(--surface); border-radius: 12px; margin-bottom: .35rem; }
    .settings-icon { font-size: 1.1rem; width: 32px; text-align: center; }
    .settings-name { flex: 1; font-size: .88rem; }
    .settings-sub { font-size: .7rem; color: var(--muted); }
    .btn-sm-icon { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: .72rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-add-row { width: 100%; padding: .65rem; background: none; border: 1px dashed var(--border); border-radius: 12px; color: var(--muted); font-size: .82rem; font-family: var(--font); cursor: pointer; margin-top: .35rem; }
    .btn-add-row:active { opacity: .7; }

    /* FAB */
    .fab { position: fixed; bottom: calc(60px + env(safe-area-inset-bottom)); right: 1.25rem; width: 56px; height: 56px; border-radius: 18px; background: var(--accent); color: #1a1000; border: none; font-size: 1.5rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(245,166,35,.45); z-index: 50; transition: transform .15s; }
    .fab:active { transform: scale(.92); }

    /* Ad */
    .ad-banner { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: .6rem 1rem; display: flex; align-items: center; justify-content: center; gap: .5rem; z-index: 40; padding-bottom: calc(.6rem + env(safe-area-inset-bottom)); }
    .ad-label { font-size: .6rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); backdrop-filter: blur(6px); z-index: 100; display: none; align-items: flex-end; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px 24px 0 0; padding: 1.5rem 1.25rem 2rem; width: 100%; max-height: 92vh; overflow-y: auto; animation: slideUp .3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1.25rem; }
    .modal-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 1.25rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: .75rem; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; margin-bottom: .4rem; }
    input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1rem; font-size: .95rem; color: var(--text); font-family: var(--font); outline: none; transition: border-color .15s; }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .btn-primary { width: 100%; padding: .9rem; background: var(--accent); color: #1a1000; border: none; border-radius: 12px; font-size: .95rem; font-weight: 600; font-family: var(--font); cursor: pointer; margin-top: .5rem; }
    .btn-danger { width: 100%; padding: .75rem; background: none; color: var(--red); border: 1px solid rgba(255,107,107,.3); border-radius: 12px; font-size: .88rem; font-family: var(--font); cursor: pointer; margin-top: .5rem; }
    .btn-cancel { width: 100%; padding: .75rem; background: none; color: var(--muted); border: none; font-size: .88rem; font-family: var(--font); cursor: pointer; margin-top: .25rem; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; background: var(--surface2); border-radius: 10px; margin-bottom: 1rem; }
    .toggle-label { font-size: .9rem; }
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 24px; transition: .3s; }
    .toggle-slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
    input:checked + .toggle-slider { background: var(--green); }
    input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* Type selector */
    .type-selector { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: 1rem; }
    .type-btn { padding: .65rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; font-family: var(--font); font-size: .82rem; color: var(--muted); cursor: pointer; text-align: center; transition: all .15s; }
    .type-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(245,166,35,.1); }

    /* Category grid in modal */
    .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .4rem; margin-bottom: 1rem; }
    .cat-chip { padding: .55rem .3rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-family: var(--font); text-align: center; transition: border-color .15s; }
    .cat-chip.selected { border-color: var(--accent); background: rgba(245,166,35,.1); }
    .cat-chip .ci { font-size: 1.1rem; display: block; }
    .cat-chip .cn { font-size: .6rem; color: var(--muted); margin-top: .15rem; }
    .cat-chip.selected .cn { color: var(--accent); }

    /* Toast */
    .toast { position: fixed; bottom: calc(80px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border); border-radius: 20px; padding: .55rem 1.2rem; font-size: .82rem; color: var(--text); white-space: nowrap; z-index: 200; pointer-events: none; }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E9Q0JQ0V92"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-E9Q0JQ0V92');
  </script>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <a class="back-link" href="index.html">← Totonoi One</a>
    <button class="auth-chip" id="authBtn" onclick="openAuthModal()">ログイン</button>
  </div>
  <h1 class="app-title">Kake<span>ly</span></h1>
</div>
<div id="loginNotice" class="login-notice" onclick="openAuthModal()" style="display:none">
  <span style="font-size:1rem">&#x2601;&#xFE0F;</span>
  <span style="flex:1;line-height:1.4">ログインするとデータをクラウドで保護できます</span>
  <span style="font-size:.75rem;opacity:.6">ログイン →</span>
</div>

<!-- Summary Card -->
<div class="summary-card">
  <p class="summary-label">今月の支出</p>
  <p class="summary-amount" id="summaryAmount"><sup>¥</sup>0</p>
  <p class="summary-sub" id="summarySub">記録なし</p>
  <p class="summary-income" id="summaryIncome" style="display:none"></p>
  <div class="cat-bar" id="catBar"></div>
  <span class="card-deco" aria-hidden="true">¥</span>
</div>

<!-- Month Nav -->
<div class="month-nav">
  <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
  <p class="month-nav-title" id="monthNavTitle"></p>
  <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('list',this)">一覧</button>
  <button class="tab" onclick="switchTab('calendar',this)">カレンダー</button>
  <button class="tab" onclick="switchTab('graph',this)">グラフ</button>
  <button class="tab" onclick="switchTab('settings',this)">設定</button>
</div>

<!-- List -->
<div class="view active" id="view-list">
  <div class="list-wrap" id="txnList"></div>
</div>

<!-- Calendar -->
<div class="view" id="view-calendar">
  <div class="cal-wrap">
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-popup" id="calPopup">
      <p class="cal-popup-title" id="calPopupTitle"></p>
      <div id="calPopupItems"></div>
    </div>
  </div>
</div>

<!-- Graph -->
<div class="view" id="view-graph">
  <div class="graph-wrap">
    <div class="graph-section">
      <p class="graph-title">カテゴリ別支出</p>
      <div class="chart-box"><canvas id="pieChart" height="220"></canvas></div>
    </div>
    <div class="graph-section">
      <p class="graph-title">月別支出推移</p>
      <div class="chart-box"><canvas id="barChart" height="180"></canvas></div>
    </div>
  </div>
</div>

<!-- Settings -->
<div class="view" id="view-settings">
  <div class="settings-wrap">
    <div class="settings-section">
      <p class="settings-title">カテゴリ</p>
      <div id="catList"></div>
      <button class="btn-add-row" onclick="openCatModal()">＋ カテゴリを追加</button>
    </div>
    <div class="settings-section">
      <p class="settings-title">支払い方法</p>
      <div id="payList"></div>
      <button class="btn-add-row" onclick="openPayModal()">＋ 支払い方法を追加</button>
    </div>
  </div>
</div>

<button class="fab" onclick="openTxnModal()">＋</button>
<div class="ad-banner" id="adBanner">
  <span class="ad-label">広告</span>
  <p style="font-size:.78rem;color:var(--muted);flex:1;text-align:center;">Google AdSense 広告エリア</p>
</div>

<!-- Transaction Modal -->
<div class="modal-overlay" id="txnModal" onclick="if(event.target===this)closeModal('txnModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="txnModalTitle">支出を記録</p>
    <div class="type-selector">
      <button class="type-btn active" id="typeExpense" onclick="setTxnType(false)">📤 支出</button>
      <button class="type-btn" id="typeIncome" onclick="setTxnType(true)">📥 収入</button>
    </div>
    <div class="form-group">
      <label class="form-label">金額（円）</label>
      <input type="number" id="fAmount" placeholder="1,200" min="1" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input type="date" id="fDate">
    </div>
    <div class="form-group" id="catSelectWrap">
      <label class="form-label">カテゴリ</label>
      <div class="cat-grid" id="catSelectGrid"></div>
    </div>
    <div class="form-group">
      <label class="form-label">支払い方法</label>
      <select id="fPayMethod">
        <option value="">未設定</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">メモ（任意）</label>
      <input type="text" id="fMemo" placeholder="スーパーマーケット">
    </div>
    <button class="btn-primary" onclick="saveTxn()">記録する</button>
    <button class="btn-danger" id="deleteTxnBtn" onclick="deleteTxn()" style="display:none">削除する</button>
    <button class="btn-cancel" onclick="closeModal('txnModal')">キャンセル</button>
  </div>
</div>

<!-- Category Modal -->
<div class="modal-overlay" id="catModal" onclick="if(event.target===this)closeModal('catModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="catModalTitle">カテゴリを追加</p>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">絵文字</label>
        <input type="text" id="fCatIcon" placeholder="🍱" maxlength="2">
      </div>
      <div class="form-group">
        <label class="form-label">名前</label>
        <input type="text" id="fCatName" placeholder="食費">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">月の予算（任意・円）</label>
      <input type="number" id="fCatBudget" placeholder="30000" min="0" inputmode="numeric">
    </div>
    <button class="btn-primary" onclick="saveCat()">保存する</button>
    <button class="btn-danger" id="deleteCatBtn" onclick="deleteCat()" style="display:none">削除する</button>
    <button class="btn-cancel" onclick="closeModal('catModal')">キャンセル</button>
  </div>
</div>

<!-- Payment Method Modal -->
<div class="modal-overlay" id="payModal" onclick="if(event.target===this)closeModal('payModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="payModalTitle">支払い方法を追加</p>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">絵文字</label>
        <input type="text" id="fPayIcon" placeholder="💳" maxlength="2">
      </div>
      <div class="form-group">
        <label class="form-label">名前</label>
        <input type="text" id="fPayName" placeholder="楽天カード">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">種別</label>
      <select id="fPayType">
        <option value="cash">現金</option>
        <option value="card">クレジットカード</option>
        <option value="emoney">電子マネー</option>
        <option value="bank">銀行口座</option>
      </select>
    </div>
    <div class="form-group" id="withdrawalWrap" style="display:none">
      <label class="form-label">引き落とし日</label>
      <input type="number" id="fWithdrawal" placeholder="27" min="1" max="31" inputmode="numeric">
    </div>
    <button class="btn-primary" onclick="savePay()">保存する</button>
    <button class="btn-danger" id="deletePayBtn" onclick="deletePay()" style="display:none">削除する</button>
    <button class="btn-cancel" onclick="closeModal('payModal')">キャンセル</button>
  </div>
</div>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="modal-handle"></div>
    <p style="text-align:center;font-size:1rem;font-weight:500;margin-bottom:1.25rem;">ログイン</p>
    <button onclick="handleGoogleAuth()" style="width:100%;padding:.85rem;background:#fff;color:#1a1a24;border:none;border-radius:12px;font-size:.95rem;font-weight:500;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:.75rem;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google でログイン
    </button>
    <button class="btn-cancel" onclick="document.getElementById('authModal').classList.remove('show')">キャンセル</button>
  </div>
</div>

<script>
// ── Date helpers ──
function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseLocalDate(str) {
  if (!str) return null;
  var p = str.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}
function fmtAmt(n) { return '¥' + Math.abs(n).toLocaleString(); }
function fmtDate(str) {
  var d = parseLocalDate(str);
  return (d.getMonth()+1) + '/' + d.getDate() + '（' + ['日','月','火','水','木','金','土'][d.getDay()] + '）';
}

// ── State ──
var categories = JSON.parse(localStorage.getItem('kakely_cats') || '[]');
var paymentMethods = JSON.parse(localStorage.getItem('kakely_pays') || '[]');
var transactions = [];
var now = new Date();
var viewYear = now.getFullYear(), viewMonth = now.getMonth();
var editTxnId = null, editCatId = null, editPayId = null;
var txnIsIncome = false;
var selectedCatId = null;
var isPro = localStorage.getItem('isPro') === 'true';
var _pieChart = null, _barChart = null;

var DEFAULT_CATS = [
  {icon:'🍱',name:'食費',sort_order:0},{icon:'🚃',name:'交通',sort_order:1},
  {icon:'🏠',name:'住居',sort_order:2},{icon:'👕',name:'衣服',sort_order:3},
  {icon:'💊',name:'医療',sort_order:4},{icon:'🎮',name:'娯楽',sort_order:5},
  {icon:'📦',name:'日用品',sort_order:6},{icon:'🍺',name:'交際費',sort_order:7},
  {icon:'📚',name:'教育',sort_order:8},{icon:'❓',name:'その他',sort_order:9},
];

var CAT_COLORS = ['#f5a623','#5ecfa0','#6c8eff','#ff7c6e','#b388ff','#f5c842','#4dd0e1','#ff8a65','#a5d6a7','#ce93d8'];

// ── Init ──
function init() {
  updateMonthNav();
  loadFromStorage();
  renderAll();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw-kakely.js');
}

function loadFromStorage() {
  var key = 'kakely_txn_' + viewYear + '_' + (viewMonth+1);
  transactions = JSON.parse(localStorage.getItem(key) || '[]');
}

function renderAll() {
  updateSummary();
  renderList();
  renderCalendar();
  renderSettings();
  if (document.getElementById('view-graph').classList.contains('active')) renderGraph();
}

// ── Month Nav ──
function updateMonthNav() {
  var mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthNavTitle').textContent = viewYear + '年 ' + mn[viewMonth];
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  updateMonthNav();
  loadFromStorage();
  if (currentUser) fetchMonthTransactions();
  else renderAll();
  document.getElementById('calPopup').classList.remove('show');
}

// ── Summary ──
function updateSummary() {
  var expenses = transactions.filter(function(t){ return !t.is_income; });
  var incomes  = transactions.filter(function(t){ return t.is_income; });
  var totalExp = expenses.reduce(function(s,t){ return s+t.amount; }, 0);
  var totalInc = incomes.reduce(function(s,t){ return s+t.amount; }, 0);

  document.getElementById('summaryAmount').innerHTML = '<sup>¥</sup>' + totalExp.toLocaleString();
  document.getElementById('summarySub').textContent = expenses.length ? expenses.length + '件の支出' : '記録なし';

  var incEl = document.getElementById('summaryIncome');
  if (totalInc > 0) {
    incEl.style.display = '';
    incEl.textContent = '収入 ¥' + totalInc.toLocaleString() + '　収支 ' + (totalInc - totalExp >= 0 ? '+' : '') + '¥' + (totalInc - totalExp).toLocaleString();
  } else {
    incEl.style.display = 'none';
  }

  // Category bar (top 3)
  var catTotals = {};
  expenses.forEach(function(t) {
    if (!t.category_id) return;
    catTotals[t.category_id] = (catTotals[t.category_id] || 0) + t.amount;
  });
  var sorted = Object.keys(catTotals).sort(function(a,b){ return catTotals[b]-catTotals[a]; }).slice(0,3);
  var bar = document.getElementById('catBar');
  bar.innerHTML = sorted.map(function(cid, i) {
    var cat = categories.find(function(c){ return c.id===cid; });
    if (!cat) return '';
    var pct = totalExp ? Math.round(catTotals[cid]/totalExp*100) : 0;
    return '<span class="cat-bar-item"><span class="cat-dot" style="background:'+CAT_COLORS[i]+'"></span>'
      + cat.icon + ' ' + cat.name + ' ' + pct + '%</span>';
  }).join('');
}

// ── List ──
function renderList() {
  var el = document.getElementById('txnList');
  if (!transactions.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📒</div><p>この月の記録はありません。<br>＋ボタンで追加してください。</p></div>';
    return;
  }
  // Group by date
  var grouped = {};
  transactions.forEach(function(t) {
    if (!grouped[t.date]) grouped[t.date] = [];
    grouped[t.date].push(t);
  });
  var dates = Object.keys(grouped).sort(function(a,b){ return b.localeCompare(a); });
  el.innerHTML = dates.map(function(date) {
    var txns = grouped[date];
    var dayTotal = txns.reduce(function(s,t){ return s + (t.is_income ? 0 : t.amount); }, 0);
    var todayStr = localDateStr(new Date());
    var label = date === todayStr ? '今日 ' + fmtDate(date) : fmtDate(date);
    return '<div class="day-group">'
      + '<div class="day-header"><span class="day-label">' + label + '</span>'
      + (dayTotal ? '<span class="day-total">−¥' + dayTotal.toLocaleString() + '</span>' : '') + '</div>'
      + txns.map(function(t) {
          var cat = categories.find(function(c){ return c.id===t.category_id; });
          var pay = paymentMethods.find(function(p){ return p.id===t.payment_method_id; });
          return '<div class="txn-row" onclick="openTxnModal(\'' + t.id + '\')" style="animation:slideIn .25s ease">'
            + '<div class="txn-icon">' + (cat ? cat.icon : '❓') + '</div>'
            + '<div class="txn-info">'
            + '<p class="txn-name">' + (cat ? cat.name : '未分類') + (pay ? ' · ' + pay.icon + pay.name : '') + '</p>'
            + (t.memo ? '<p class="txn-memo">' + t.memo + '</p>' : '') + '</div>'
            + '<span class="txn-amount' + (t.is_income ? ' income' : '') + '">'
            + (t.is_income ? '+' : '−') + '¥' + t.amount.toLocaleString() + '</span></div>';
        }).join('') + '</div>';
  }).join('');
}

// ── Calendar ──
function renderCalendar() {
  var dows = ['日','月','火','水','木','金','土'];
  var html = dows.map(function(d){ return '<div class="cal-dow">' + d + '</div>'; }).join('');
  var firstDay = new Date(viewYear, viewMonth, 1).getDay();
  var dim = new Date(viewYear, viewMonth+1, 0).getDate();
  var todayStr = localDateStr(new Date());

  // Build date totals
  var dateTotals = {};
  transactions.forEach(function(t) {
    if (!t.is_income) dateTotals[t.date] = (dateTotals[t.date] || 0) + t.amount;
  });

  for (var i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';
  for (var d = 1; d <= dim; d++) {
    var ds = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var isToday = ds === todayStr;
    var hasTxn = dateTotals[ds];
    var cls = 'cal-day' + (isToday ? ' today' : '') + (hasTxn ? ' has-txn' : '');
    var amtStr = hasTxn ? '<span class="cal-day-amt">¥' + (hasTxn >= 10000 ? Math.round(hasTxn/1000)+'k' : hasTxn.toLocaleString()) + '</span>' : '';
    html += '<div class="' + cls + '" onclick="showCalPopup(\'' + ds + '\')">'
      + '<span class="cal-day-num">' + d + '</span>' + amtStr + '</div>';
  }
  document.getElementById('calGrid').innerHTML = html;
}

function showCalPopup(dateStr) {
  var dayTxns = transactions.filter(function(t){ return t.date === dateStr; });
  if (!dayTxns.length) { document.getElementById('calPopup').classList.remove('show'); return; }
  var d = parseLocalDate(dateStr);
  document.getElementById('calPopupTitle').textContent = (d.getMonth()+1) + '月' + d.getDate() + '日';
  document.getElementById('calPopupItems').innerHTML = dayTxns.map(function(t) {
    var cat = categories.find(function(c){ return c.id===t.category_id; });
    return '<div class="txn-row" onclick="openTxnModal(\'' + t.id + '\')">'
      + '<div class="txn-icon">' + (cat ? cat.icon : '❓') + '</div>'
      + '<div class="txn-info"><p class="txn-name">' + (cat ? cat.name : '未分類') + '</p>'
      + (t.memo ? '<p class="txn-memo">' + t.memo + '</p>' : '') + '</div>'
      + '<span class="txn-amount' + (t.is_income ? ' income' : '') + '">'
      + (t.is_income ? '+' : '−') + '¥' + t.amount.toLocaleString() + '</span></div>';
  }).join('');
  document.getElementById('calPopup').classList.add('show');
}

// ── Graph ──
function renderGraph() {
  renderPieChart();
  renderBarChart();
}

function renderPieChart() {
  var expenses = transactions.filter(function(t){ return !t.is_income; });
  var catTotals = {};
  expenses.forEach(function(t) {
    var key = t.category_id || 'none';
    catTotals[key] = (catTotals[key] || 0) + t.amount;
  });
  var labels = [], data = [], colors = [];
  Object.keys(catTotals).sort(function(a,b){ return catTotals[b]-catTotals[a]; }).forEach(function(cid, i) {
    var cat = categories.find(function(c){ return c.id===cid; });
    labels.push((cat ? cat.icon + cat.name : '未分類'));
    data.push(catTotals[cid]);
    colors.push(CAT_COLORS[i % CAT_COLORS.length]);
  });
  if (_pieChart) _pieChart.destroy();
  var ctx = document.getElementById('pieChart').getContext('2d');
  if (!data.length) { ctx.clearRect(0,0,999,999); return; }
  _pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 0 }] },
    options: { plugins: { legend: { position: 'bottom', labels: { color: '#9494b8', font: { size: 11 } } } }, cutout: '60%' }
  });
}

function renderBarChart() {
  var mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var months = [];
  for (var i = 5; i >= 0; i--) {
    var d = new Date(viewYear, viewMonth - i, 1);
    var y = d.getFullYear(), m = d.getMonth();
    var cached = JSON.parse(localStorage.getItem('kakely_txn_' + y + '_' + (m+1)) || '[]');
    var total = cached.filter(function(t){ return !t.is_income; }).reduce(function(s,t){ return s+t.amount; }, 0);
    months.push({ label: mn[m], total: total, isCur: (y===viewYear && m===viewMonth) });
  }
  if (_barChart) _barChart.destroy();
  var ctx = document.getElementById('barChart').getContext('2d');
  _barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months.map(function(m){ return m.label; }),
      datasets: [{
        data: months.map(function(m){ return m.total; }),
        backgroundColor: months.map(function(m){ return m.isCur ? 'rgba(245,166,35,.9)' : 'rgba(245,166,35,.35)'; }),
        borderRadius: 6, borderSkipped: false
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9494b8', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#9494b8', font: { size: 10 }, callback: function(v){ return v>=10000?Math.round(v/1000)+'k':'¥'+v; } }, grid: { color: 'rgba(46,46,80,.5)' } }
      }
    }
  });
}

// ── Settings ──
function renderSettings() {
  // Categories
  var catEl = document.getElementById('catList');
  catEl.innerHTML = categories.map(function(c) {
    return '<div class="settings-row">'
      + '<span class="settings-icon">' + c.icon + '</span>'
      + '<div><p class="settings-name">' + c.name + '</p>'
      + (c.budget ? '<p class="settings-sub">予算 ¥' + c.budget.toLocaleString() + '/月</p>' : '') + '</div>'
      + '<button class="btn-sm-icon" onclick="openCatModal(\'' + c.id + '\')">✏️</button></div>';
  }).join('');

  // Payment methods
  var PAY_TYPE = { cash:'現金', card:'クレカ', emoney:'電子マネー', bank:'銀行口座' };
  var payEl = document.getElementById('payList');
  payEl.innerHTML = paymentMethods.map(function(p) {
    return '<div class="settings-row">'
      + '<span class="settings-icon">' + p.icon + '</span>'
      + '<div><p class="settings-name">' + p.name + '</p>'
      + '<p class="settings-sub">' + (PAY_TYPE[p.type]||p.type) + (p.withdrawal_date ? ' · ' + p.withdrawal_date + '日引き落とし' : '') + '</p></div>'
      + '<button class="btn-sm-icon" onclick="openPayModal(\'' + p.id + '\')">✏️</button></div>';
  }).join('');
}

// ── Tab ──
function switchTab(name, btn) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'graph') renderGraph();
  if (name === 'calendar') renderCalendar();
}

// ── Transaction Modal ──
function openTxnModal(id) {
  editTxnId = id || null;
  txnIsIncome = false;
  selectedCatId = null;
  document.getElementById('txnModalTitle').textContent = id ? '記録を編集' : '支出を記録';
  document.getElementById('deleteTxnBtn').style.display = id ? '' : 'none';
  setTxnType(false);

  // Populate category grid
  buildCatGrid();
  // Populate payment method select
  var sel = document.getElementById('fPayMethod');
  sel.innerHTML = '<option value="">未設定</option>'
    + paymentMethods.map(function(p){ return '<option value="' + p.id + '">' + p.icon + ' ' + p.name + '</option>'; }).join('');

  if (id) {
    var t = transactions.find(function(x){ return x.id === id; });
    if (!t) return;
    setTxnType(t.is_income || false);
    document.getElementById('fAmount').value = t.amount;
    document.getElementById('fDate').value = t.date;
    document.getElementById('fMemo').value = t.memo || '';
    sel.value = t.payment_method_id || '';
    selectedCatId = t.category_id || null;
    buildCatGrid();
  } else {
    document.getElementById('fAmount').value = '';
    document.getElementById('fDate').value = localDateStr(new Date());
    document.getElementById('fMemo').value = '';
    sel.value = '';
  }
  document.getElementById('txnModal').classList.add('show');
  setTimeout(function(){ document.getElementById('fAmount').focus(); }, 300);
}

function buildCatGrid() {
  var el = document.getElementById('catSelectGrid');
  el.innerHTML = categories.map(function(c) {
    return '<div class="cat-chip' + (c.id === selectedCatId ? ' selected' : '') + '" onclick="selectCat(\'' + c.id + '\')">'
      + '<span class="ci">' + c.icon + '</span><span class="cn">' + c.name + '</span></div>';
  }).join('');
}

function selectCat(id) {
  selectedCatId = (selectedCatId === id) ? null : id;
  buildCatGrid();
}

function setTxnType(isIncome) {
  txnIsIncome = isIncome;
  document.getElementById('typeExpense').classList.toggle('active', !isIncome);
  document.getElementById('typeIncome').classList.toggle('active', isIncome);
  document.getElementById('catSelectWrap').style.display = isIncome ? 'none' : '';
}

async function saveTxn() {
  var amount = parseInt(document.getElementById('fAmount').value);
  var date   = document.getElementById('fDate').value;
  if (!amount || !date) { showToast('金額と日付を入力してください'); return; }

  var payload = {
    amount: amount, date: date, is_income: txnIsIncome,
    category_id: txnIsIncome ? null : (selectedCatId || null),
    payment_method_id: document.getElementById('fPayMethod').value || null,
    memo: document.getElementById('fMemo').value.trim() || null
  };

  if (editTxnId) {
    // Update locally
    var idx = transactions.findIndex(function(t){ return t.id === editTxnId; });
    if (idx !== -1) transactions[idx] = Object.assign(transactions[idx], payload);
    // Update in Supabase
    if (currentUser) await _sb.from('kakely_transactions').update(payload).eq('id', editTxnId);
  } else {
    // Add locally with temp id
    var newTxn = Object.assign({ id: 'temp_' + Date.now() }, payload);
    transactions.unshift(newTxn);
    // Insert in Supabase
    if (currentUser) {
      var res = await _sb.from('kakely_transactions').insert(Object.assign({ user_id: currentUser.id }, payload)).select().single();
      if (res.data) newTxn.id = res.data.id;
    }
  }

  saveMonthCache();
  closeModal('txnModal');
  renderAll();
  showToast(editTxnId ? '更新しました' : '記録しました ✓');
}

async function deleteTxn() {
  if (!editTxnId || !confirm('この記録を削除しますか？')) return;
  transactions = transactions.filter(function(t){ return t.id !== editTxnId; });
  if (currentUser) await _sb.from('kakely_transactions').delete().eq('id', editTxnId);
  saveMonthCache();
  closeModal('txnModal');
  renderAll();
  showToast('削除しました');
}

// ── Category Modal ──
function openCatModal(id) {
  editCatId = id || null;
  document.getElementById('catModalTitle').textContent = id ? 'カテゴリを編集' : 'カテゴリを追加';
  document.getElementById('deleteCatBtn').style.display = id ? '' : 'none';
  if (id) {
    var c = categories.find(function(x){ return x.id === id; });
    if (!c) return;
    document.getElementById('fCatIcon').value = c.icon;
    document.getElementById('fCatName').value = c.name;
    document.getElementById('fCatBudget').value = c.budget || '';
  } else {
    document.getElementById('fCatIcon').value = '';
    document.getElementById('fCatName').value = '';
    document.getElementById('fCatBudget').value = '';
  }
  document.getElementById('catModal').classList.add('show');
}

async function saveCat() {
  var icon = document.getElementById('fCatIcon').value.trim() || '❓';
  var name = document.getElementById('fCatName').value.trim();
  var budget = parseInt(document.getElementById('fCatBudget').value) || null;
  if (!name) { showToast('名前を入力してください'); return; }

  var payload = { icon: icon, name: name, budget: budget };
  if (editCatId) {
    var idx = categories.findIndex(function(c){ return c.id === editCatId; });
    if (idx !== -1) categories[idx] = Object.assign(categories[idx], payload);
    if (currentUser) await _sb.from('kakely_categories').update(payload).eq('id', editCatId);
  } else {
    payload.sort_order = categories.length;
    var newCat = Object.assign({ id: 'tmp_' + Date.now() }, payload);
    categories.push(newCat);
    if (currentUser) {
      var res = await _sb.from('kakely_categories').insert(Object.assign({ user_id: currentUser.id }, payload)).select().single();
      if (res.data) newCat.id = res.data.id;
    }
  }
  localStorage.setItem('kakely_cats', JSON.stringify(categories));
  closeModal('catModal');
  renderSettings();
  showToast('保存しました');
}

async function deleteCat() {
  if (!editCatId || !confirm('このカテゴリを削除しますか？')) return;
  categories = categories.filter(function(c){ return c.id !== editCatId; });
  if (currentUser) await _sb.from('kakely_categories').delete().eq('id', editCatId);
  localStorage.setItem('kakely_cats', JSON.stringify(categories));
  closeModal('catModal');
  renderSettings();
  showToast('削除しました');
}

// ── Payment Method Modal ──
function openPayModal(id) {
  editPayId = id || null;
  document.getElementById('payModalTitle').textContent = id ? '支払い方法を編集' : '支払い方法を追加';
  document.getElementById('deletePayBtn').style.display = id ? '' : 'none';
  if (id) {
    var p = paymentMethods.find(function(x){ return x.id === id; });
    if (!p) return;
    document.getElementById('fPayIcon').value = p.icon;
    document.getElementById('fPayName').value = p.name;
    document.getElementById('fPayType').value = p.type;
    document.getElementById('fWithdrawal').value = p.withdrawal_date || '';
    document.getElementById('withdrawalWrap').style.display = p.type === 'card' ? '' : 'none';
  } else {
    document.getElementById('fPayIcon').value = '';
    document.getElementById('fPayName').value = '';
    document.getElementById('fPayType').value = 'cash';
    document.getElementById('fWithdrawal').value = '';
    document.getElementById('withdrawalWrap').style.display = 'none';
  }
  document.getElementById('payModal').classList.add('show');
}

document.getElementById('fPayType').addEventListener('change', function() {
  document.getElementById('withdrawalWrap').style.display = this.value === 'card' ? '' : 'none';
});

async function savePay() {
  var icon = document.getElementById('fPayIcon').value.trim() || '💳';
  var name = document.getElementById('fPayName').value.trim();
  var type = document.getElementById('fPayType').value;
  var wd   = parseInt(document.getElementById('fWithdrawal').value) || null;
  if (!name) { showToast('名前を入力してください'); return; }

  var payload = { icon: icon, name: name, type: type, withdrawal_date: wd };
  if (editPayId) {
    var idx = paymentMethods.findIndex(function(p){ return p.id === editPayId; });
    if (idx !== -1) paymentMethods[idx] = Object.assign(paymentMethods[idx], payload);
    if (currentUser) await _sb.from('kakely_payment_methods').update(payload).eq('id', editPayId);
  } else {
    var newPay = Object.assign({ id: 'tmp_' + Date.now() }, payload);
    paymentMethods.push(newPay);
    if (currentUser) {
      var res = await _sb.from('kakely_payment_methods').insert(Object.assign({ user_id: currentUser.id }, payload)).select().single();
      if (res.data) newPay.id = res.data.id;
    }
  }
  localStorage.setItem('kakely_pays', JSON.stringify(paymentMethods));
  closeModal('payModal');
  renderSettings();
  showToast('保存しました');
}

async function deletePay() {
  if (!editPayId || !confirm('この支払い方法を削除しますか？')) return;
  paymentMethods = paymentMethods.filter(function(p){ return p.id !== editPayId; });
  if (currentUser) await _sb.from('kakely_payment_methods').delete().eq('id', editPayId);
  localStorage.setItem('kakely_pays', JSON.stringify(paymentMethods));
  closeModal('payModal');
  renderSettings();
  showToast('削除しました');
}

async function fetchMonthTransactions() {
  var from = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-01';
  var lastDay = new Date(viewYear, viewMonth+1, 0).getDate();
  var to = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-' + String(lastDay).padStart(2,'0');
  var res = await _sb.from('kakely_transactions').select('*')
    .eq('user_id', currentUser.id).gte('date', from).lte('date', to)
    .order('date', {ascending: false}).order('created_at', {ascending: false});
  if (res.data) { transactions = res.data; saveMonthCache(); renderAll(); }
}
