<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ownly — 持ち物・資産管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest-ownly.json">
  <link rel="icon" type="image/png" href="/favicon.ico">
  <meta name="theme-color" content="#0c0c18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ownly">
  <link rel="apple-touch-icon" href="/apple-touch-icon-ownly.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0c0c18; --surface:#14142a; --surface2:#1c1c38; --surface3:#242448;
      --border:#2e2e50; --text:#f2f2fa; --muted:#9494b8;
      --accent:#9c9c3c; --accent-dark:#7a7a20; --accent2:#ff7c6e;
      --green:#5ecfa0; --yellow:#f5c842; --orange:#ffb347;
      --font:'Outfit',sans-serif;
      --shadow-sm:0 2px 10px rgba(0,0,0,.3); --shadow-md:0 4px 24px rgba(0,0,0,.4);
      --spring:cubic-bezier(.34,1.56,.64,1);
    }
    html { font-size:16px; }
    body { background:var(--bg); color:var(--text); font-family:var(--font); font-weight:400; min-height:100vh; padding-bottom:130px; }
    .app-header { padding:3rem 1.25rem 1.25rem; }
    .back-link { font-size:.75rem; color:var(--muted); text-decoration:none; letter-spacing:.1em; text-transform:uppercase; display:inline-flex; align-items:center; gap:.4rem; }
    .app-title { font-size:1.6rem; font-weight:500; letter-spacing:-.02em; }
    .app-title span { font-family:'Playfair Display',serif; font-style:italic; color:var(--accent); }
    .auth-chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:.3rem .85rem; font-size:.72rem; color:var(--muted); cursor:pointer; font-family:var(--font); transition:all .2s; white-space:nowrap; }
    .auth-chip.logged-in { border-color:var(--accent); color:var(--accent); }
    .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; }
    .summary-card { margin:0 1.25rem 1.25rem; background:linear-gradient(145deg,#141400 0%,#0c0c00 100%); border:1px solid rgba(156,156,60,.38); border-radius:24px; padding:1.5rem; position:relative; overflow:hidden; box-shadow:0 0 60px rgba(156,156,60,.1),inset 0 1px 0 rgba(255,255,255,.07),0 8px 40px rgba(0,0,0,.5); }
    .summary-card::before { content:''; position:absolute; top:-80px; right:-80px; width:280px; height:280px; background:radial-gradient(circle,rgba(156,156,60,.5) 0%,transparent 60%); border-radius:50%; }
    .summary-label { font-size:.72rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:.5rem; }
    .summary-stats { display:flex; gap:1.5rem; margin-top:.5rem; }
    .summary-stat-value { font-size:2.2rem; font-weight:600; letter-spacing:-.03em; }
    .summary-stat-label { font-size:.7rem; color:var(--muted); margin-top:.1rem; }
    .card-deco { position:absolute; right:1rem; bottom:-.75rem; font-size:8.5rem; font-weight:700; line-height:1; color:rgba(255,255,255,.04); pointer-events:none; user-select:none; letter-spacing:-.05em; }
    .summary-bar { display:flex; gap:.75rem; margin-top:1rem; flex-wrap:wrap; }
    .summary-bar-item { display:flex; align-items:center; gap:.4rem; font-size:.75rem; color:var(--muted); }
    .dot { width:8px; height:8px; border-radius:50%; }
    .free-banner { margin:0 1.25rem 1.25rem; background:rgba(245,200,66,.1); border:1px solid rgba(245,200,66,.25); border-radius:12px; padding:.75rem 1rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .free-banner-text { font-size:.8rem; color:var(--yellow); }
    .upgrade-btn { font-size:.72rem; font-weight:500; color:#1a1a24; background:var(--yellow); border:none; border-radius:8px; padding:.4rem .75rem; cursor:pointer; white-space:nowrap; font-family:var(--font); }
    .tabs { display:flex; gap:0; margin:0 1.25rem 1.25rem; background:var(--surface); border-radius:14px; padding:4px; border:1px solid var(--border); box-shadow:var(--shadow-sm); }
    .tab { flex:1; padding:.58rem .2rem; font-size:.72rem; font-weight:400; color:var(--muted); background:none; border:none; border-radius:10px; cursor:pointer; font-family:var(--font); transition:all .2s var(--spring); position:relative; }
    .tab.active { background:var(--surface2); color:var(--text); font-weight:600; box-shadow:var(--shadow-sm); }
    .tab:active { transform:scale(.93); }
    .tab-badge { position:absolute; top:3px; right:5px; background:var(--accent2); color:#fff; border-radius:10px; font-size:.52rem; font-weight:600; padding:.1rem .35rem; min-width:16px; text-align:center; line-height:1.4; }
    .view { display:none; }
    .view.active { display:block; }
    .cat-filter { display:flex; gap:.4rem; padding:0 1.25rem 1rem; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .cat-filter::-webkit-scrollbar { display:none; }
    .cat-chip { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:.3rem .8rem; font-size:.72rem; color:var(--muted); cursor:pointer; font-family:var(--font); white-space:nowrap; transition:all .2s; flex-shrink:0; }
    .cat-chip.active { background:var(--surface2); border-color:var(--accent); color:var(--accent); }
    .list-section { padding:0 1.25rem; }
    .item-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1rem 1.1rem; margin-bottom:.625rem; animation:slideIn .3s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .item-card.warranty-warn { border-color:rgba(255,179,71,.4); }
    .item-card.warranty-expired { border-color:rgba(255,107,107,.4); }
    .item-card-top { display:flex; align-items:center; gap:.9rem; }
    .item-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; background:var(--surface2); }
    .item-info { flex:1; min-width:0; }
    .item-name { font-size:.95rem; font-weight:500; }
    .item-meta { font-size:.72rem; color:var(--muted); margin-top:.2rem; display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
    .item-price { font-size:1.05rem; font-weight:600; color:var(--accent); white-space:nowrap; }
    .price-unit { font-size:.65rem; color:var(--muted); font-weight:400; }
    .item-actions { display:flex; gap:.4rem; margin-top:.7rem; justify-content:flex-end; }
    .btn-icon { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); font-size:.75rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .warranty-badge { font-size:.65rem; font-weight:500; padding:.15rem .45rem; border-radius:20px; white-space:nowrap; }
    .warranty-badge.ok { background:rgba(94,207,160,.2); color:var(--green); }
    .warranty-badge.warn { background:rgba(255,179,71,.2); color:var(--orange); }
    .warranty-badge.expired { background:rgba(255,107,107,.2); color:var(--accent2); }
    .empty-state { text-align:center; padding:3rem 2rem; color:var(--muted); }
    .empty-state .empty-icon { font-size:2.5rem; margin-bottom:.75rem; }
    .empty-state p { font-size:.88rem; line-height:1.6; }
    .analytics-wrap { padding:0 1.25rem; }
    .analytics-section { margin-bottom:1.5rem; }
    .analytics-title { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.75rem; }
    .bar-chart { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.25rem 1rem; }
    .analysis-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1rem; }
    .analysis-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1rem; }
    .analysis-card-label { font-size:.65rem; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:.4rem; }
    .analysis-card-value { font-size:1.3rem; font-weight:600; letter-spacing:-.02em; }
    .analysis-card-sub { font-size:.68rem; color:var(--muted); margin-top:.2rem; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); z-index:100; display:none; align-items:flex-end; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:24px 24px 0 0; padding:1.5rem 1.25rem 2rem; width:100%; max-height:92vh; overflow-y:auto; animation:slideUp .3s ease; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 1.25rem; }
    <p style="text-align:center;font-size:1rem;font-weight:500;margin-bottom:1.25rem;">ログイン</p>
    .modal-title { font-size:1.1rem; font-weight:500; margin-bottom:1.25rem; }
    .preset-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.4rem; margin-bottom:1rem; }
    .preset-btn { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:.6rem .3rem; cursor:pointer; font-family:var(--font); text-align:center; transition:border-color .15s; display:flex; flex-direction:column; align-items:center; gap:.3rem; }
    .preset-btn:active, .preset-btn.selected { border-color:var(--accent); }
    .preset-btn .p-icon { font-size:1.2rem; }
    .preset-btn .p-name { font-size:.6rem; color:var(--text); }
    .divider { display:flex; align-items:center; gap:.75rem; margin:1rem 0; color:var(--muted); font-size:.75rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .form-group { margin-bottom:1rem; }
    label { display:block; font-size:.75rem; color:var(--muted); letter-spacing:.05em; text-transform:uppercase; margin-bottom:.4rem; }
    input, select, textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:.75rem 1rem; font-size:.95rem; color:var(--text); font-family:var(--font); outline:none; transition:border-color .15s; }
    input:focus, select:focus { border-color:var(--accent); }
    select option { background:var(--surface2); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
    .btn-primary { width:100%; padding:.9rem; background:var(--accent); color:#fff; border:none; border-radius:12px; font-size:.95rem; font-weight:500; font-family:var(--font); cursor:pointer; margin-top:.5rem; }
    .btn-primary:active { transform:scale(.97); }
    .btn-cancel { width:100%; padding:.75rem; background:none; color:var(--muted); border:none; font-size:.88rem; font-family:var(--font); cursor:pointer; margin-top:.25rem; }
    .fab { position:fixed; bottom:calc(72px + env(safe-area-inset-bottom)); right:1.25rem; width:56px; height:56px; border-radius:18px; background:var(--accent); color:#fff; border:none; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 24px rgba(156,156,60,.4); z-index:50; transition:transform .15s; }
    .fab:active { transform:scale(.92); }
    .ad-banner { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:.6rem 1rem; display:flex; align-items:center; justify-content:center; gap:.5rem; z-index:40; padding-bottom:calc(.6rem + env(safe-area-inset-bottom)); }
    .ad-label { font-size:.6rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
    .ad-content { font-size:.78rem; color:var(--muted); flex:1; text-align:center; }
    .share-btn { width:100%; padding:.8rem; border:none; border-radius:12px; font-size:.88rem; font-weight:500; font-family:var(--font); cursor:pointer; }
    .share-x { background:#000; color:#fff; }
    .share-line { background:#06c755; color:#fff; }
    .share-copy { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  </style>
</head>
<body>
<div class="app-header">
  <div class="header-top">
    <a class="back-link" href="index.html"> Totonoi One</a>
    <button class="auth-chip" id="authBtn" onclick="openAuthModal()">ログイン</button>
  </div>
  <h1 class="app-title">Own<span>ly</span></h1>
</div>

<div class="summary-card">
  <p class="summary-label">持ち物・資産</p>
  <div class="summary-stats">
    <div class="summary-stat">
      <p class="summary-stat-value" id="summaryTotal">0</p>
      <p class="summary-stat-label">登録数</p>
    </div>
    <div class="summary-stat">
      <p class="summary-stat-value" style="color:var(--accent)" id="summaryValue">0</p>
      <p class="summary-stat-label">総額（万円）</p>
    </div>
    <div class="summary-stat">
      <p class="summary-stat-value" style="color:var(--orange)" id="summaryWarranty">0</p>
      <p class="summary-stat-label">保証まもなく</p>
    </div>
  </div>
  <div class="summary-bar" id="summaryBar"></div>
  <span class="card-deco" aria-hidden="true">所</span>
</div>

<div class="free-banner" id="freeBanner">
  <p class="free-banner-text"><strong id="countText">0/20</strong> 件登録中（無料プラン）</p>
  <a href="index.html" class="upgrade-btn">アップグレード</a>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('list',this)">一覧</button>
  <button class="tab" onclick="switchTab('warranty',this)" id="tabWarranty">保証</button>
  <button class="tab" onclick="switchTab('settings',this)">設定</button>
</div>

<div class="view active" id="view-list">
  <div class="cat-filter">
    <button class="cat-chip active" onclick="filterCat('all',this)">すべて</button>
    <button class="cat-chip" onclick="filterCat('electronics',this)">💻 家電・ガジェット</button>
    <button class="cat-chip" onclick="filterCat('furniture',this)">🛋 家具</button>
    <button class="cat-chip" onclick="filterCat('clothing',this)">👕 衣類</button>
    <button class="cat-chip" onclick="filterCat('vehicle',this)">🚗 乗り物</button>
    <button class="cat-chip" onclick="filterCat('tool',this)">🔧 工具</button>
    <button class="cat-chip" onclick="filterCat('other',this)">📦 その他</button>
  </div>
  <div class="list-section"><div id="itemList"></div></div>
</div>

<div class="view" id="view-warranty">
  <div class="list-section" style="padding-top:.25rem;">
    <p class="section-label" style="margin-bottom:.75rem;">保証期限一覧</p>
    <div id="warrantyList"></div>
  </div>
</div>

<div class="view" id="view-settings">
  <div class="analytics-wrap">
    <div class="analytics-section">
      <p class="analytics-title">資産統計</p>
      <div class="analysis-grid" id="statsGrid"></div>
    </div>
    <div class="analytics-section">
      <p class="analytics-title">プラン</p>
      <div class="bar-chart" style="padding:1rem 1.1rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div><p style="font-size:.95rem;font-weight:500;" id="planLabel">無料プラン</p><p style="font-size:.75rem;color:var(--muted);margin-top:.2rem;" id="planDesc">登録20件・広告あり</p></div>
          <span style="font-size:.7rem;padding:.25rem .6rem;border-radius:20px;background:rgba(156,156,60,.15);color:var(--accent);" id="planBadge">現在</span>
        </div>
        <a href="index.html" style="display:block;margin-top:.9rem;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:.75rem;font-size:.85rem;color:var(--accent);text-decoration:none;">ダッシュボードでプランを管理 →</a>
      </div>
    </div>
    <div class="analytics-section">
      <p class="analytics-title">使い方ガイド</p>
      <div class="bar-chart" style="padding:1rem 1.1rem;">
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:.875rem;line-height:1.5;">各機能の使い方・無料/Proプランの比較はガイドページで確認できます。</p>
        <a href="guide.html" style="display:block;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:.75rem;font-size:.85rem;color:var(--accent);text-decoration:none;">📖 使い方ガイドを見る →</a>
      </div>
    </div>
    <div class="analytics-section">
      <p class="analytics-title">口コミ・シェア</p>
      <div class="bar-chart" style="padding:1rem 1.1rem;">
        <div style="display:flex;flex-direction:column;gap:.5rem;">
          <button onclick="shareX()" class="share-btn share-x">𝕏 でシェアする</button>
          <button onclick="shareLine()" class="share-btn share-line">🟢 LINEで送る</button>
          <button onclick="shareCopy()" class="share-btn share-copy" id="copyBtn">🔗 リンクをコピー</button>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="fab" onclick="openModal()">＋</button>
<div class="ad-banner" id="adBanner"><span class="ad-label">広告</span><p class="ad-content">Google AdSense 広告エリア</p></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title" id="modalTitle">アイテムを追加</p>
    <p style="font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;">よく登録するアイテム</p>
    <div class="preset-grid" id="presetArea"></div>
    <div class="divider">または手動入力</div>
    <div class="form-group"><label>名前</label><input type="text" id="fName" placeholder="例：MacBook Pro"></div>
    <div class="form-row">
      <div class="form-group"><label>アイコン</label><input type="text" id="fIcon" placeholder="💻" maxlength="2"></div>
      <div class="form-group"><label>カテゴリ</label>
        <select id="fCategory">
          <option value="electronics">💻 家電・ガジェット</option>
          <option value="furniture">🛋 家具</option>
          <option value="clothing">👕 衣類</option>
          <option value="vehicle">🚗 乗り物</option>
          <option value="tool">🔧 工具</option>
          <option value="other">📦 その他</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>購入価格（円）</label><input type="number" id="fPrice" placeholder="0" min="0"></div>
      <div class="form-group"><label>購入日</label><input type="date" id="fPurchaseDate"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>保証期限</label><input type="date" id="fWarranty"></div>
      <div class="form-group"><label>状態</label>
        <select id="fCondition">
          <option value="new">新品</option>
          <option value="good">良好</option>
          <option value="fair">普通</option>
          <option value="poor">劣化</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>メモ</label><input type="text" id="fMemo" placeholder="シリアル番号・購入先など"></div>
    <button class="btn-primary" id="saveBtn" onclick="saveItem()">追加する</button>
    <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<script>
var FREE_LIMIT = 20;
var isPro = localStorage.getItem('isPro') === 'true';
function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
var CAT_LABELS = { all:'すべて', electronics:'💻 家電・ガジェット', furniture:'🛋 家具', clothing:'👕 衣類', vehicle:'🚗 乗り物', tool:'🔧 工具', other:'📦 その他' };
var CAT_ICONS  = { electronics:'💻', furniture:'🛋', clothing:'👕', vehicle:'🚗', tool:'🔧', other:'📦' };
var CONDITION_LABELS = { new:'新品', good:'良好', fair:'普通', poor:'劣化' };
var PRESETS = [
  {name:'スマートフォン',icon:'📱',cat:'electronics'}, {name:'パソコン',icon:'💻',cat:'electronics'},
  {name:'テレビ',icon:'📺',cat:'electronics'},         {name:'冷蔵庫',icon:'🧊',cat:'furniture'},
  {name:'自転車',icon:'🚲',cat:'vehicle'},              {name:'バッグ',icon:'👜',cat:'clothing'},
  {name:'カメラ',icon:'📷',cat:'electronics'},          {name:'その他',icon:'📦',cat:'other'},
];
var items = JSON.parse(localStorage.getItem('ownly_items') || '[]');
var editId = null;
var currentCat = 'all';

function warrantyStatus(item) {
  if (!item.warranty) return 'none';
  var now = new Date(); now.setHours(0,0,0,0);
  var exp = new Date(item.warranty); exp.setHours(0,0,0,0);
  var days = Math.round((exp-now)/86400000);
  if (days < 0) return 'expired';
  if (days <= 90) return 'warn';
  return 'ok';
}
function warrantyBadge(item) {
  var s = warrantyStatus(item);
  if (s === 'none') return '';
  var exp = new Date(item.warranty); var days = Math.round((exp-new Date())/86400000);
  if (s === 'expired') return '<span class="warranty-badge expired">保証切れ</span>';
  if (s === 'warn')    return '<span class="warranty-badge warn">残' + days + '日</span>';
  return '<span class="warranty-badge ok">保証中</span>';
}

function init() { buildPresets(); renderList(); renderWarranty(); updateSummary(); updateProUI(); }

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-chip').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  renderList();
}

function renderCard(item) {
  var ws = warrantyStatus(item);
  var cardCls = ws==='expired'?' warranty-expired':ws==='warn'?' warranty-warn':'';
  var priceStr = item.price ? '¥' + Number(item.price).toLocaleString() : '';
  return '<div class="item-card' + cardCls + '">'
    + '<div class="item-card-top">'
      + '<div class="item-icon">' + (item.icon||CAT_ICONS[item.category]||'📦') + '</div>'
      + '<div class="item-info"><p class="item-name">' + item.name + '</p>'
        + '<div class="item-meta">' + CAT_LABELS[item.category] + (item.condition?' · '+CONDITION_LABELS[item.condition]:'') + (item.purchaseDate?' · '+item.purchaseDate.replace(/(\d{4})-(\d{2})-(\d{2})/,'$1年$2月$3日購入'):'') + '</div>'
        + (item.memo ? '<p style="font-size:.7rem;color:var(--muted);margin-top:.15rem;">' + item.memo + '</p>' : '')
      + '</div>'
      + '<div style="text-align:right;flex-shrink:0;">'
        + (priceStr ? '<p class="item-price">' + priceStr + '</p>' : '')
        + warrantyBadge(item)
      + '</div>'
    + '</div>'
    + '<div class="item-actions">'
      + '<button class="btn-icon" onclick="editItem(\'' + item.id + '\')">✏️</button>'
      + '<button class="btn-icon" onclick="deleteItem(\'' + item.id + '\')">🗑</button>'
    + '</div>'
    + '</div>';
}

function renderList() {
  var el = document.getElementById('itemList');
  var list = currentCat === 'all' ? items : items.filter(function(i){ return i.category===currentCat; });
  if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏠</div><p>' + (currentCat==='all'?'持ち物を登録しましょう。<br>＋ボタンで追加できます。':'このカテゴリに登録がありません') + '</p></div>'; return; }
  el.innerHTML = list.map(renderCard).join('');
  updateWarrantyBadge();
}

function renderWarranty() {
  var el = document.getElementById('warrantyList');
  var list = items.filter(function(i){ return i.warranty; }).sort(function(a,b){ return new Date(a.warranty)-new Date(b.warranty); });
  if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛡</div><p>保証期限登録済みのアイテムがありません</p></div>'; return; }
  el.innerHTML = list.map(renderCard).join('');
}

function updateWarrantyBadge() {
  var count = items.filter(function(i){ var s=warrantyStatus(i); return s==='warn'||s==='expired'; }).length;
  var tab = document.getElementById('tabWarranty');
  var ex = tab.querySelector('.tab-badge');
  if (count) { if (!ex) { var b=document.createElement('span'); b.className='tab-badge'; tab.appendChild(b); } tab.querySelector('.tab-badge').textContent=count; }
  else { if(ex) ex.remove(); }
}

function updateSummary() {
  var total = items.length;
  var totalValue = items.reduce(function(s,i){ return s+(parseInt(i.price)||0); },0);
  var warnCount = items.filter(function(i){ var s=warrantyStatus(i); return s==='warn'||s==='expired'; }).length;
  document.getElementById('summaryTotal').textContent = total;
  document.getElementById('summaryValue').textContent = totalValue>=10000?Math.round(totalValue/10000)+'万':totalValue;
  document.getElementById('summaryWarranty').textContent = warnCount;
  var cats = ['electronics','furniture','clothing','vehicle','tool','other'];
  var bar = cats.map(function(c){ var n=items.filter(function(i){return i.category===c;}).length; return n?'<span class="summary-bar-item"><span class="dot" style="background:var(--accent)"></span>'+CAT_LABELS[c]+' '+n+'</span>':''; }).filter(Boolean).join('');
  document.getElementById('summaryBar').innerHTML = bar;
  document.getElementById('countText').textContent = total+(isPro?'件':'/20');
}

function switchTab(name, btn) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='warranty') renderWarranty();
  if (name==='settings') renderStats();
}

function renderStats() {
  var total = items.length;
  var totalValue = items.reduce(function(s,i){ return s+(parseInt(i.price)||0); },0);
  var avgValue = total ? Math.round(totalValue/total) : 0;
  document.getElementById('statsGrid').innerHTML =
    '<div class="analysis-card"><p class="analysis-card-label">登録数</p><p class="analysis-card-value">'+total+'件</p><p class="analysis-card-sub">合計</p></div>'
    +'<div class="analysis-card"><p class="analysis-card-label">総資産額</p><p class="analysis-card-value" style="font-size:.95rem;">¥'+totalValue.toLocaleString()+'</p><p class="analysis-card-sub">購入価格合計</p></div>'
    +'<div class="analysis-card"><p class="analysis-card-label">平均価格</p><p class="analysis-card-value" style="font-size:.95rem;">¥'+avgValue.toLocaleString()+'</p><p class="analysis-card-sub">1件あたり</p></div>'
    +'<div class="analysis-card"><p class="analysis-card-label">保証あり</p><p class="analysis-card-value">'+items.filter(function(i){return i.warranty;}).length+'件</p><p class="analysis-card-sub">保証登録済み</p></div>';
}

function buildPresets() {
  document.getElementById('presetArea').innerHTML = PRESETS.map(function(p){
    return '<button class="preset-btn" onclick="selectPreset(this,\''+p.name+'\',\''+p.icon+'\',\''+p.cat+'\')"><span class="p-icon">'+p.icon+'</span><span class="p-name">'+p.name+'</span></button>';
  }).join('');
}
function selectPreset(btn,name,icon,cat){
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  document.getElementById('fName').value=name; document.getElementById('fIcon').value=icon; document.getElementById('fCategory').value=cat;
}

function openModal(){
  editId=null;
  document.getElementById('modalTitle').textContent='アイテムを追加'; document.getElementById('saveBtn').textContent='追加する';
  ['fName','fIcon','fPrice','fWarranty','fMemo'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('fCategory').value='electronics'; document.getElementById('fCondition').value='good';
  document.getElementById('fPurchaseDate').value=localDateStr(new Date());
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('selected');});
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modalOverlay'))closeModal(); }

function editItem(id){
  var item=items.find(function(x){return x.id===id;}); if(!item)return;
  editId=id;
  document.getElementById('modalTitle').textContent='編集'; document.getElementById('saveBtn').textContent='保存する';
  document.getElementById('fName').value=item.name; document.getElementById('fIcon').value=item.icon||'';
  document.getElementById('fCategory').value=item.category||'other'; document.getElementById('fPrice').value=item.price||'';
  document.getElementById('fPurchaseDate').value=item.purchaseDate||''; document.getElementById('fWarranty').value=item.warranty||'';
  document.getElementById('fCondition').value=item.condition||'good'; document.getElementById('fMemo').value=item.memo||'';
  document.getElementById('modalOverlay').classList.add('show');
}

function saveItem(){
  var name=document.getElementById('fName').value.trim(); if(!name){showToast('名前を入力してください');return;}
  if(!editId&&items.length>=FREE_LIMIT&&!isPro){showToast('無料プランは'+FREE_LIMIT+'件まで');return;}
  var entry={id:editId||Date.now().toString(), name:name, icon:document.getElementById('fIcon').value.trim()||CAT_ICONS[document.getElementById('fCategory').value],
    category:document.getElementById('fCategory').value, price:parseInt(document.getElementById('fPrice').value)||0,
    purchaseDate:document.getElementById('fPurchaseDate').value, warranty:document.getElementById('fWarranty').value,
    condition:document.getElementById('fCondition').value, memo:document.getElementById('fMemo').value.trim()};
  if(editId){var i=items.findIndex(function(x){return x.id===editId;});items[i]=entry;}else items.push(entry);
  persist(); closeModal(); renderList(); renderWarranty(); updateSummary();
}

function deleteItem(id){
  if(!confirm('削除しますか？'))return;
  items=items.filter(function(x){return x.id!==id;});
  persist(); renderList(); renderWarranty(); updateSummary();
}

function persist(){localStorage.setItem('ownly_items',JSON.stringify(items));dbSave('items',items);}

}
