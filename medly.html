<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Medly — サプリ・薬管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest-medly.json">
  <link rel="icon" type="image/png" href="/favicon.ico">
  <meta name="theme-color" content="#1a1a24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Medly">
  <link rel="apple-touch-icon" href="/apple-touch-icon-medly.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0c0c18; --surface:#14142a; --surface2:#1c1c38; --surface3:#242448;
      --border:#2e2e50; --text:#f2f2fa; --muted:#9494b8;
      --accent:#b388ff; --accent-dark:#9060dd; --accent2:#ff7c6e; --green:#5ecfa0;
      --yellow:#f5c842; --blue:#6c8eff; --font:'Outfit',sans-serif;
      --shadow-sm:0 2px 10px rgba(0,0,0,.3); --shadow-md:0 4px 24px rgba(0,0,0,.4);
      --spring:cubic-bezier(.34,1.56,.64,1);
    }
    html { font-size:16px; }
    body { background:var(--bg); color:var(--text); font-family:var(--font); font-weight:400; min-height:100vh; padding-bottom:130px; }

    .app-header { padding:3rem 1.25rem 1.25rem; }
    .back-link { font-size:.75rem; color:var(--muted); text-decoration:none; letter-spacing:.1em; text-transform:uppercase; display:inline-flex; align-items:center; gap:.4rem; margin-bottom:0; }
    .auth-chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:.3rem .85rem; font-size:.72rem; color:var(--muted); cursor:pointer; font-family:var(--font); transition:all .2s; white-space:nowrap; }
    .auth-chip.logged-in { border-color:var(--accent); color:var(--accent); }
    .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; }
    .app-title { font-size:1.6rem; font-weight:500; letter-spacing:-.02em; }
    .app-title span { font-family:'Playfair Display',serif; font-style:italic; color:var(--accent); }

    /* Summary Card */
    .summary-card { margin:0 1.25rem 1.25rem; background:linear-gradient(145deg,#1b1530 0%,#110d25 100%); border:1px solid rgba(179,136,255,.38); border-radius:24px; padding:1.5rem; position:relative; overflow:hidden; box-shadow:0 0 60px rgba(179,136,255,.1),inset 0 1px 0 rgba(255,255,255,.07),0 8px 40px rgba(0,0,0,.5); }
    .summary-card::before { content:''; position:absolute; top:-80px; right:-80px; width:280px; height:280px; background:radial-gradient(circle,rgba(179,136,255,.5) 0%,transparent 60%); border-radius:50%; }
    .summary-card::after { content:''; position:absolute; bottom:-60px; left:-40px; width:200px; height:200px; background:radial-gradient(circle,rgba(108,142,255,.22) 0%,transparent 65%); border-radius:50%; }
    .summary-label { font-size:.72rem; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:.5rem; }
    .summary-stats { display:flex; gap:1.5rem; margin-top:.5rem; }
    .summary-stat { }
    .summary-stat-value { font-size:2.2rem; font-weight:600; letter-spacing:-.03em; }
    .summary-stat-label { font-size:.7rem; color:var(--muted); margin-top:.1rem; }
    .urgent-badge { display:inline-flex; align-items:center; gap:.4rem; background:rgba(255,124,110,.15); border:1px solid rgba(255,124,110,.25); border-radius:20px; padding:.4rem .8rem; font-size:.75rem; color:var(--accent2); margin-top:.75rem; }
    .card-deco { position:absolute; right:1rem; bottom:-.75rem; font-size:8.5rem; font-weight:700; line-height:1; color:rgba(255,255,255,.04); font-family:'Outfit',sans-serif; pointer-events:none; user-select:none; letter-spacing:-.05em; z-index:0; }

    /* Tabs */
    .tabs { display:flex; gap:0; margin:0 1.25rem 1.25rem; background:var(--surface); border-radius:14px; padding:4px; border:1px solid var(--border); box-shadow:var(--shadow-sm); }
    .tab { flex:1; padding:.58rem .2rem; font-size:.72rem; font-weight:400; color:var(--muted); background:none; border:none; border-radius:10px; cursor:pointer; font-family:var(--font); transition:all .2s var(--spring); }
    .tab.active { background:var(--surface2); color:var(--text); font-weight:600; box-shadow:var(--shadow-sm); }
    .tab:active { transform:scale(.93); }

    .view { display:none; padding:0 1.25rem; }
    .view.active { display:block; }
    .section-label { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.75rem; }

    /* Item Card */
    .item-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1rem 1.1rem; margin-bottom:.75rem; animation:slideIn .3s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .item-card.urgent { border-color:rgba(255,124,110,.4); }
    .item-card.warning { border-color:rgba(245,200,66,.3); }

    .item-header { display:flex; align-items:center; gap:.85rem; margin-bottom:.75rem; }
    .item-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0; }
    .item-info { flex:1; min-width:0; }
    .item-name { font-size:.95rem; font-weight:500; }
    .item-type { font-size:.72rem; color:var(--muted); margin-top:.1rem; }
    .item-actions { display:flex; gap:.4rem; }
    .btn-icon { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); font-size:.75rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    /* Progress */
    .item-progress { margin-bottom:.6rem; }
    .progress-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.4rem; }
    .progress-label { font-size:.75rem; color:var(--muted); }
    .progress-value { font-size:.75rem; font-weight:500; }
    .progress-bar { height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:4px; transition:width .6s ease; }
    .progress-fill.good { background:var(--green); }
    .progress-fill.warning { background:var(--yellow); }
    .progress-fill.urgent { background:var(--accent2); }

    /* Days remaining */
    .days-row { display:flex; align-items:center; justify-content:space-between; }
    .days-badge { font-size:.72rem; font-weight:500; padding:.25rem .6rem; border-radius:20px; }
    .days-badge.good { background:rgba(94,207,160,.15); color:var(--green); }
    .days-badge.warning { background:rgba(245,200,66,.15); color:var(--yellow); }
    .days-badge.urgent { background:rgba(255,124,110,.18); color:var(--accent2); }
    .days-badge.expired { background:rgba(255,124,110,.25); color:var(--accent2); font-weight:600; }

    .item-footer { display:flex; gap:.75rem; margin-top:.6rem; flex-wrap:wrap; }
    .item-detail { font-size:.72rem; color:var(--muted); }
    .item-detail span { color:var(--text); }

    .btn-take { background:var(--accent); color:#1a1a24; border:none; border-radius:8px; padding:.4rem .85rem; font-size:.78rem; font-weight:600; font-family:var(--font); cursor:pointer; }
    .btn-undo { background:none; border:1px solid var(--border); border-radius:8px; padding:.3rem .6rem; font-size:.7rem; color:var(--muted); font-family:var(--font); cursor:pointer; transition:all .15s; }
    .btn-undo:active { background:var(--surface2); color:var(--text); }
    .btn-restock { background:var(--green); color:#1a1a24; border:none; border-radius:8px; padding:.4rem .85rem; font-size:.78rem; font-weight:600; font-family:var(--font); cursor:pointer; }

    /* Timing badges */
    .timing-wrap { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.5rem; }
    .timing-badge { font-size:.65rem; padding:.2rem .5rem; border-radius:6px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); }

    /* Category filter */
    .cat-filter { display:flex; gap:.4rem; overflow-x:auto; margin-bottom:1rem; padding-bottom:.25rem; }
    .cat-btn { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:.35rem .75rem; font-size:.72rem; color:var(--muted); cursor:pointer; white-space:nowrap; font-family:var(--font); flex-shrink:0; }
    .cat-btn.active { background:var(--accent); border-color:var(--accent); color:#1a1a24; font-weight:500; }

    /* Encyclopedia */
    .encyc-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1rem 1.1rem; margin-bottom:.75rem; cursor:pointer; }
    .encyc-name { font-size:.95rem; font-weight:500; margin-bottom:.3rem; }
    .encyc-desc { font-size:.78rem; color:var(--muted); line-height:1.5; }
    .encyc-tags { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.6rem; }
    .encyc-tag { font-size:.65rem; padding:.2rem .5rem; border-radius:6px; background:rgba(179,136,255,.12); color:var(--accent); border:1px solid rgba(179,136,255,.2); }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(6px); z-index:100; display:none; align-items:flex-end; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:24px 24px 0 0; padding:1.5rem 1.25rem 2rem; width:100%; max-height:92vh; overflow-y:auto; animation:slideUp .3s ease; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 1.25rem; }
    .modal-title { font-size:1.1rem; font-weight:500; margin-bottom:1.25rem; }

    /* Preset grid */
    .preset-scroll { display:flex; gap:.5rem; overflow-x:auto; padding-bottom:.3rem; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .preset-scroll::-webkit-scrollbar { display:none; }
    .preset-btn { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:.75rem .5rem; font-size:.72rem; color:var(--text); cursor:pointer; font-family:var(--font); text-align:center; display:flex; flex-direction:column; align-items:center; gap:.35rem; min-width:68px; flex-shrink:0; transition:border-color .15s; }
    .preset-btn .p-icon { font-size:1.5rem; }
    .preset-btn .p-name { font-size:.68rem; line-height:1.3; white-space:nowrap; }
    .preset-btn.selected { border-color:var(--accent); background:rgba(179,136,255,.1); color:var(--accent); }

    .divider { display:flex; align-items:center; gap:.75rem; margin:1rem 0; color:var(--muted); font-size:.75rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

    .form-group { margin-bottom:1rem; }
    .form-label { font-size:.72rem; color:var(--muted); letter-spacing:.05em; text-transform:uppercase; display:block; margin-bottom:.4rem; }
    input, select { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:.75rem 1rem; font-size:.95rem; color:var(--text); font-family:var(--font); outline:none; transition:border-color .15s; }
    input:focus, select:focus { border-color:var(--accent); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
    .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.5rem; }

    /* Timing checkboxes */
    .timing-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.4rem; }
    .timing-check { display:flex; align-items:center; gap:.4rem; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:.5rem .6rem; cursor:pointer; }
    .timing-check input { width:auto; }
    .timing-check label { font-size:.78rem; cursor:pointer; }
    .timing-check.checked { border-color:var(--accent); }

    .btn-primary { width:100%; padding:.9rem; background:var(--accent); color:#1a1a24; border:none; border-radius:12px; font-size:.95rem; font-weight:600; font-family:var(--font); cursor:pointer; margin-top:.5rem; }
    .btn-cancel { width:100%; padding:.75rem; background:none; color:var(--muted); border:none; font-size:.88rem; font-family:var(--font); cursor:pointer; }

    .fab { position:fixed; bottom:calc(72px + env(safe-area-inset-bottom)); right:1.25rem; width:56px; height:56px; border-radius:18px; background:var(--accent); color:#1a1a24; border:none; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 24px rgba(179,136,255,.4); z-index:50; transition:transform .15s; }
    .fab:active { transform:scale(.92); }

    .ad-banner { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:.6rem 1rem; display:flex; align-items:center; justify-content:center; gap:.5rem; z-index:40; padding-bottom:calc(.6rem + env(safe-area-inset-bottom)); }
    .ad-label { font-size:.6rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
    .ad-content { font-size:.78rem; color:var(--muted); flex:1; text-align:center; }

    .empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); }
    .empty-icon { font-size:2.5rem; margin-bottom:.75rem; }
    .toast { position:fixed; top:1.5rem; left:50%; transform:translateX(-50%); background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:.75rem 1.25rem; font-size:.85rem; font-weight:500; z-index:300; animation:toastIn .3s ease; white-space:nowrap; }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    .search-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:.75rem 1rem; font-size:.95rem; color:var(--text); font-family:var(--font); outline:none; margin-bottom:1rem; }
    .search-input:focus { border-color:var(--accent); }
    .free-banner { margin:0 1.25rem 1.25rem; background:rgba(245,200,66,.1); border:1px solid rgba(245,200,66,.25); border-radius:12px; padding:.75rem 1rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .free-banner-text { font-size:.8rem; color:var(--yellow); }
    .upgrade-btn { font-size:.72rem; font-weight:500; color:#1a1a24; background:var(--yellow); border:none; border-radius:8px; padding:.4rem .75rem; cursor:pointer; white-space:nowrap; font-family:var(--font); }
    .pro-gate-small { background:rgba(245,200,66,.08); border:1px solid rgba(245,200,66,.2); border-radius:12px; padding:.9rem 1rem; text-align:center; margin-bottom:.75rem; }
    .pro-gate-small p { font-size:.82rem; color:var(--yellow); margin-bottom:.6rem; }
    .rating-btn { flex:1; padding:.55rem .3rem; background:var(--surface2); border:1px solid var(--border); border-radius:10px; font-size:.75rem; color:var(--muted); cursor:pointer; font-family:var(--font); transition:all .15s; }
    .rating-btn.selected { background:var(--accent); border-color:var(--accent); color:#1a1a24; font-weight:600; }
    .history-item { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:.9rem 1rem; margin-bottom:.6rem; display:flex; align-items:center; justify-content:space-between; gap:.75rem; }
    .history-icon { font-size:1.2rem; flex-shrink:0; }
    .history-info { flex:1; min-width:0; }
    .history-name { font-size:.88rem; font-weight:500; }
    .history-date { font-size:.7rem; color:var(--muted); margin-top:.15rem; }
    .history-right { text-align:right; flex-shrink:0; }
    .history-price { font-size:.95rem; font-weight:600; color:var(--accent); }
    .history-qty { font-size:.7rem; color:var(--muted); margin-top:.1rem; }
    .memo-log { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:.75rem 1rem; margin-bottom:.5rem; }
    .memo-log-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.4rem; }
    .memo-log-name { font-size:.82rem; font-weight:500; }
    .memo-log-date { font-size:.68rem; color:var(--muted); }
    .memo-ratings { display:flex; gap:.5rem; margin-bottom:.3rem; }
    .memo-rating-chip { font-size:.68rem; padding:.15rem .45rem; border-radius:20px; background:var(--surface2); }
    .btn-memo { background:rgba(179,136,255,.15); color:var(--accent); border:1px solid rgba(179,136,255,.2); border-radius:8px; padding:.35rem .7rem; font-size:.72rem; font-weight:500; font-family:var(--font); cursor:pointer; white-space:nowrap; }
    .preset-cat-label { font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:0 0 .4rem; }
    .cat-section { margin-bottom:1rem; }
    .icon-picker { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.4rem; }
    .icon-pick-btn { width:38px; height:38px; border-radius:9px; background:var(--surface2); border:1px solid var(--border); font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color .15s; }
    .icon-pick-btn.selected { border-color:var(--accent); background:rgba(179,136,255,.15); }
    /* Encyc sub-tabs */
    .encyc-tabs { display:flex; gap:0; margin-bottom:1rem; background:var(--surface); border-radius:12px; padding:3px; border:1px solid var(--border); }
    .encyc-tab { flex:1; padding:.5rem .2rem; font-size:.72rem; color:var(--muted); background:none; border:none; border-radius:9px; cursor:pointer; font-family:var(--font); transition:all .2s; }
    .encyc-tab.active { background:var(--surface2); color:var(--text); font-weight:500; }
    /* Compat check */
    .compat-section { margin-top:1.25rem; }
    .compat-card { border-radius:14px; padding:.85rem 1rem; margin-bottom:.6rem; }
    .compat-card.caution { background:rgba(255,124,110,.08); border:1px solid rgba(255,124,110,.25); }
    .compat-card.overlap { background:rgba(245,200,66,.08); border:1px solid rgba(245,200,66,.2); }
    .compat-card.synergy { background:rgba(94,207,160,.08); border:1px solid rgba(94,207,160,.2); }
    .compat-title { font-size:.82rem; font-weight:500; margin-bottom:.3rem; }
    .compat-detail { font-size:.75rem; color:var(--muted); line-height:1.55; }
    /* Timing guide */
    .timing-section { margin-bottom:1.25rem; }
    .timing-header { display:flex; align-items:center; gap:.5rem; margin-bottom:.6rem; }
    .timing-header-label { font-size:.88rem; font-weight:500; }
    .timing-item { display:flex; gap:.75rem; padding:.55rem 0; border-bottom:1px solid var(--border); }
    .timing-item:last-child { border-bottom:none; }
    .timing-item-name { font-size:.82rem; font-weight:400; min-width:110px; flex-shrink:0; }
    .timing-item-reason { font-size:.75rem; color:var(--muted); line-height:1.5; }
    /* Compat guide (static) */
    .compat-guide-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:.9rem 1rem; margin-bottom:.75rem; }
    .compat-guide-type { font-size:.65rem; font-weight:500; letter-spacing:.08em; text-transform:uppercase; padding:.15rem .5rem; border-radius:20px; margin-bottom:.5rem; display:inline-block; }
    .compat-guide-type.caution { background:rgba(255,124,110,.15); color:var(--accent2); }
    .compat-guide-type.overlap { background:rgba(245,200,66,.12); color:var(--yellow); }
    .compat-guide-type.synergy { background:rgba(94,207,160,.12); color:var(--green); }
    .compat-guide-combo { font-size:.88rem; font-weight:500; margin-bottom:.3rem; }
    .compat-guide-detail { font-size:.75rem; color:var(--muted); line-height:1.55; }
  </style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <a class="back-link" href="index.html" style="display:inline-flex;align-items:center;gap:.5rem;"><img src="/logo.png" style="width:20px;height:20px;object-fit:contain;border-radius:5px;" alt=""> Totonoi One</a>
    <button class="auth-chip" id="authBtn" onclick="openAuthModal()">ログイン</button>
  </div>
  <h1 class="app-title">Med<span>ly</span></h1>
</div>

<div class="summary-card">
  <p class="summary-label">在庫サマリー</p>
  <div class="summary-stats">
    <div class="summary-stat">
      <p class="summary-stat-value" id="totalItems">0</p>
      <p class="summary-stat-label">登録中</p>
    </div>
    <div class="summary-stat">
      <p class="summary-stat-value" style="color:var(--accent2)" id="urgentItems">0</p>
      <p class="summary-stat-label">残り少ない</p>
    </div>
    <div class="summary-stat">
      <p class="summary-stat-value" style="color:var(--yellow)" id="warningItems">0</p>
      <p class="summary-stat-label">もうすぐ</p>
    </div>
  </div>
  <div style="height:1px;background:rgba(255,255,255,.08);margin:.9rem 0;"></div>
  <div class="summary-stats">
    <div class="summary-stat">
      <p class="summary-stat-value" style="font-size:1.3rem;color:var(--accent)" id="monthlyCost">¥—</p>
      <p class="summary-stat-label">月額推計</p>
    </div>
    <div class="summary-stat">
      <p class="summary-stat-value" style="font-size:1.3rem;color:var(--green)" id="annualCost">¥—</p>
      <p class="summary-stat-label">年間予測</p>
    </div>
    <div class="summary-stat">
      <p class="summary-stat-value" style="font-size:1.3rem" id="dailyCost">¥—</p>
      <p class="summary-stat-label">1日あたり</p>
    </div>
  </div>
  <div id="urgentBanner"></div>
  <span class="card-deco" aria-hidden="true">+</span>
</div>

// ── Cost calculation ──
function avgPricePerUnit(item) {
  var hist = purchaseHistory.filter(function(h){ return h.itemId===item.id && h.price>0 && h.qty>0; });
  if (hist.length) {
    var totalPrice = hist.reduce(function(s,h){ return s+h.price; },0);
    var totalQty   = hist.reduce(function(s,h){ return s+h.qty; },0);
    return totalPrice / totalQty;
  }
  // 参考価格フォールバック: refPrice ÷ initial量
  if (item.refPrice > 0 && item.initial > 0) {
    return item.refPrice / item.initial;
  }
  return null;
}

function costPerDay(item) {
  var ppu = avgPricePerUnit(item);
  if (ppu===null || !item.daily) return null;
  return ppu * item.daily;
}

function restockDate(item) {
  var days = daysRemaining(item);
  if (days===null) return null;
  var d = new Date(); d.setDate(d.getDate()+days);
  return d;
}

// ── Summary ──
function updateSummary() {
  var urgent=0, warning=0, urgentNames=[];
  items.forEach(function(item) {
    var days = daysRemaining(item);
    if (days !== null && days <= 3) { urgent++; urgentNames.push(item.name); }
    else if (days !== null && days <= 7) warning++;
  });
  document.getElementById('totalItems').textContent = items.length;
  var ct = document.getElementById('medlyCountText');
  if (ct) ct.textContent = items.length + (isPro ? '件' : '/'+FREE_ITEM_LIMIT);
  document.getElementById('urgentItems').textContent = urgent;
  document.getElementById('warningItems').textContent = warning;

  // コスト集計
  var totalDaily = items.reduce(function(s,item){
    var c = costPerDay(item); return c ? s+c : s;
  }, 0);
  var monthly = Math.round(totalDaily * 30);
  var annual  = Math.round(totalDaily * 365);
  var daily   = Math.round(totalDaily);
  var hasCost = totalDaily > 0;
  document.getElementById('monthlyCost').textContent = hasCost ? '¥'+monthly.toLocaleString() : '¥—';
  document.getElementById('annualCost').textContent  = hasCost ? '¥'+annual.toLocaleString()  : '¥—';
  document.getElementById('dailyCost').textContent   = hasCost ? '¥'+daily.toLocaleString()   : '¥—';

  // 期限アラート
  var expiredNames = [], expiringNames = [];
  items.forEach(function(item) {
    var d = daysUntilExpiry(item);
    if (d === null) return;
    if (d < 0)  expiredNames.push(item.name);
    else if (d <= 30) expiringNames.push(item.name + '（あと'+d+'日）');
  });
  var banner = document.getElementById('urgentBanner');
  var bannerHTML = '';
  if (urgentNames.length) bannerHTML += '<div class="urgent-badge" style="margin-top:.75rem;">⚠️ 購入推奨: '+urgentNames.join('・')+'</div>';
  if (expiredNames.length) bannerHTML += '<div class="urgent-badge" style="margin-top:.5rem;background:rgba(255,80,80,.15);border-color:rgba(255,80,80,.3);">🚨 期限切れ: '+expiredNames.join('・')+'</div>';
  if (expiringNames.length) bannerHTML += '<div class="urgent-badge" style="margin-top:.5rem;background:rgba(245,200,66,.1);border-color:rgba(245,200,66,.25);color:var(--yellow);">📅 期限間近: '+expiringNames.join('・')+'</div>';
  banner.innerHTML = bannerHTML;
}

// ── Days remaining ──
function daysRemaining(item) {
  if (!item.daily || !item.current) return null;
  return Math.floor(item.current / item.daily);
}

function daysClass(days) {
  if (days === null) return 'good';
  if (days <= 3) return 'urgent';
  if (days <= 7) return 'warning';
  return 'good';
}

function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function daysUntilExpiry(item) {
  if (!item.expiry) return null;
  var p = item.expiry.split('-');
  var exp = new Date(+p[0], +p[1]-1, +p[2]);
  var now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((exp - now) / 86400000);
}

function expiryBadge(item) {
  var d = daysUntilExpiry(item);
  if (d === null) return '';
  if (d < 0)  return '<span class="days-badge expired">⚠️ 期限切れ</span>';
  if (d <= 7)  return '<span class="days-badge urgent">⚠️ 期限まで'+d+'日</span>';
  if (d <= 30) return '<span class="days-badge warning">期限まで'+d+'日</span>';
  var p = item.expiry.split('-');
  return '<span class="days-badge good" style="font-size:.65rem;">期限 '+p[0].slice(2)+'/'+p[1]+'/'+p[2]+'</span>';
}

function pct(item) {
  if (!item.initial || !item.current) return 100;
  return Math.min(100, Math.round((item.current / item.initial) * 100));
}

function costFooter(item) {
  var cpd = costPerDay(item);
  var rd  = restockDate(item);
  if (!cpd && !rd) return '';
  var parts = [];
  if (rd) {
    var m = rd.getMonth()+1, d = rd.getDate();
    parts.push('🛒 補充目安: '+m+'/'+d);
  }
  if (cpd) {
    parts.push('💴 '+Math.round(cpd).toLocaleString()+'円/日');
    parts.push('月'+Math.round(cpd*30).toLocaleString()+'円');
  }
  return '<div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);">'
    +parts.map(function(p){ return '<span style="font-size:.7rem;color:var(--muted);">'+p+'</span>'; }).join('')
    +'</div>';
}

// ── Compat Check (登録アイテムのみ) ──
function itemMatchesKeys(item, keys) {
  var name = item.name.toLowerCase();
  return keys.some(function(k){ return name.includes(k.toLowerCase()); });
}

function renderCompatCheck() {
  var el = document.getElementById('compatCheck');
  if (!el || !items.length) { if(el) el.innerHTML=''; return; }
  var results = [];
  INTERACTION_RULES.forEach(function(rule){
    var aItems = items.filter(function(i){ return itemMatchesKeys(i, rule.a); });
    var bItems = items.filter(function(i){ return itemMatchesKeys(i, rule.b); });
    if (!aItems.length || !bItems.length) return;
    // タイミング重複チェック
    var hasTimingOverlap = aItems.some(function(a){
      return bItems.some(function(b){
        return (a.timing||[]).some(function(t){ return (b.timing||[]).indexOf(t) !== -1; });
      });
    });
    if (hasTimingOverlap || rule.type === 'overlap') {
      results.push(rule);
    }
  });
  if (!results.length) { el.innerHTML=''; return; }
  var cautions  = results.filter(function(r){ return r.type==='caution'; });
  var overlaps  = results.filter(function(r){ return r.type==='overlap'; });
  var synergies = results.filter(function(r){ return r.type==='synergy'; });
  var html = '<div class="compat-section"><p class="section-label">相性チェック</p>';
  function cards(list) {
    return list.map(function(r){
      return '<div class="compat-card '+r.type+'">'
        +'<p class="compat-title">'
        +(r.type==='caution'?'⚠️ ':r.type==='overlap'?'🔄 ':'✅ ')
        +r.combo+'</p>'
        +'<p class="compat-detail">'+r.detail+'</p>'
        +'</div>';
    }).join('');
  }
  html += cards(cautions) + cards(overlaps) + cards(synergies) + '</div>';
  el.innerHTML = html;
}

function filterEncyc() {
  var q = document.getElementById('encycSearch').value.toLowerCase();
  if (!q) { renderEncyc(); return; }
  renderEncyc(ENCYC_DB.filter(function(e){
    return e.name.toLowerCase().includes(q) || e.tags.some(function(t){ return t.includes(q); }) || (e.use||'').includes(q);
  }));
}

// ── Actions ──
function takeItem(id) {
  var item = items.find(function(x){ return x.id===id; });
  if (!item) return;
  if (item.current < item.daily) { showToast('残量が不足しています'); return; }
  item.current = Math.max(0, item.current - item.daily);
  save();
  // 全タイミングを服用済みにマーク（スケジュールと同期）
  (item.timing || []).forEach(function(t){
    dailyTaken.taken[id + '_' + t] = true;
  });
  saveDailyTaken();
  renderList();
  renderSchedule();
  updateSummary();
  showToast(item.icon+' '+item.name+' 服用しました');
  if (daysRemaining(item) <= item.alert) showToast('⚠️ 残り少なくなっています！購入をご検討ください');
}

function openRestock(id) {
  restockId = id;
  var item = items.find(function(x){ return x.id===id; });
  document.getElementById('restockTitle').textContent = (item ? item.icon+' '+item.name+' ' : '')+'を補充';
  document.getElementById('fRestock').value = item ? item.initial || '' : '';
  document.getElementById('fRestockDaily').value = item ? item.daily : '';
  document.getElementById('fRestockBrand').value = '';
  document.getElementById('fRestockPrice').value = '';
  document.getElementById('fRestockDate').value = localDateStr(new Date());
  document.getElementById('restockModal').classList.add('show');
}

function confirmRestock() {
  var num = parseInt(document.getElementById('fRestock').value);
  if (!num) { showToast('入り数を入力してください'); return; }
  var item = items.find(function(x){ return x.id===restockId; });
  if (!item) return;
  item.current += num;
  item.initial = num;
  var newDaily = parseFloat(document.getElementById('fRestockDaily').value);
  if (newDaily && newDaily !== item.daily) item.daily = newDaily;
  var brand = document.getElementById('fRestockBrand').value.trim();
  var price = parseInt(document.getElementById('fRestockPrice').value) || 0;
  var date  = document.getElementById('fRestockDate').value || localDateStr(new Date());
  purchaseHistory.unshift({
    id: Date.now().toString(), itemId: item.id, itemName: item.name,
    icon: item.icon||'💊', unit: item.unit,
    qty: num, price: price, date: date, note: brand
  });
  localStorage.setItem('medlyPurchase', JSON.stringify(purchaseHistory));
  dbSave('purchase', purchaseHistory);
  save();
  closeModal('restockModal');
  renderList(); renderPurchaseHistory(); updateSummary();
  var msg = brand ? brand+' '+num+item.unit : num+item.unit;
  showToast('✅ '+item.name+' '+msg+' 補充しました');
}

function renderDosageLog() {

    return;
  }
  var today = localDateStr(new Date());
  var _yd = new Date(); _yd.setDate(_yd.getDate()-1);
  var yesterday = localDateStr(_yd);
  var grouped = {};
  dosageLog.forEach(function(e) {
    var label = e.date === today ? '今日' : e.date === yesterday ? '昨日' : e.date.replace(/(\d{4})-(\d{2})-(\d{2})/,'$2月$3日');
    if (!grouped[e.date]) grouped[e.date] = {label:label, entries:[]};
    grouped[e.date].entries.push(e);
  });
  el.innerHTML = Object.keys(grouped).sort(function(a,b){ return b.localeCompare(a); }).map(function(date) {
    var g = grouped[date];
    return '<p class="section-label" style="margin-bottom:.5rem;">' + g.label + '</p>'
      + g.entries.map(function(e) {
        return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;margin-bottom:.4rem;display:flex;align-items:center;gap:.75rem;">'
          + '<span style="font-size:1.2rem;flex-shrink:0;">' + e.icon + '</span>'
          + '<div style="flex:1;min-width:0;">'
            + '<p style="font-size:.88rem;font-weight:500;">' + e.itemName + '</p>'
            + '<p style="font-size:.7rem;color:var(--muted);margin-top:.1rem;">' + e.timing + ' · ' + e.daily + e.unit + '</p>'
          + '</div>'
          + '<p style="font-size:.75rem;color:var(--muted);flex-shrink:0;">' + e.time + '</p>'
          + '</div>';
      }).join('');
  }).join('');
}

  var cb = document.getElementById('t-'+t);
  el.classList.toggle('checked', selectedTimings.indexOf(t) !== -1);
  cb.checked = selectedTimings.indexOf(t) !== -1;

function saveDailyTaken() { localStorage.setItem('medlyDailyTaken', JSON.stringify(dailyTaken)); }

function takeFromSchedule(id, timing) {
  var key = id + '_' + timing;
  if (dailyTaken.taken[key]) { showToast('今日はすでに服用済みです'); return; }
  var item = items.find(function(x){ return x.id===id; });
  if (!item) return;
  if (item.current < item.daily) { showToast('残量が不足しています'); return; }
  item.current = Math.max(0, item.current - item.daily);
  save();
  dailyTaken.taken[key] = true;
  saveDailyTaken();
  var now = new Date();
  dosageLog.unshift({
    id: Date.now().toString(), date: localDateStr(now),
    time: now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}),
    itemId: item.id, itemName: item.name, icon: item.icon,
    timing: TIMING_LABELS[timing] || timing, daily: item.daily, unit: item.unit
  });
  if (dosageLog.length > 500) dosageLog = dosageLog.slice(0, 500);
  localStorage.setItem('medlyDosageLog', JSON.stringify(dosageLog));
  dbSave('dosageLog', dosageLog);
  renderSchedule();
  renderList();
  updateSummary();
  showToast(item.icon+' '+item.name+' 服用しました');
  if (daysRemaining(item) <= item.alert) showToast('⚠️ 残り少なくなっています！購入をご検討ください');
}

function undoTake(id, timing) {
  var key = id + '_' + timing;
  if (!dailyTaken.taken[key]) return;
  var item = items.find(function(x){ return x.id===id; });
  if (!item) return;
  delete dailyTaken.taken[key];
  item.current = item.current + item.daily;
  save();
  saveDailyTaken();
  renderSchedule();
  renderList();
  updateSummary();
  showToast('↩️ '+item.name+' の服用を取り消しました');
}

(function() {
  var tabNames = (function(){ var ts=[]; document.querySelectorAll('.tab').forEach(function(t){ var m=t.getAttribute('onclick')||''; var n=m.match(/switchTab\('([^']+)'/); if(n) ts.push(n[1]); }); return ts; })();
  if(!tabNames.length) return;
  var currentIdx=0, sx=0, sy=0;
  document.addEventListener('touchstart',function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
  document.addEventListener('touchend',function(e){
    if(document.querySelector('.modal-overlay.show')) return;
    var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy)*1.5) return;
    var newIdx=Math.max(0,Math.min(tabNames.length-1, currentIdx+(dx<0?1:-1)));
    if(newIdx===currentIdx) return;
    currentIdx=newIdx;
    var btn=document.querySelectorAll('.tab')[currentIdx];
    if(btn) btn.click();
    if(navigator.vibrate) navigator.vibrate(15);
  },{passive:true});
  var orig=window.switchTab;
  if(orig) window.switchTab=function(name,btn){
    var i=tabNames.indexOf(name); if(i>=0) currentIdx=i; orig(name,btn);
  };
})();
(function(){
  if(!window.IntersectionObserver) return;
  var style=document.createElement('style');
  style.textContent='.fi{opacity:0;transform:translateY(14px);transition:opacity .4s ease,transform .4s ease}.fi.vis{opacity:1;transform:translateY(0)}';
  document.head.appendChild(style);
  var obs=new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target);} }); },{threshold:.08});
  new MutationObserver(function(ms){ ms.forEach(function(m){ m.addedNodes.forEach(function(n){ if(n.nodeType!==1) return; var cs=n.classList&&(n.classList.contains('card')||n.classList.contains('item-card'))?[n]:Array.from(n.querySelectorAll('.card,.item-card')); cs.forEach(function(c){c.classList.add('fi');obs.observe(c);}); }); }); }).observe(document.body,{childList:true,subtree:true});
})();
(function(){
  if(!navigator.vibrate) return;
  var t=null;
  document.addEventListener('touchstart',function(e){ var el=e.target.closest('.card,.item-card'); if(!el) return; t=setTimeout(function(){navigator.vibrate([30,20,30]);},500); },{passive:true});
  document.addEventListener('touchend',function(){clearTimeout(t);},{passive:true});
  document.addEventListener('touchmove',function(){clearTimeout(t);},{passive:true});
})();
</script>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal" onclick="closeModalOutside(event,'authModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:1.25rem;border:1px solid var(--border);">
      <button id="tabLogin" onclick="setAuthMode('login')" style="flex:1;padding:.55rem;border:none;border-radius:8px;font-family:var(--font);font-size:.82rem;cursor:pointer;transition:all .2s;background:var(--surface3);color:var(--text);font-weight:500;">ログイン</button>
      <button id="tabSignup" onclick="setAuthMode('signup')" style="flex:1;padding:.55rem;border:none;border-radius:8px;font-family:var(--font);font-size:.82rem;cursor:pointer;transition:all .2s;background:none;color:var(--muted);font-weight:300;">新規登録</button>
    </div>
    <div class="form-group">
      <label class="form-label">メールアドレス</label>
      <input type="email" id="authEmail" placeholder="your@email.com" style="width:100%">
    </div>
    <div class="form-group">
      <label class="form-label">パスワード（6文字以上）</label>
      <input type="password" id="authPassword" placeholder="••••••••" style="width:100%">
    </div>
    <button onclick="handleGoogleAuth()" style="width:100%;padding:.85rem;background:#fff;color:#1a1a24;border:none;border-radius:12px;font-size:.95rem;font-weight:500;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:.75rem;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google でログイン
    </button>
    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;color:var(--muted);font-size:.75rem;"><div style="flex:1;height:1px;background:var(--border);"></div>または<div style="flex:1;height:1px;background:var(--border);"></div></div>
    <button class="btn-primary" id="authSubmitBtn" onclick="handleAuth()">ログイン</button>
    <button class="btn-cancel" onclick="closeModal('authModal')">キャンセル</button>
  </div>
</div>

<!-- 購入履歴編集モーダル -->
<div class="modal-overlay" id="editPurchaseModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="modal-handle"></div>
    <p class="modal-title">購入履歴を編集</p>
    <div class="form-group">
      <label>購入日</label>
      <input type="date" id="epDate" style="width:100%">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;">
      <div class="form-group">
        <label>金額（円）</label>
        <input type="number" id="epPrice" placeholder="0" style="width:100%">
      </div>
      <div class="form-group">
        <label>補充数量</label>
        <input type="number" id="epQty" placeholder="1" style="width:100%">
      </div>
    </div>
    <div class="form-group">
      <label>メモ（ブランド名など）</label>
      <input type="text" id="epNote" placeholder="例：DHC" style="width:100%">
    </div>
    <button class="btn-primary" onclick="saveEditPurchase()">保存する</button>
    <button class="btn-cancel" onclick="document.getElementById('editPurchaseModal').classList.remove('show')">キャンセル</button>
  </div>
</div>
