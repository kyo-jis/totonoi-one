<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Readly — メモ・日記</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest-readly.json">
  <link rel="icon" type="image/png" href="/favicon.ico">
  <meta name="theme-color" content="#0c0c18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Readly">
  <link rel="apple-touch-icon" href="/apple-touch-icon-readly.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0c0c18; --surface:#14142a; --surface2:#1c1c38; --surface3:#242448;
      --border:#2e2e50; --text:#f2f2fa; --muted:#9494b8;
      --accent:#6c8eff; --accent-dark:#4a6edf; --accent2:#ff7c6e;
      --green:#5ecfa0; --yellow:#f5c842; --purple:#b388ff;
      --font:'Outfit',sans-serif;
      --shadow-sm:0 2px 10px rgba(0,0,0,.3); --shadow-md:0 4px 24px rgba(0,0,0,.4);
      --spring:cubic-bezier(.34,1.56,.64,1);
    }
    html { font-size:16px; }
    body { background:var(--bg); color:var(--text); font-family:var(--font); font-weight:400; min-height:100vh; padding-bottom:130px; }
    .app-header { padding:3rem 1.25rem 1.25rem; }
    .back-link { font-size:.75rem; color:var(--muted); text-decoration:none; letter-spacing:.1em; text-transform:uppercase; display:inline-flex; align-items:center; gap:.4rem; }
    .app-title { font-size:1.6rem; font-weight:500; letter-spacing:-.02em; }
    .app-title span { font-family:'Playfair Display',serif; font-style:italic; color:var(--accent); }
    .auth-chip { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:.3rem .85rem; font-size:.72rem; color:var(--muted); cursor:pointer; font-family:var(--font); transition:all .2s; white-space:nowrap; }
    .auth-chip.logged-in { border-color:var(--accent); color:var(--accent); }
    /* Login Notice */
    .login-notice { margin: -.25rem 1.25rem .75rem; background: rgba(148,148,184,.07); border: 1px solid rgba(148,148,184,.18); border-radius: 12px; padding: .6rem 1rem; display: flex; align-items: center; gap: .65rem; cursor: pointer; font-size: .78rem; color: var(--muted); transition: opacity .2s; }
    .login-notice:active { opacity: .7; }
    .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem; }
    .search-bar { margin:0 1.25rem 1rem; position:relative; }
    .search-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:.75rem 1rem .75rem 2.5rem; font-size:.9rem; color:var(--text); font-family:var(--font); outline:none; transition:border-color .15s; }
    .search-input:focus { border-color:var(--accent); }
    .search-icon { position:absolute; left:.85rem; top:50%; transform:translateY(-50%); color:var(--muted); font-size:.9rem; }
    .tabs { display:flex; gap:0; margin:0 1.25rem 1.25rem; background:var(--surface); border-radius:14px; padding:4px; border:1px solid var(--border); box-shadow:var(--shadow-sm); }
    .tab { flex:1; padding:.58rem .2rem; font-size:.72rem; font-weight:400; color:var(--muted); background:none; border:none; border-radius:10px; cursor:pointer; font-family:var(--font); transition:all .2s var(--spring); }
    .tab.active { background:var(--surface2); color:var(--text); font-weight:600; box-shadow:var(--shadow-sm); }
    .tab:active { transform:scale(.93); }
    .view { display:none; }
    .view.active { display:block; }
    .cat-filter { display:flex; gap:.4rem; padding:0 1.25rem 1rem; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .cat-filter::-webkit-scrollbar { display:none; }
    .cat-chip { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:.3rem .8rem; font-size:.72rem; color:var(--muted); cursor:pointer; font-family:var(--font); white-space:nowrap; transition:all .2s; flex-shrink:0; }
    .cat-chip.active { background:var(--surface2); border-color:var(--accent); color:var(--accent); }
    .list-section { padding:0 1.25rem; }
    .note-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1rem 1.1rem; margin-bottom:.625rem; cursor:pointer; animation:slideIn .3s ease; transition:border-color .15s; }
    .note-card:active { border-color:var(--accent); }
    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .note-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:.5rem; }
    .note-title { font-size:.95rem; font-weight:500; flex:1; min-width:0; }
    .note-title.untitled { color:var(--muted); font-style:italic; }
    .note-date { font-size:.68rem; color:var(--muted); flex-shrink:0; margin-left:.75rem; margin-top:.1rem; }
    .note-preview { font-size:.8rem; color:var(--muted); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .note-footer { display:flex; align-items:center; gap:.5rem; margin-top:.6rem; }
    .cat-badge { font-size:.62rem; padding:.15rem .45rem; border-radius:20px; }
    .cat-note     { background:rgba(108,142,255,.15); color:var(--accent); }
    .cat-diary    { background:rgba(94,207,160,.15); color:var(--green); }
    .cat-idea     { background:rgba(245,200,66,.15); color:var(--yellow); }
    .cat-todo     { background:rgba(179,136,255,.15); color:var(--purple); }
    .cat-other    { background:rgba(148,148,184,.15); color:var(--muted); }
    .note-btn-row { display:flex; gap:.4rem; margin-left:auto; }
    .btn-icon { width:28px; height:28px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); font-size:.72rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .empty-state { text-align:center; padding:3rem 2rem; color:var(--muted); }
    .empty-state .empty-icon { font-size:2.5rem; margin-bottom:.75rem; }
    .empty-state p { font-size:.88rem; line-height:1.6; }

    /* Editor */
    .editor-wrap { padding:0 1.25rem; }
    .editor-title { width:100%; background:none; border:none; border-bottom:1px solid var(--border); padding:.5rem 0; font-size:1.2rem; font-weight:500; color:var(--text); font-family:var(--font); outline:none; margin-bottom:.75rem; }
    .editor-meta { display:flex; align-items:center; gap:.75rem; margin-bottom:.75rem; flex-wrap:wrap; }
    .editor-cat { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.35rem .65rem; font-size:.75rem; color:var(--text); font-family:var(--font); outline:none; }
    .editor-date { font-size:.72rem; color:var(--muted); }
    .editor-body { width:100%; min-height:280px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem; font-size:.95rem; color:var(--text); font-family:var(--font); outline:none; line-height:1.7; resize:none; transition:border-color .15s; }
    .editor-body:focus { border-color:var(--accent); }
    .editor-actions { display:flex; gap:.75rem; margin-top:1rem; }
    .btn-save { flex:1; padding:.85rem; background:var(--accent); color:#fff; border:none; border-radius:12px; font-size:.9rem; font-weight:500; font-family:var(--font); cursor:pointer; }
    .btn-save:active { transform:scale(.97); }
    .btn-discard { padding:.85rem 1.25rem; background:var(--surface); border:1px solid var(--border); border-radius:12px; font-size:.9rem; color:var(--muted); font-family:var(--font); cursor:pointer; }
    .char-count { font-size:.7rem; color:var(--muted); text-align:right; margin-top:.4rem; }

    .analytics-wrap { padding:0 1.25rem; }
    .analytics-section { margin-bottom:1.5rem; }
    .analytics-title { font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:.75rem; }
    .bar-chart { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.25rem 1rem; }
    .analysis-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; }
    .analysis-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1rem; }
    .analysis-card-label { font-size:.65rem; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:.4rem; }
    .analysis-card-value { font-size:1.3rem; font-weight:600; letter-spacing:-.02em; }
    .analysis-card-sub { font-size:.68rem; color:var(--muted); margin-top:.2rem; }
    .free-banner { margin:0 1.25rem 1rem; background:rgba(245,200,66,.1); border:1px solid rgba(245,200,66,.25); border-radius:12px; padding:.75rem 1rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .free-banner-text { font-size:.8rem; color:var(--yellow); }
    .upgrade-btn { font-size:.72rem; font-weight:500; color:#1a1a24; background:var(--yellow); border:none; border-radius:8px; padding:.4rem .75rem; cursor:pointer; white-space:nowrap; font-family:var(--font); }
    .fab { position:fixed; bottom:calc(72px + env(safe-area-inset-bottom)); right:1.25rem; width:56px; height:56px; border-radius:18px; background:var(--accent); color:#fff; border:none; font-size:1.5rem; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 24px rgba(108,142,255,.4); z-index:50; transition:transform .15s; }
    .fab:active { transform:scale(.92); }
    .ad-banner { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:.6rem 1rem; display:flex; align-items:center; justify-content:center; gap:.5rem; z-index:40; padding-bottom:calc(.6rem + env(safe-area-inset-bottom)); }
    .ad-label { font-size:.6rem; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }
    .ad-content { font-size:.78rem; color:var(--muted); flex:1; text-align:center; }
    input, select, textarea { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:.75rem 1rem; font-size:.95rem; color:var(--text); font-family:var(--font); outline:none; }
    input:focus, select:focus, textarea:focus { border-color:var(--accent); }
    .form-group { margin-bottom:1rem; }
    .form-label { font-size:.75rem; color:var(--muted); letter-spacing:.05em; text-transform:uppercase; display:block; margin-bottom:.4rem; }
    .btn-primary { width:100%; padding:.9rem; background:var(--accent); color:#fff; border:none; border-radius:12px; font-size:.95rem; font-weight:500; font-family:var(--font); cursor:pointer; margin-top:.5rem; }
    .btn-cancel { width:100%; padding:.75rem; background:none; color:var(--muted); border:none; font-size:.88rem; font-family:var(--font); cursor:pointer; margin-top:.25rem; }
    .share-btn { width:100%; padding:.8rem; border:none; border-radius:12px; font-size:.88rem; font-weight:500; font-family:var(--font); cursor:pointer; }
    .share-x { background:#000; color:#fff; }
    .share-line { background:#06c755; color:#fff; }
    .share-copy { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  </style>
</head>
<body>
<div class="app-header">
  <div class="header-top">
    <a class="back-link" href="index.html"> Totonoi One</a>
    <button class="auth-chip" id="authBtn" onclick="openAuthModal()">ログイン</button>
  </div>
  <h1 class="app-title">Read<span>ly</span></h1>
</div>
<div id="loginNotice" class="login-notice" onclick="openAuthModal()" style="display:none">
  <span style="font-size:1rem">&#x2601;&#xFE0F;</span>
  <span style="flex:1;line-height:1.4">ログインするとデータをクラウドで保護できます</span>
  <span style="font-size:.75rem;opacity:.6">ログイン →</span>
</div>

<div class="search-bar">
  <span class="search-icon">🔍</span>
  <input type="text" class="search-input" id="searchInput" placeholder="メモを検索..." oninput="onSearch()">
</div>

<div class="free-banner" id="freeBanner">
  <p class="free-banner-text"><strong id="countText">0/30</strong> 件登録中（無料プラン）</p>
  <a href="index.html" class="upgrade-btn">アップグレード</a>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('list',this)">一覧</button>
  <button class="tab" onclick="switchTab('write',this)" id="tabWrite">✏️ 書く</button>
  <button class="tab" onclick="switchTab('settings',this)">設定</button>
</div>

<div class="view active" id="view-list">
  <div class="cat-filter">
    <button class="cat-chip active" onclick="filterCat('all',this)">すべて</button>
    <button class="cat-chip" onclick="filterCat('note',this)">📝 メモ</button>
    <button class="cat-chip" onclick="filterCat('diary',this)">📔 日記</button>
    <button class="cat-chip" onclick="filterCat('idea',this)">💡 アイデア</button>
    <button class="cat-chip" onclick="filterCat('todo',this)">✅ TODO</button>
    <button class="cat-chip" onclick="filterCat('other',this)">📦 その他</button>
  </div>
  <div class="list-section"><div id="noteList"></div></div>
</div>

<div class="view" id="view-write">
  <div class="editor-wrap">
    <input type="text" class="editor-title" id="editorTitle" placeholder="タイトル（任意）">
    <div class="editor-meta">
      <select class="editor-cat" id="editorCat">
        <option value="note">📝 メモ</option>
        <option value="diary">📔 日記</option>
        <option value="idea">💡 アイデア</option>
        <option value="todo">✅ TODO</option>
        <option value="other">📦 その他</option>
      </select>
      <span class="editor-date" id="editorDate"></span>
    </div>
    <textarea class="editor-body" id="editorBody" placeholder="ここに書く..." oninput="updateCharCount()"></textarea>
    <p class="char-count" id="charCount">0文字</p>
    <div class="editor-actions">
      <button class="btn-discard" onclick="discardNote()">キャンセル</button>
      <button class="btn-save" onclick="saveNote()">保存する</button>
    </div>
  </div>
</div>

<div class="view" id="view-settings">
  <div class="analytics-wrap">
    <div class="analytics-section">
      <p class="analytics-title">統計</p>
      <div class="analysis-grid" id="statsGrid"></div>
    </div>
    <div class="analytics-section">
      <p class="analytics-title">プラン</p>
      <div class="bar-chart" style="padding:1rem 1.1rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <p style="font-size:.95rem;font-weight:500;" id="planLabel">無料プラン</p>
            <p style="font-size:.75rem;color:var(--muted);margin-top:.2rem;" id="planDesc">登録30件・広告あり</p>
          </div>
          <span style="font-size:.7rem;padding:.25rem .6rem;border-radius:20px;background:rgba(108,142,255,.15);color:var(--accent);" id="planBadge">現在</span>
        </div>
        <a href="index.html" style="display:block;margin-top:.9rem;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:.75rem;font-size:.85rem;color:var(--accent);text-decoration:none;">ダッシュボードでプランを管理 →</a>
      </div>
    </div>
    <div class="analytics-section">
      <p class="analytics-title">使い方ガイド</p>
      <div class="bar-chart" style="padding:1rem 1.1rem;">
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:.875rem;line-height:1.5;">各機能の使い方・無料/Proプランの比較はガイドページで確認できます。</p>
        <a href="guide.html" style="display:block;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:.75rem;font-size:.85rem;color:var(--accent);text-decoration:none;">📖 使い方ガイドを見る →</a>
      </div>
    </div>
    <div class="analytics-section">
      <p class="analytics-title">口コミ・シェア</p>
      <div class="bar-chart" style="padding:1rem 1.1rem;">
        <div style="display:flex;flex-direction:column;gap:.5rem;">
          <button onclick="shareX()" class="share-btn share-x">𝕏 でシェアする</button>
          <button onclick="shareLine()" class="share-btn share-line">🟢 LINEで送る</button>
          <button onclick="shareCopy()" class="share-btn share-copy" id="copyBtn">🔗 リンクをコピー</button>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="fab" onclick="newNote()">✏️</button>
<div class="ad-banner" id="adBanner">
  <span class="ad-label">広告</span>
  <p class="ad-content">Google AdSense 広告エリア</p>
</div>

<div id="authModal" style="position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end;" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;animation:slideUp .3s ease;">
    <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.25rem;"></div>
      Google でログイン
    </button>

    <button class="btn-cancel" onclick="document.getElementById('authModal').style.display='none'">キャンセル</button>
  </div>
</div>

<script>
var FREE_LIMIT = 30;
var isPro = localStorage.getItem('isPro') === 'true';
var CAT_LABELS = { all:'すべて', note:'📝 メモ', diary:'📔 日記', idea:'💡 アイデア', todo:'✅ TODO', other:'📦 その他' };
var notes = JSON.parse(localStorage.getItem('readly_notes') || '[]');
var currentCat = 'all';
var searchQuery = '';
var editId = null;

function init() { renderNotes(); updateProUI(); renderStats(); }

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-chip').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  renderNotes();
}
function onSearch() { searchQuery = document.getElementById('searchInput').value.toLowerCase(); renderNotes(); }

function renderNotes() {
  var el = document.getElementById('noteList');
  var list = notes.filter(function(n){
    if (currentCat !== 'all' && n.category !== currentCat) return false;
    if (searchQuery) return (n.title||'').toLowerCase().includes(searchQuery) || (n.body||'').toLowerCase().includes(searchQuery);
    return true;
  });
  if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><p>' + (searchQuery?'検索結果がありません':'まだメモがありません。<br>✏️ボタンで書いてみましょう') + '</p></div>'; return; }
  el.innerHTML = list.map(function(n) {
    var d = new Date(n.updatedAt || n.createdAt);
    var dateStr = d.getMonth()+1 + '/' + d.getDate();
    var catBadge = '<span class="cat-badge cat-' + n.category + '">' + CAT_LABELS[n.category] + '</span>';
    return '<div class="note-card" onclick="openNote(\'' + n.id + '\')">'
      + '<div class="note-card-top">'
        + '<p class="note-title' + (!n.title?' untitled':'') + '">' + (n.title||'（タイトルなし）') + '</p>'
        + '<span class="note-date">' + dateStr + '</span>'
      + '</div>'
      + (n.body ? '<p class="note-preview">' + n.body.replace(/</g,'&lt;') + '</p>' : '')
      + '<div class="note-footer">' + catBadge
        + '<div class="note-btn-row">'
          + '<button class="btn-icon" onclick="event.stopPropagation();deleteNote(\'' + n.id + '\')">🗑</button>'
        + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
  document.getElementById('countText').textContent = notes.length + (isPro ? '件' : '/30');
}

function newNote() {
  editId = null;
  document.getElementById('editorTitle').value = '';
  document.getElementById('editorCat').value = 'note';
  document.getElementById('editorBody').value = '';
  document.getElementById('editorDate').textContent = new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric'});
  updateCharCount();
  switchTab('write', document.querySelectorAll('.tab')[1]);
  setTimeout(function(){ document.getElementById('editorBody').focus(); }, 200);
}

function openNote(id) {
  var n = notes.find(function(x){ return x.id===id; });
  if (!n) return;
  editId = id;
  document.getElementById('editorTitle').value = n.title || '';
  document.getElementById('editorCat').value = n.category || 'note';
  document.getElementById('editorBody').value = n.body || '';
  document.getElementById('editorDate').textContent = new Date(n.updatedAt||n.createdAt).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  updateCharCount();
  switchTab('write', document.querySelectorAll('.tab')[1]);
}

function saveNote() {
  var title = document.getElementById('editorTitle').value.trim();
  var cat   = document.getElementById('editorCat').value;
  var body  = document.getElementById('editorBody').value.trim();
  if (!body && !title) { showToast('内容を入力してください'); return; }
  if (!editId && notes.length >= FREE_LIMIT && !isPro) { showToast('無料プランは'+FREE_LIMIT+'件まで'); return; }
  var now = new Date().toISOString();
  if (editId) {
    var i = notes.findIndex(function(x){ return x.id===editId; });
    notes[i] = Object.assign(notes[i], {title:title, category:cat, body:body, updatedAt:now});
  } else {
    notes.unshift({id:Date.now().toString(), title:title, category:cat, body:body, createdAt:now, updatedAt:now});
  }
  persist(); editId = null;
  showToast('✅ 保存しました');
  switchTab('list', document.querySelectorAll('.tab')[0]);
}

function discardNote() { editId = null; switchTab('list', document.querySelectorAll('.tab')[0]); }

function deleteNote(id) {
  if (!confirm('削除しますか？')) return;
  notes = notes.filter(function(x){ return x.id!==id; });
  persist(); renderNotes(); renderStats();
}

function updateCharCount() {
  var len = document.getElementById('editorBody').value.length;
  document.getElementById('charCount').textContent = len + '文字';
}

function persist() { localStorage.setItem('readly_notes', JSON.stringify(notes)); dbSave('notes', notes); renderNotes(); renderStats(); }

function switchTab(name, btn) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
}

function renderStats() {
  var el = document.getElementById('statsGrid');
  if (!el) return;
  var total = notes.length;
  var chars = notes.reduce(function(s,n){ return s+(n.body||'').length; },0);
  var today = new Date().toISOString().split('T')[0];
  var todayCount = notes.filter(function(n){ return (n.updatedAt||n.createdAt||'').startsWith(today); }).length;
  el.innerHTML =
    '<div class="analysis-card"><p class="analysis-card-label">総ノート数</p><p class="analysis-card-value">' + total + '件</p><p class="analysis-card-sub">合計</p></div>'
    + '<div class="analysis-card"><p class="analysis-card-label">総文字数</p><p class="analysis-card-value">' + (chars>=10000?Math.round(chars/1000)+'k':chars) + '</p><p class="analysis-card-sub">全ノート合計</p></div>'
    + '<div class="analysis-card"><p class="analysis-card-label">今日の記録</p><p class="analysis-card-value" style="color:var(--accent)">' + todayCount + '件</p><p class="analysis-card-sub">本日</p></div>'
    + '<div class="analysis-card"><p class="analysis-card-label">日記</p><p class="analysis-card-value">' + notes.filter(function(n){return n.category==='diary';}).length + '件</p><p class="analysis-card-sub">diary</p></div>';
}

function updateProUI() {
  var ad=document.getElementById('adBanner'); if(ad) ad.style.display=isPro?'none':'flex';
  var fab=document.querySelector('.fab'); if(fab) fab.style.bottom=isPro?'1.25rem':'calc(72px + env(safe-area-inset-bottom))';
  document.body.style.paddingBottom=isPro?'80px':'130px';
  var fb=document.getElementById('freeBanner'); if(fb) fb.style.display=isPro?'none':'flex';
  FREE_LIMIT=isPro?9999:30;
  document.getElementById('countText').textContent=notes.length+(isPro?'件':'/30');
  var pl=document.getElementById('planLabel'),pd=document.getElementById('planDesc'),pb=document.getElementById('planBadge');
  if(pl) pl.textContent=isPro?'Proプラン':'無料プラン';
  if(pd) pd.textContent=isPro?'全機能が利用できます':'登録30件・広告あり';
  if(pb){pb.textContent=isPro?'✅ 有効中':'現在';pb.style.background=isPro?'rgba(94,207,160,.15)':'rgba(108,142,255,.15)';pb.style.color=isPro?'var(--green)':'var(--accent)';}
}

function showToast(msg) {
  var t=document.createElement('div');
  t.style.cssText='position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);background:#22222e;border:1px solid #35354a;border-radius:12px;padding:.75rem 1.25rem;font-size:.85rem;font-weight:500;z-index:300;color:#f0eee8;white-space:nowrap;font-family:Outfit,sans-serif;';
  t.textContent=msg; document.body.appendChild(t); setTimeout(function(){ t.remove(); },2500);
}
